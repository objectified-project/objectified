name: Objectified UI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'objectified-ui/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'objectified-ui/**'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    name: Run Objectified UI Test and Build
    runs-on: self-hosted

    # PostgreSQL is started manually (see "Start PostgreSQL" below) instead of via
    # a `services:` block. A service maps to a fixed host port, and on this shared
    # self-hosted runner two concurrent runs binding the same host port collide
    # ("port is already allocated"). Instead we bind a randomly chosen free port
    # per run and tear the container down in an always() step.
    env:
      POSTGRES_DB: objectified_test
      TEST_POSTGRES_DB: objectified_test
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Unique per run+attempt so parallel/retried jobs never share a container name.
      PG_CONTAINER: objectified-ui-pg-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start PostgreSQL on a random free port
        run: |
          set -euo pipefail

          # Ask the OS for a currently-free port. python3 binding to port 0 is the
          # most reliable ("check ahead of time"); fall back to a random high port
          # verified as not-listening if python3 is unavailable.
          pick_free_port() {
            if command -v python3 >/dev/null 2>&1; then
              python3 -c 'import socket; s=socket.socket(); s.bind(("", 0)); print(s.getsockname()[1]); s.close()'
            else
              while :; do
                p=$(( (RANDOM % 20000) + 20000 ))
                if ! (exec 3<>/dev/tcp/127.0.0.1/"$p") 2>/dev/null; then
                  echo "$p"; return
                fi
              done
            fi
          }

          # Retry: another job on this runner may grab the port between the check
          # and docker binding. docker is the final arbiter — if the run fails,
          # pick a new port and try again.
          started=""
          for attempt in $(seq 1 10); do
            port="$(pick_free_port)"
            echo "Attempt ${attempt}: starting postgres on host port ${port}"
            if docker run -d \
                --name "$PG_CONTAINER" \
                -e POSTGRES_DB="$POSTGRES_DB" \
                -e POSTGRES_USER="$POSTGRES_USER" \
                -e POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
                -p "${port}:5432" \
                --health-cmd "pg_isready -U postgres" \
                --health-interval 10s \
                --health-timeout 5s \
                --health-retries 5 \
                postgres:16 >/dev/null 2>docker-run.err; then
              echo "POSTGRES_PORT=${port}" >> "$GITHUB_ENV"
              echo "Started container ${PG_CONTAINER} on host port ${port}"
              started="yes"
              break
            fi
            echo "Could not bind port ${port}:"; cat docker-run.err || true
            docker rm -f "$PG_CONTAINER" >/dev/null 2>&1 || true
            sleep 1
          done

          if [ -z "$started" ]; then
            echo "Failed to start PostgreSQL on a free port after 10 attempts" >&2
            exit 1
          fi

      - name: Wait for PostgreSQL to be healthy
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            status="$(docker inspect --format '{{.State.Health.Status}}' "$PG_CONTAINER" 2>/dev/null || echo unknown)"
            echo "Health check ${i}: ${status}"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become healthy in time" >&2
          docker logs "$PG_CONTAINER" || true
          exit 1

      - name: Enable Corepack and set Yarn to 4.12.0
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Objectified UI dependencies
        run: |
          cd objectified-ui
          yarn install

      - name: Run validation tests with coverage
        run: |
          cd objectified-ui
          # yarn test:import --ci
          yarn test:coverage --ci
        env:
          # POSTGRES_* come from job-level env; POSTGRES_PORT is exported by the
          # "Start PostgreSQL" step.
          NODE_ENV: test

      - name: Coverage summary
        if: always()
        run: |
          cd objectified-ui
          summary="coverage/coverage-summary.json"
          {
            echo '### objectified-ui coverage'
            echo ''
            if [ -f "$summary" ]; then
              node -e '
                const t = require("./coverage/coverage-summary.json").total;
                const row = (k) => `| ${k} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
                console.log("| Metric | % | Covered/Total |");
                console.log("|---|---|---|");
                ["statements","branches","functions","lines"].forEach(k => console.log(row(k)));
              '
            else
              echo '_No coverage summary produced._'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: objectified-ui-coverage
          path: objectified-ui/coverage/
          if-no-files-found: ignore
        continue-on-error: true

      - name: Build Objectified UI
        run: |
          cd objectified-ui
          yarn build
        env:
          # POSTGRES_* come from job-level env; POSTGRES_PORT is exported by the
          # "Start PostgreSQL" step.
          NODE_ENV: test
          # Cap heap so the build cannot balloon and swap-thrash the shared
          # self-hosted runner into losing communication (worker count is also
          # bounded in next.config.ts via experimental.cpus / memoryBasedWorkersCount).
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Stop PostgreSQL
        if: always()
        run: |
          # Runs whether the build passed or failed so the container never leaks
          # (and its random port is freed) on this shared self-hosted runner.
          docker rm -f "$PG_CONTAINER" >/dev/null 2>&1 || true
