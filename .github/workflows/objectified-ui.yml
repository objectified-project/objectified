name: Objectified UI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'objectified-ui/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'objectified-ui/**'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    name: Run Objectified UI Test and Build
    runs-on: self-hosted

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: objectified_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Publish on a non-standard host port: the self-hosted runner already has
          # a PostgreSQL on 5432, so binding host 5432 fails ("port is already
          # allocated"). Steps reach the service via localhost:55432 (see POSTGRES_PORT).
          - 55432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Enable Corepack and set Yarn to 4.12.0
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Objectified UI dependencies
        run: |
          cd objectified-ui
          yarn install

      - name: Run validation tests with coverage
        run: |
          cd objectified-ui
          # yarn test:import --ci
          yarn test:coverage --ci
        env:
          TEST_POSTGRES_DB: objectified_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 55432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          NODE_ENV: test

      - name: Coverage summary
        if: always()
        run: |
          cd objectified-ui
          summary="coverage/coverage-summary.json"
          {
            echo '### objectified-ui coverage'
            echo ''
            if [ -f "$summary" ]; then
              node -e '
                const t = require("./coverage/coverage-summary.json").total;
                const row = (k) => `| ${k} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
                console.log("| Metric | % | Covered/Total |");
                console.log("|---|---|---|");
                ["statements","branches","functions","lines"].forEach(k => console.log(row(k)));
              '
            else
              echo '_No coverage summary produced._'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: objectified-ui-coverage
          path: objectified-ui/coverage/
          if-no-files-found: ignore
        continue-on-error: true

      - name: Build Objectified UI
        run: |
          cd objectified-ui
          yarn build
        env:
          TEST_POSTGRES_DB: objectified_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 55432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          NODE_ENV: test
          # Cap heap so the build cannot balloon and swap-thrash the shared
          # self-hosted runner into losing communication (worker count is also
          # bounded in next.config.ts via experimental.cpus / memoryBasedWorkersCount).
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: "1"
