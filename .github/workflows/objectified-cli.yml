name: objectified-cli

on:
  push:
    paths:
      - "objectified-cli/**"
      - ".github/workflows/objectified-cli.yml"
      - "yarn.lock"
      - "package.json"
  pull_request:
    paths:
      - "objectified-cli/**"
      - ".github/workflows/objectified-cli.yml"
      - "yarn.lock"
      - "package.json"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Enable Corepack and set Yarn to 4.12.0
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Objectified CLI dependencies
        run: |
          cd objectified-cli
          yarn install

      - name: Run validation tests
        run: |
          cd objectified-cli
          yarn test
        env:
          TEST_POSTGRES_DB: objectified_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          NODE_ENV: test

      - name: Build Objectified CLI
        run: |
          cd objectified-cli
          yarn build
        env:
          TEST_POSTGRES_DB: objectified_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          NODE_ENV: test

