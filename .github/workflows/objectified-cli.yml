name: objectified-cli

on:
  push:
    paths:
      - "objectified-cli/**"
      - ".github/workflows/objectified-cli.yml"
      - "yarn.lock"
      - "package.json"
  pull_request:
    paths:
      - "objectified-cli/**"
      - ".github/workflows/objectified-cli.yml"
      - "yarn.lock"
      - "package.json"

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Enable Corepack and set Yarn to 4.12.0
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Install root workspace (scaffold scripts)
        run: yarn install --immutable

      - name: Lint Objectified CLI
        run: |
          cd objectified-cli
          uv sync
          uv run ruff check src/ tests/

      - name: Run Objectified CLI tests
        run: |
          cd objectified-cli
          uv run pytest tests/ -v
          node --test test/*.test.mjs
        env:
          OBJECTIFIED_LOAD_DOTENV: "0"

      - name: Build Objectified CLI
        run: |
          cd objectified-cli
          yarn build
