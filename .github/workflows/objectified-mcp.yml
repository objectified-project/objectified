name: Objectified MCP

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/objectified-mcp.yml'
      - 'objectified-mcp/**'
      - 'objectified-rest/**'
      - 'docker-compose.yml'
      - 'docker-compose.env.example'
      - 'objectified-db/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/objectified-mcp.yml'
      - 'objectified-mcp/**'
      - 'objectified-rest/**'
      - 'docker-compose.yml'
      - 'docker-compose.env.example'
      - 'objectified-db/**'
  workflow_dispatch:

jobs:
  test:
    name: Lint, type-check and test objectified-mcp
    runs-on: self-hosted
    env:
      OBJECTIFIED_MCP_DATABASE_URL: postgresql://postgres:postgres@localhost:55432/objectified_ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: objectified_ci
        ports:
          # Publish on a non-standard host port: the self-hosted runner already has
          # a PostgreSQL on 5432, so binding host 5432 fails ("port is already
          # allocated"). The job connects via localhost:55432 (see DATABASE_URL above).
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d objectified_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose specification
        run: docker compose config

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: objectified-mcp

      - name: Ruff lint
        run: uv run ruff check .
        working-directory: objectified-mcp

      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: objectified-mcp

      - name: Mypy type check
        run: uv run mypy -p objectified_mcp
        working-directory: objectified-mcp

      - name: Run pytest
        run: uv run pytest
        working-directory: objectified-mcp

  publish-docker-image:
    name: Build and push objectified-mcp image
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: self-hosted
    env:
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      IMAGE_NAME: objectified-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read package version
        id: meta
        working-directory: objectified-mcp
        run: |
          set -euo pipefail
          version=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        run: echo "$DOCKER_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: objectified-mcp/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
