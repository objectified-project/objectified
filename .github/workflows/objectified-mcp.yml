name: Objectified MCP

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/objectified-mcp.yml'
      - 'objectified-mcp/**'
      - 'objectified-rest/**'
      - 'docker-compose.yml'
      - 'docker-compose.env.example'
      - 'objectified-db/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/objectified-mcp.yml'
      - 'objectified-mcp/**'
      - 'objectified-rest/**'
      - 'docker-compose.yml'
      - 'docker-compose.env.example'
      - 'objectified-db/**'
  workflow_dispatch:

jobs:
  test:
    name: Lint, type-check and test objectified-mcp
    runs-on: ubuntu-latest
    env:
      OBJECTIFIED_MCP_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/objectified_ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: objectified_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d objectified_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose specification
        run: docker compose config

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: objectified-mcp

      - name: Ruff lint
        run: uv run ruff check .
        working-directory: objectified-mcp

      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: objectified-mcp

      - name: Mypy type check
        run: uv run mypy -p objectified_mcp
        working-directory: objectified-mcp

      - name: Run pytest
        run: uv run pytest
        working-directory: objectified-mcp
