<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Audit — Access &amp; IAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>html,body{font-family:'Inter',sans-serif}.mono{font-family:'JetBrains Mono',ui-monospace,monospace}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <header class="border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 sticky top-0 z-10">
    <div class="px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-amber-500 to-yellow-500 flex items-center justify-center"><i data-lucide="scroll-text" class="w-5 h-5 text-white"></i></div>
        <div><h1 class="text-lg font-bold">Access Audit</h1><p class="text-xs text-gray-500 dark:text-gray-400">Immutable record of every access &amp; permission change</p></div>
      </div>
      <div class="flex items-center gap-2">
        <button class="px-3 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-gray-700 flex items-center gap-1.5"><i data-lucide="download" class="w-3.5 h-3.5"></i> Export CSV</button>
        <a href="index.html" class="text-xs text-gray-500 dark:text-gray-400 hover:text-amber-500">← Access hub</a>
        <button id="themeBtn" class="w-9 h-9 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center"><i data-lucide="sun-moon" class="w-4 h-4"></i></button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <div class="flex gap-2 mb-5 text-xs">
      <span class="px-3 py-1.5 rounded-full bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300 font-medium">All events</span>
      <span class="px-3 py-1.5 rounded-full border border-gray-200 dark:border-gray-700 text-gray-500">Role changes</span>
      <span class="px-3 py-1.5 rounded-full border border-gray-200 dark:border-gray-700 text-gray-500">Sign-ins</span>
      <span class="px-3 py-1.5 rounded-full border border-gray-200 dark:border-gray-700 text-gray-500">Admin overrides</span>
    </div>
    <div class="rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-200 dark:border-gray-700 text-left text-[11px] uppercase tracking-wider text-gray-400">
          <th class="px-4 py-3 font-semibold">When</th><th class="px-3 py-3 font-semibold">Actor</th><th class="px-3 py-3 font-semibold">Event</th><th class="px-3 py-3 font-semibold">Target</th><th class="px-3 py-3 font-semibold">Source</th>
        </tr></thead>
        <tbody class="divide-y divide-gray-100 dark:divide-gray-700/60" id="rows"></tbody>
      </table>
    </div>
    <p class="text-[11px] text-gray-400 mt-3 flex items-center gap-1.5"><i data-lucide="lock" class="w-3.5 h-3.5"></i> Entries are append-only and hash-chained; they cannot be edited or deleted, satisfying SOC 2 / ISO 27001 access-review evidence.</p>
  </main>

  <script>
    const ev=[
      ['12:04:22','dana@acme.io','role.assigned','priya@acme.io → Release Manager','SSO · 10.2.3.4'],
      ['11:58:01','system (SCIM)','member.provisioned','noah@partner.com','SCIM · Okta'],
      ['11:31:47','liam@acme.io','permission.changed','Role "Release Manager": version:publish = allow','Web'],
      ['10:15:09','dana@acme.io','sso.enforced','Tenant Acme Corp','Web'],
      ['09:47:33','ci@acme.io','apikey.used','version:publish on payments@2.3.0','API key'],
      ['08:02:55','platform-admin','admin.override','Unlocked frozen schema billing@1.0.0','Admin plane'],
    ];
    const color={'role.assigned':'orange','member.provisioned':'sky','permission.changed':'rose','sso.enforced':'emerald','apikey.used':'gray','admin.override':'purple'};
    document.getElementById('rows').innerHTML=ev.map(([t,a,e,tg,s])=>`
      <tr><td class="px-4 py-3 mono text-xs text-gray-500">${t}</td>
      <td class="px-3 py-3 mono text-xs">${a}</td>
      <td class="px-3 py-3"><span class="mono text-xs px-2 py-0.5 rounded bg-${color[e]}-100 text-${color[e]}-700 dark:bg-${color[e]}-900/40 dark:text-${color[e]}-300">${e}</span></td>
      <td class="px-3 py-3 text-gray-600 dark:text-gray-300">${tg}</td>
      <td class="px-3 py-3 text-xs text-gray-400">${s}</td></tr>`).join('');
    const themeKey='access-mockup-theme';const stored=localStorage.getItem(themeKey);
    if(stored==='dark'||(!stored&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');
    document.getElementById('themeBtn').addEventListener('click',()=>{document.documentElement.classList.toggle('dark');localStorage.setItem(themeKey,document.documentElement.classList.contains('dark')?'dark':'light')});
    lucide.createIcons();
  </script>
</body>
</html>
