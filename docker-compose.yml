# Local spine stack: Postgres 16 (persistent volume), schema migrations, dev seed, objectified-rest
# (HTTP API) and objectified-mcp (HTTP). This is the stack exercised by the end-to-end golden-path
# smoke test (scripts/golden_path/, docs/GOLDEN_PATH.md).
# From repo root:
#   docker compose up --build --wait
#
# Services:
#   postgres  Postgres 16 with a persistent volume.
#   migrate   One-shot Flyway migrations (runs to completion, then exits).
#   seed      One-shot dev seed data (sample tenant `acme-corp` + API key); runs after migrate.
#   rest      objectified-rest FastAPI service on :8000 (depends on migrate + seed).
#   mcp       objectified-mcp HTTP service on :8765 (depends on migrate + seed).
#
# Override secrets via environment or a `.env` file (see docker-compose.env.example).

services:
  postgres:
    # pgvector/pgvector ships Postgres 16 with the `vector` extension preinstalled, which the
    # schema requires (V001 `CREATE EXTENSION vector`; embedding columns/HNSW indexes in V062/V102).
    # Plain `postgres:16-bookworm` lacks it and fails the first migration.
    image: pgvector/pgvector:pg16-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-objectified_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-objectified}
    volumes:
      - objectified_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - objectified-mcp

  migrate:
    build:
      context: ./objectified-db
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-objectified_local_dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-objectified}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - objectified-mcp

  # One-shot dev seed (sample tenant `acme-corp`, sample user, dev API key). Runs after migrations
  # complete and exits. NODE_ENV is forced to development so the seed guard (which refuses to load
  # dev data under NODE_ENV=production) allows it. Seed SQL is idempotent (ON CONFLICT DO NOTHING).
  seed:
    build:
      context: ./objectified-db
      dockerfile: Dockerfile
    command: ["seed"]
    environment:
      NODE_ENV: development
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-objectified_local_dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-objectified}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - objectified-mcp

  # objectified-rest FastAPI service. The golden-path smoke test drives import / edit / version /
  # publish / browse / export through this service (the same endpoints the UI calls).
  rest:
    build:
      # Repo root context so the Dockerfile can pull in the objectified-ui workspace (the
      # spec-import worker runs as a tsx script from objectified-ui).
      context: .
      dockerfile: objectified-rest/Dockerfile
    ports:
      - "${OBJECTIFIED_REST_HTTP_PORT:-8000}:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-objectified_local_dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-objectified}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    # Readiness probe (#3617): /readyz verifies the database is reachable (503 otherwise), so
    # orchestration only marks `rest` healthy once it can actually serve traffic. /livez exists for
    # a process-only liveness check that ignores the database.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=4)\""
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - objectified-mcp

  mcp:
    build:
      context: .
      dockerfile: objectified-mcp/Dockerfile
    ports:
      - "${OBJECTIFIED_MCP_HTTP_PORT:-8765}:${OBJECTIFIED_MCP_HTTP_PORT:-8765}"
    environment:
      OBJECTIFIED_MCP_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-objectified_local_dev}@postgres:5432/${POSTGRES_DB:-objectified}
      OBJECTIFIED_MCP_INTERNAL_SECRET: ${OBJECTIFIED_MCP_INTERNAL_SECRET:-objectified-local-dev-secret-min-16}
      OBJECTIFIED_MCP_HTTP_HOST: 0.0.0.0
      OBJECTIFIED_MCP_HTTP_PORT: ${OBJECTIFIED_MCP_HTTP_PORT:-8765}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    # Health probe (#3617): the MCP HTTP server exposes GET /health; wiring it into compose makes a
    # crashed/unready MCP visible to `docker compose ps` / `--wait` instead of silently "up".
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${OBJECTIFIED_MCP_HTTP_PORT:-8765}/health', timeout=4)\""
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - objectified-mcp

volumes:
  objectified_postgres_data:

networks:
  objectified-mcp:
    driver: bridge
