<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Data Federate — Query History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="federate-shared.js"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-purple-500 to-violet-600 flex items-center justify-center">
          <i data-lucide="layers" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-purple-600 dark:text-purple-400">Data Federate</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-600 dark:text-gray-400">Query History</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-purple-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-6 space-y-5">

    <!-- KPIs -->
    <div class="grid grid-cols-5 gap-3">
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Queries today</div>
        <div class="text-xl font-bold text-purple-500">847</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Avg duration</div>
        <div class="text-xl font-bold text-gray-700 dark:text-gray-200">312ms</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">P99 duration</div>
        <div class="text-xl font-bold text-amber-500">4.1s</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Avg pushdown %</div>
        <div class="text-xl font-bold text-emerald-500">74%</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Failed queries</div>
        <div class="text-xl font-bold text-red-500">3</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex items-center gap-2">
      <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
        <option>Last 24 hours</option><option>Last 7 days</option><option>Last 30 days</option>
      </select>
      <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
        <option>All sources</option><option>pg_prod</option><option>snowflake_dw</option><option>mysql_app</option><option>s3_lake</option>
      </select>
      <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
        <option>All statuses</option><option>Success</option><option>Failed</option><option>Cancelled</option>
      </select>
      <input type="text" placeholder="Search SQL…" class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5 w-56" />
    </div>

    <!-- History table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/30 text-gray-500">
              <th class="text-left px-3 py-2.5 font-medium">Time</th>
              <th class="text-left px-3 py-2.5 font-medium">Query (truncated)</th>
              <th class="text-left px-3 py-2.5 font-medium">Sources</th>
              <th class="text-right px-3 py-2.5 font-medium">Duration</th>
              <th class="text-right px-3 py-2.5 font-medium">Rows</th>
              <th class="text-right px-3 py-2.5 font-medium">Data read</th>
              <th class="text-right px-3 py-2.5 font-medium">Pushdown</th>
              <th class="text-left px-3 py-2.5 font-medium">Status</th>
              <th class="px-3 py-2.5"></th>
            </tr>
          </thead>
          <tbody id="histTable" class="divide-y divide-gray-50 dark:divide-gray-700/40"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    FederateShared.bindThemeToggle();

    const queries = [
      { ts:'21:18:44', sql:'SELECT u.id, u.email, COUNT(o.id)... FROM pg_prod.public.orders o INNER JOIN snowflake_dw...', sources:'pg,sf,obj', dur:'248ms', rows:8,    data:'16.3 MB', pd:'74%', status:'Success' },
      { ts:'21:12:31', sql:'SELECT * FROM objectified.default.User WHERE plan_tier = \'enterprise\'',                   sources:'obj',       dur:'12ms',  rows:142,   data:'0.3 MB',  pd:'100%',status:'Success' },
      { ts:'21:09:02', sql:'SELECT date_trunc(\'day\', created_at) AS day, SUM(amount)... FROM pg_prod.public.orders...',sources:'pg',        dur:'91ms',  rows:30,    data:'8.1 MB',  pd:'100%',status:'Success' },
      { ts:'20:55:18', sql:'SELECT e.* FROM s3_lake.parquet.events_2026 e WHERE e.event_date > \'2026-05-01\'...',       sources:'s3',        dur:'1.84s', rows:14200, data:'210 MB',  pd:'40%', status:'Success' },
      { ts:'20:44:33', sql:'SELECT c.id, c.full_name, COUNT(o.id)... FROM mysql_app.app_db.users u JOIN pg_prod...',    sources:'my,pg',     dur:'3.2s',  rows:520,   data:'42.0 MB', pd:'62%', status:'Success' },
      { ts:'20:31:07', sql:'SELECT AVG(t.amount) FROM snowflake_dw.sales.transactions WHERE currency = \'USD\'',        sources:'sf',        dur:'112ms', rows:1,     data:'1.2 MB',  pd:'100%',status:'Success' },
      { ts:'20:18:52', sql:'SELECT * FROM s3_lake.parquet.clickstream LIMIT 1000000',                                   sources:'s3',        dur:'4.1s',  rows:1000000,data:'1.8 GB', pd:'20%', status:'Success' },
      { ts:'19:44:11', sql:'SELECT u.email, t.amount FROM mysql_app.app_db.users u JOIN snowflake_dw.sales.transac...', sources:'my,sf',     dur:'—',     rows:0,     data:'—',       pd:'—',   status:'Failed' },
      { ts:'19:30:02', sql:'SELECT COUNT(*) FROM objectified.default.Order WHERE status = \'paid\'',                    sources:'obj',       dur:'8ms',   rows:1,     data:'0.1 MB',  pd:'100%',status:'Success' },
      { ts:'18:55:44', sql:'SELECT p.sku, SUM(oi.quantity)... FROM pg_prod.public.order_items oi JOIN objectified...', sources:'pg,obj',    dur:'340ms', rows:88,    data:'22.1 MB', pd:'81%', status:'Success' },
    ];

    const srcIconMap = { pg:'🐘', sf:'❄', obj:'◎', my:'🐬', s3:'☁' };
    const tbody = document.getElementById('histTable');
    queries.forEach(q => {
      const icons = q.sources.split(',').map(s => srcIconMap[s] || s).join(' ');
      const statusCls = q.status === 'Success' ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400' : 'bg-red-100 dark:bg-red-900/30 text-red-500';
      const durCls = q.dur.endsWith('ms') && parseInt(q.dur) < 500 ? 'text-emerald-500' : q.dur === '—' ? 'text-gray-400' : 'text-amber-500';
      const tr = document.createElement('tr');
      tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/20 transition-colors';
      tr.innerHTML = `
        <td class="px-3 py-2 mono text-[10px] text-gray-400">${q.ts}</td>
        <td class="px-3 py-2 mono text-[10px] text-gray-600 dark:text-gray-400 max-w-xs truncate">${q.sql}</td>
        <td class="px-3 py-2 text-sm">${icons}</td>
        <td class="px-3 py-2 text-right mono font-medium ${durCls}">${q.dur}</td>
        <td class="px-3 py-2 text-right mono text-gray-500">${typeof q.rows === 'number' ? q.rows.toLocaleString() : q.rows}</td>
        <td class="px-3 py-2 text-right mono text-gray-500">${q.data}</td>
        <td class="px-3 py-2 text-right mono font-medium ${q.pd !== '—' && parseInt(q.pd) >= 80 ? 'text-emerald-500' : q.pd !== '—' && parseInt(q.pd) >= 50 ? 'text-amber-500' : 'text-gray-400'}">${q.pd}</td>
        <td class="px-3 py-2"><span class="text-[10px] px-2 py-0.5 rounded-full ${statusCls} font-medium">${q.status}</span></td>
        <td class="px-3 py-2 text-right flex gap-1.5 justify-end">
          <button class="text-[10px] text-purple-500 hover:underline">Re-run</button>
          <span class="text-gray-300 dark:text-gray-700">·</span>
          <a href="sql-editor.html" class="text-[10px] text-gray-400 hover:underline">Plan</a>
        </td>`;
      tbody.appendChild(tr);
    });

    lucide.createIcons();
  </script>
</body>
</html>
