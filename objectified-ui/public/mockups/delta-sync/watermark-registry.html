<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified DeltaSync — Watermark Registry ★</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="delta-sync-shared.js"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; overflow: hidden; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .grid-bg-dark {
      background-color: #030712;
      background-image: radial-gradient(circle, #334155 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .hwm-box { transition: border-color 0.4s ease; }
    .hwm-flash { border-color: #84cc16 !important; background-color: rgba(132, 204, 22, 0.08) !important; }
    .log-entry { animation: fadeSlideIn 0.3s ease; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .tbl-row { cursor: pointer; transition: background 0.12s; }
    .tbl-row.selected { background: rgba(132, 204, 22, 0.08); border-left: 2px solid #84cc16; }
    .tbl-row:not(.selected):hover { background: rgba(255,255,255,0.04); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">

  <!-- Nav -->
  <div class="h-12 border-b border-gray-800 bg-gray-900 flex items-center justify-between px-4 z-10 relative">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-lime-500 to-emerald-600 flex items-center justify-center">
          <i data-lucide="trending-up" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-600">/</span>
      <span class="text-sm font-medium text-lime-400">DeltaSync</span>
      <span class="text-xs text-gray-600">/</span>
      <span class="text-sm text-gray-400">Watermark Registry</span>
      <span class="text-[9px] px-1.5 py-0.5 rounded-full bg-amber-500/20 text-amber-400 font-bold ml-1">★ star</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="mono text-[10px] text-gray-500">advance events: <span id="advanceCount" class="text-lime-400">0</span></div>
      <button id="pauseBtn" class="text-[10px] px-2.5 py-1 rounded bg-gray-800 hover:bg-gray-700 text-gray-400 border border-gray-700 flex items-center gap-1">
        <i data-lucide="pause" class="w-3 h-3"></i> Pause
      </button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-700 hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-lime-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <!-- 3-pane layout -->
  <div class="flex" style="height: calc(100vh - 48px);">

    <!-- LEFT: Table list -->
    <div class="w-64 flex-shrink-0 border-r border-gray-800 bg-gray-900 flex flex-col overflow-hidden">
      <div class="p-3 border-b border-gray-800 space-y-2">
        <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest">Source Tables</div>
        <input id="tableFilter" type="text" placeholder="Filter tables…"
          class="w-full mono text-[10px] bg-gray-800 border border-gray-700 rounded-md px-2.5 py-1.5 text-gray-300 placeholder-gray-600 focus:border-lime-600 focus:outline-none" />
        <div class="flex gap-1.5 flex-wrap">
          <button class="status-filter-btn text-[9px] px-2 py-0.5 rounded-full border border-gray-700 text-gray-500 hover:border-emerald-600 hover:text-emerald-400 transition-colors" data-status="all">All</button>
          <button class="status-filter-btn text-[9px] px-2 py-0.5 rounded-full border border-emerald-800 text-emerald-500 hover:bg-emerald-900/20" data-status="healthy">● Healthy</button>
          <button class="status-filter-btn text-[9px] px-2 py-0.5 rounded-full border border-amber-800 text-amber-500 hover:bg-amber-900/20" data-status="drifting">● Drifting</button>
          <button class="status-filter-btn text-[9px] px-2 py-0.5 rounded-full border border-red-800 text-red-500 hover:bg-red-900/20" data-status="stale">● Stale</button>
        </div>
      </div>
      <div id="tableList" class="overflow-y-auto flex-1 p-2 space-y-0.5"></div>
    </div>

    <!-- CENTER: Watermark editor (dark canvas) -->
    <div class="flex-1 flex flex-col overflow-hidden grid-bg-dark">
      <div id="centerPane" class="flex-1 overflow-y-auto p-8"></div>
    </div>

    <!-- RIGHT: Live advance log -->
    <div class="w-72 flex-shrink-0 border-l border-gray-800 bg-gray-900 flex flex-col overflow-hidden">
      <div class="p-3 border-b border-gray-800 flex items-center justify-between">
        <div>
          <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest">Advance Log</div>
          <div class="text-[9px] text-gray-600 mt-0.5">Live watermark advances</div>
        </div>
      </div>
      <div id="advanceLog" class="overflow-y-auto flex-1 divide-y divide-gray-800/60"></div>
    </div>

  </div>

  <script>
    DeltaSyncShared.bindThemeToggle();

    const tables = [
      { id: 'orders',       source: 'pg_prod',      col: 'updated_at',       type: 'timestamp', hwm: '2026-05-13T21:22:17Z', status: 'healthy',  interval: 30,  maxSilence: 120,  mergeKey: 'order_id',   cls: 'Order',       totalRows: 14822   },
      { id: 'users',        source: 'pg_prod',      col: 'updated_at',       type: 'timestamp', hwm: '2026-05-13T21:22:05Z', status: 'healthy',  interval: 30,  maxSilence: 120,  mergeKey: 'user_id',    cls: 'User',        totalRows: 89432   },
      { id: 'transactions', source: 'snowflake_dw', col: 'txn_id',           type: 'auto_id',   hwm: '9847321',              status: 'healthy',  interval: 60,  maxSilence: 300,  mergeKey: 'txn_id',     cls: 'Transaction', totalRows: 4482910 },
      { id: 'sessions',     source: 'mysql_app',    col: 'last_active',      type: 'timestamp', hwm: '2026-05-13T21:18:44Z', status: 'drifting', interval: 60,  maxSilence: 180,  mergeKey: 'session_id', cls: 'Session',     totalRows: 241088  },
      { id: 'events',       source: 's3_lake',      col: 'event_time',       type: 'timestamp', hwm: '2026-05-13T21:04:00Z', status: 'stale',    interval: 300, maxSilence: 600,  mergeKey: 'event_id',   cls: 'Event',       totalRows: 18200000},
      { id: 'products',     source: 'pg_prod',      col: 'modified_at',      type: 'timestamp', hwm: '2026-05-13T20:45:12Z', status: 'healthy',  interval: 300, maxSilence: 3600, mergeKey: 'product_id', cls: 'Product',     totalRows: 15200   },
      { id: 'contacts',     source: 'mysql_app',    col: 'id',               type: 'auto_id',   hwm: '1284920',              status: 'healthy',  interval: 60,  maxSilence: 600,  mergeKey: 'id',         cls: 'Contact',     totalRows: 128492  },
      { id: 'inventory',    source: 'pg_prod',      col: 'warehouse_offset', type: 'offset',    hwm: 'pg:wal:0/4A23F18',     status: 'healthy',  interval: 30,  maxSilence: 120,  mergeKey: 'sku_id',     cls: 'Inventory',   totalRows: 8200    },
    ];

    let selected = tables[0];
    let paused = false;
    let advanceCount = 0;
    let currentFilter = '';
    let currentStatusFilter = 'all';

    const statusDotColor = { healthy: '#22c55e', drifting: '#f59e0b', stale: '#ef4444' };
    const statusLabel = { healthy: 'Healthy', drifting: 'Drifting ⚠', stale: 'Stale ✗' };
    const statusTextClass = { healthy: 'text-emerald-400', drifting: 'text-amber-400', stale: 'text-red-400' };

    function shortHwm(hwm) {
      if (hwm.startsWith('2026-')) return hwm.replace('T', ' ').replace('Z', '');
      return hwm.length > 18 ? hwm.slice(-18) : hwm;
    }

    function buildTableList() {
      const list = document.getElementById('tableList');
      list.innerHTML = '';
      const fq = currentFilter.toLowerCase();
      tables
        .filter(t => (!fq || t.id.includes(fq) || t.source.includes(fq)))
        .filter(t => currentStatusFilter === 'all' || t.status === currentStatusFilter)
        .forEach(t => {
          const el = document.createElement('div');
          el.className = `tbl-row px-3 py-2 rounded-lg ${t.id === selected.id ? 'selected' : ''}`;
          el.dataset.tableId = t.id;
          el.innerHTML = `
            <div class="flex items-center gap-2 mb-0.5">
              <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background:${statusDotColor[t.status]}"></span>
              <span class="text-xs font-semibold text-gray-200 truncate">${t.id}</span>
            </div>
            <div class="mono text-[9px] text-gray-500 truncate pl-3.5">${t.source}</div>
            <div id="hwmShort-${t.id}" class="mono text-[9px] text-gray-600 truncate pl-3.5">${shortHwm(t.hwm)}</div>
          `;
          list.appendChild(el);
        });
    }

    document.getElementById('tableList').addEventListener('click', e => {
      const row = e.target.closest('[data-table-id]');
      if (!row) return;
      selected = tables.find(t => t.id === row.dataset.tableId) || selected;
      buildTableList();
      buildEditor();
    });

    document.getElementById('tableFilter').addEventListener('input', e => {
      currentFilter = e.target.value;
      buildTableList();
    });

    document.querySelectorAll('.status-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentStatusFilter = btn.dataset.status;
        buildTableList();
      });
    });

    function buildEditor() {
      const t = selected;
      const center = document.getElementById('centerPane');
      center.innerHTML = `
        <div class="max-w-xl mx-auto">
          <div class="flex items-start justify-between mb-6">
            <div>
              <h2 class="text-xl font-bold text-white">${t.id}</h2>
              <div class="flex items-center gap-3 mt-1 text-xs">
                <span class="text-gray-500">${t.source}</span>
                <span class="text-gray-700">·</span>
                <span class="${statusTextClass[t.status]} font-medium">${statusLabel[t.status]}</span>
                <span class="text-gray-700">·</span>
                <span class="text-gray-500">${t.totalRows.toLocaleString()} rows</span>
              </div>
            </div>
            <a href="merge-config.html" class="text-[10px] px-3 py-1.5 rounded-md border border-gray-700 text-gray-500 hover:border-lime-600 hover:text-lime-400 transition-colors">Merge Config →</a>
          </div>

          <!-- HWM Display box -->
          <div id="hwmDisplay" class="hwm-box bg-gray-900/70 border border-gray-700 rounded-xl p-5 mb-6 text-center">
            <div class="text-[10px] text-gray-600 uppercase tracking-widest mb-2 font-semibold">Current High-Water Mark</div>
            <div id="hwmValue" class="mono text-xl font-bold text-lime-400 break-all">${t.hwm}</div>
            <div class="flex items-center justify-center gap-3 mt-2 text-[10px] text-gray-600">
              <span>${t.col}</span>
              <span>·</span>
              <span>${t.type.replace('_', ' ')}</span>
              <span>·</span>
              <span>poll every ${t.interval}s</span>
            </div>
          </div>

          <!-- Config form -->
          <div class="bg-gray-900/60 border border-gray-800 rounded-xl p-5 space-y-4 mb-4">
            <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest">Watermark Configuration</div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[10px] text-gray-600 block mb-1">Watermark Column</label>
                <input value="${t.col}" class="w-full mono text-xs bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-gray-300 focus:border-lime-600 focus:outline-none" />
              </div>
              <div>
                <label class="text-[10px] text-gray-600 block mb-1">Column Type</label>
                <select class="w-full text-xs mono bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-gray-300 focus:border-lime-600 focus:outline-none">
                  <option ${t.type==='timestamp'?'selected':''}>timestamp</option>
                  <option ${t.type==='auto_id'?'selected':''}>auto_id</option>
                  <option ${t.type==='offset'?'selected':''}>offset</option>
                </select>
              </div>
              <div>
                <label class="text-[10px] text-gray-600 block mb-1">Merge Key Column</label>
                <input value="${t.mergeKey}" class="w-full mono text-xs bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-gray-300 focus:border-lime-600 focus:outline-none" />
              </div>
              <div>
                <label class="text-[10px] text-gray-600 block mb-1">Target Class</label>
                <select class="w-full text-xs mono bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-lime-400 focus:border-lime-600 focus:outline-none">
                  <option>${t.cls}</option>
                </select>
              </div>
              <div>
                <label class="text-[10px] text-gray-600 block mb-1">Poll Interval (seconds)</label>
                <input value="${t.interval}" class="w-full mono text-xs bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-gray-300 focus:border-lime-600 focus:outline-none" />
              </div>
              <div>
                <label class="text-[10px] text-gray-600 block mb-1">Max Silence Before Drift Alert (s)</label>
                <input value="${t.maxSilence}" class="w-full mono text-xs bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-gray-300 focus:border-lime-600 focus:outline-none" />
              </div>
            </div>
          </div>

          <div class="flex gap-2">
            <button onclick="this.textContent='Saved ✓';setTimeout(()=>this.textContent='Save Config',1500)"
              class="text-xs px-4 py-2 rounded-md bg-lime-500 hover:bg-lime-600 text-white font-semibold transition-colors">Save Config</button>
            <button class="text-xs px-4 py-2 rounded-md border border-gray-700 text-gray-400 hover:border-amber-600 hover:text-amber-400 transition-colors">Reset Watermark…</button>
            <button class="text-xs px-4 py-2 rounded-md border border-gray-700 text-gray-400 hover:border-red-700 hover:text-red-400 transition-colors">Disable Sync</button>
          </div>
        </div>
      `;
    }

    function updateHwmDisplay(tableId, newHwm) {
      if (tableId !== selected.id) return;
      const val = document.getElementById('hwmValue');
      const box = document.getElementById('hwmDisplay');
      if (!val || !box) return;
      val.textContent = newHwm;
      box.classList.add('hwm-flash');
      setTimeout(() => box.classList.remove('hwm-flash'), 700);
    }

    function addAdvanceEvent() {
      if (paused) return;
      const healthy = tables.filter(t => t.status === 'healthy');
      if (!healthy.length) return;
      const t = healthy[Math.floor(Math.random() * healthy.length)];

      let prevHwm = t.hwm;
      if (t.type === 'timestamp') {
        const d = new Date(t.hwm);
        d.setSeconds(d.getSeconds() + Math.floor(Math.random() * 28) + 2);
        t.hwm = d.toISOString().replace(/\.\d{3}Z$/, 'Z');
      } else if (t.type === 'auto_id') {
        t.hwm = String(parseInt(t.hwm) + Math.floor(Math.random() * 80) + 1);
      }

      const rows = Math.floor(Math.random() * 240) + 1;
      const dur = Math.floor(Math.random() * 340) + 15;
      const now = new Date();
      const ts = now.toTimeString().slice(0, 8);

      updateHwmDisplay(t.id, t.hwm);

      // Update the short HWM in table list (fast path — no full rebuild)
      const el = document.getElementById(`hwmShort-${t.id}`);
      if (el) el.textContent = shortHwm(t.hwm);

      // Add log entry
      const log = document.getElementById('advanceLog');
      const entry = document.createElement('div');
      entry.className = 'log-entry flex items-center gap-1.5 px-3 py-2 text-[10px] mono';
      entry.innerHTML = `
        <span class="text-gray-600 w-14 flex-shrink-0">${ts}</span>
        <span class="px-1.5 py-0.5 rounded text-[9px] bg-lime-900/40 text-lime-400 flex-shrink-0 truncate max-w-[64px]">${t.id}</span>
        <span class="text-emerald-400 flex-shrink-0">+${rows}</span>
        <span class="text-gray-500 truncate flex-1">${shortHwm(t.hwm)}</span>
        <span class="text-gray-700 flex-shrink-0">${dur}ms</span>
      `;
      log.insertBefore(entry, log.firstChild);
      while (log.children.length > 50) log.removeChild(log.lastChild);

      advanceCount++;
      document.getElementById('advanceCount').textContent = advanceCount;
    }

    // Init
    buildTableList();
    buildEditor();

    // Pre-populate log
    for (let i = 0; i < 14; i++) addAdvanceEvent();

    // Live stream
    const liveInterval = setInterval(addAdvanceEvent, 2200);

    // Pause / resume
    document.getElementById('pauseBtn').addEventListener('click', function() {
      paused = !paused;
      this.innerHTML = paused
        ? '<i data-lucide="play" class="w-3 h-3"></i> Resume'
        : '<i data-lucide="pause" class="w-3 h-3"></i> Pause';
      lucide.createIcons();
    });

    lucide.createIcons();
  </script>
</body>
</html>
