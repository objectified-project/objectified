<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified DeltaSync — Sync Runs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="delta-sync-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-lime-500 to-emerald-600 flex items-center justify-center">
          <i data-lucide="trending-up" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-lime-600 dark:text-lime-400">DeltaSync</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Sync Runs</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-lime-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-6 space-y-5">
    <div class="flex items-center justify-between">
      <h1 class="text-lg font-bold">Sync Runs</h1>
      <div class="flex items-center gap-2">
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
          <option>Last 1 hour</option><option selected>Last 6 hours</option><option>Last 24 hours</option>
        </select>
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
          <option>All tables</option><option>orders</option><option>users</option><option>events</option>
        </select>
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
          <option>All statuses</option><option>Success</option><option>Failed</option><option>Skipped</option>
        </select>
      </div>
    </div>

    <!-- KPIs -->
    <div class="grid grid-cols-5 gap-3">
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-gray-700 dark:text-gray-200">142</div>
        <div class="text-[10px] text-gray-400">Runs (6h)</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-emerald-500">139</div>
        <div class="text-[10px] text-gray-400">Successful</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-red-500">3</div>
        <div class="text-[10px] text-gray-400">Failed</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-gray-700 dark:text-gray-200">1.84M</div>
        <div class="text-[10px] text-gray-400">Rows synced</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-gray-700 dark:text-gray-200">312ms</div>
        <div class="text-[10px] text-gray-400">Avg duration</div>
      </div>
    </div>

    <!-- Run log -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/30 text-gray-500">
              <th class="text-left px-3 py-2.5 font-medium">Time</th>
              <th class="text-left px-3 py-2.5 font-medium">Table</th>
              <th class="text-right px-3 py-2.5 font-medium">Rows read</th>
              <th class="text-right px-3 py-2.5 font-medium">Rows written</th>
              <th class="text-right px-3 py-2.5 font-medium">HWM advance</th>
              <th class="text-right px-3 py-2.5 font-medium">Duration</th>
              <th class="text-left px-3 py-2.5 font-medium">Engine</th>
              <th class="text-left px-3 py-2.5 font-medium">Status</th>
              <th class="px-3 py-2.5"></th>
            </tr>
          </thead>
          <tbody id="runTable" class="divide-y divide-gray-50 dark:divide-gray-700/40"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    DeltaSyncShared.bindThemeToggle();

    const runs = [
      { ts:'21:22:17', tbl:'orders',       read:42,   written:42,   hwm:'+42s',    dur:'84ms',  eng:'DataFusion', status:'Success' },
      { ts:'21:22:09', tbl:'users',        read:18,   written:18,   hwm:'+18s',    dur:'52ms',  eng:'DataFusion', status:'Success' },
      { ts:'21:22:05', tbl:'inventory',    read:3,    written:3,    hwm:'+3',      dur:'28ms',  eng:'DataFusion', status:'Success' },
      { ts:'21:21:47', tbl:'orders',       read:88,   written:88,   hwm:'+88s',    dur:'104ms', eng:'DataFusion', status:'Success' },
      { ts:'21:21:30', tbl:'contacts',     read:12,   written:12,   hwm:'+12',     dur:'61ms',  eng:'DataFusion', status:'Success' },
      { ts:'21:21:07', tbl:'transactions', read:1420, written:1420, hwm:'+1420',   dur:'340ms', eng:'DataFusion', status:'Success' },
      { ts:'21:20:44', tbl:'sessions',     read:0,    written:0,    hwm:'+0',      dur:'18ms',  eng:'DataFusion', status:'Skipped (no new rows)' },
      { ts:'21:20:22', tbl:'orders',       read:64,   written:64,   hwm:'+64s',    dur:'91ms',  eng:'DataFusion', status:'Success' },
      { ts:'21:18:44', tbl:'events',       read:null, written:null, hwm:'—',       dur:'4.1s',  eng:'DataFusion', status:'Failed (S3 timeout)' },
      { ts:'21:18:20', tbl:'users',        read:24,   written:24,   hwm:'+24s',    dur:'71ms',  eng:'DataFusion', status:'Success' },
      { ts:'21:17:44', tbl:'products',     read:2,    written:2,    hwm:'+2s',     dur:'39ms',  eng:'DataFusion', status:'Success' },
      { ts:'21:17:02', tbl:'orders',       read:520,  written:520,  hwm:'+520s',   dur:'240ms', eng:'Spark',      status:'Success' },
      { ts:'21:04:00', tbl:'events',       read:null, written:null, hwm:'—',       dur:'4.3s',  eng:'DataFusion', status:'Failed (S3 timeout)' },
    ];

    const tbody = document.getElementById('runTable');
    runs.forEach(r => {
      const statusCls = r.status === 'Success' ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400'
        : r.status.startsWith('Failed') ? 'bg-red-100 dark:bg-red-900/30 text-red-500'
        : 'bg-gray-100 dark:bg-gray-700 text-gray-400';
      const durCls = r.dur.endsWith('ms') && parseInt(r.dur) < 200 ? 'text-emerald-500' : r.dur.endsWith('ms') ? 'text-gray-600 dark:text-gray-300' : 'text-amber-500';
      const tr = document.createElement('tr');
      tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/20';
      tr.innerHTML = `
        <td class="px-3 py-2 mono text-[10px] text-gray-400">${r.ts}</td>
        <td class="px-3 py-2 mono font-medium text-lime-600 dark:text-lime-400">${r.tbl}</td>
        <td class="px-3 py-2 text-right mono text-gray-500">${r.read !== null ? r.read.toLocaleString() : '—'}</td>
        <td class="px-3 py-2 text-right mono text-gray-500">${r.written !== null ? r.written.toLocaleString() : '—'}</td>
        <td class="px-3 py-2 text-right mono text-lime-500">${r.hwm}</td>
        <td class="px-3 py-2 text-right mono font-medium ${durCls}">${r.dur}</td>
        <td class="px-3 py-2 text-[10px] text-gray-400">${r.eng}</td>
        <td class="px-3 py-2"><span class="text-[9px] px-2 py-0.5 rounded-full font-medium ${statusCls}">${r.status.split(' ')[0]}</span>${r.status.includes('(') ? `<span class="text-[9px] text-gray-400 ml-1">${r.status.slice(r.status.indexOf('('))}</span>` : ''}</td>
        <td class="px-3 py-2 text-right"><button class="text-[10px] text-gray-400 hover:text-lime-500">Re-run</button></td>
      `;
      tbody.appendChild(tr);
    });

    lucide.createIcons();
  </script>
</body>
</html>
