<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified File Gateway — Format Configurator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="gateway-shared.js"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .fmt-tab { cursor: pointer; transition: background 0.12s, border-color 0.12s; }
    .fmt-tab.active { background: linear-gradient(135deg, #eab308, #f59e0b); color: #fff; border-color: transparent; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-yellow-500 to-amber-400 flex items-center justify-center">
          <i data-lucide="hard-drive-upload" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-yellow-600 dark:text-yellow-400">File Gateway</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-600 dark:text-gray-400">Format Configurator</span>
    </div>
    <div class="flex items-center gap-2">
      <button class="text-xs bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1.5 rounded-md font-medium">Save Profile</button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-6 py-6 space-y-5">

    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold">Format Configurator</h1>
        <p class="text-xs text-gray-500 mt-0.5">Profile: <span class="mono font-medium text-gray-700 dark:text-gray-300">default-parquet</span></p>
      </div>
      <div class="flex items-center gap-2">
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-1.5 mono">
          <option>default-parquet</option>
          <option>csv-partner-exports</option>
          <option>avro-kafka-mirror</option>
          <option>+ New profile…</option>
        </select>
      </div>
    </div>

    <!-- Format tabs -->
    <div class="flex gap-2 flex-wrap">
      <button class="fmt-tab active text-xs font-semibold px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-600">Parquet</button>
      <button class="fmt-tab text-xs font-semibold px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">CSV / TSV</button>
      <button class="fmt-tab text-xs font-semibold px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">Avro</button>
      <button class="fmt-tab text-xs font-semibold px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">XML</button>
      <button class="fmt-tab text-xs font-semibold px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">Fixed-width</button>
      <button class="fmt-tab text-xs font-semibold px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">JSON Lines</button>
    </div>

    <!-- Parquet settings -->
    <div id="parquetPanel" class="space-y-5">
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
        <h2 class="text-sm font-semibold mb-4">Parquet Settings</h2>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="text-xs font-medium text-gray-500 mb-1 block">Row group size (rows)</label>
            <input type="number" value="131072" class="w-full mono text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2" />
            <p class="text-[10px] text-gray-400 mt-1">128K rows = ~128 MB row groups</p>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-500 mb-1 block">Page size (bytes)</label>
            <input type="number" value="1048576" class="w-full mono text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2" />
          </div>
          <div>
            <label class="text-xs font-medium text-gray-500 mb-1 block">Compression codec</label>
            <select class="w-full mono text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2">
              <option selected>SNAPPY</option>
              <option>GZIP</option>
              <option>ZSTD</option>
              <option>LZ4</option>
              <option>UNCOMPRESSED</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-500 mb-1 block">Dictionary encoding</label>
            <select class="w-full mono text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2">
              <option selected>Enabled (auto)</option>
              <option>Disabled</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-500 mb-1 block">Null value handling</label>
            <select class="w-full mono text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2">
              <option selected>Preserve nulls</option>
              <option>Coerce to empty string</option>
              <option>Reject rows with nulls</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-500 mb-1 block">Timestamp precision</label>
            <select class="w-full mono text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2">
              <option selected>MICROS (UTC-normalized)</option>
              <option>MILLIS</option>
              <option>NANOS</option>
            </select>
          </div>
        </div>
      </div>

      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
        <h2 class="text-sm font-semibold mb-4">Schema Evolution Policy</h2>
        <div class="space-y-3 text-xs">
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="radio" name="schema_evo" checked class="accent-yellow-500 mt-0.5" />
            <div>
              <span class="font-medium">Accept new columns</span>
              <p class="text-gray-400 mt-0.5">Automatically add new columns to the target Class as nullable properties when detected in file schema.</p>
            </div>
          </label>
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="radio" name="schema_evo" class="accent-yellow-500 mt-0.5" />
            <div>
              <span class="font-medium">Flag for review</span>
              <p class="text-gray-400 mt-0.5">Pause ingestion and alert when file schema diverges from the registered Class. Require manual resolution.</p>
            </div>
          </label>
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="radio" name="schema_evo" class="accent-yellow-500 mt-0.5" />
            <div>
              <span class="font-medium">Strict — reject unknown columns</span>
              <p class="text-gray-400 mt-0.5">Reject files that contain columns not present in the target Class. Use for compliance-sensitive datasets.</p>
            </div>
          </label>
        </div>
      </div>

      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
        <h2 class="text-sm font-semibold mb-4">Error Handling</h2>
        <div class="grid grid-cols-3 gap-4 text-xs">
          <div>
            <label class="text-gray-500 mb-1 block font-medium">On parse error</label>
            <select class="w-full mono text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2">
              <option selected>Skip row + log</option>
              <option>Abort file</option>
              <option>Send to dead-letter</option>
            </select>
          </div>
          <div>
            <label class="text-gray-500 mb-1 block font-medium">Max error rows (%)</label>
            <input type="number" value="5" class="w-full mono bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2" />
            <p class="text-[10px] text-gray-400 mt-1">Abort file if error rate exceeds this threshold</p>
          </div>
          <div>
            <label class="text-gray-500 mb-1 block font-medium">Retry on transient error</label>
            <select class="w-full mono text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-2">
              <option selected>3 times (exp backoff)</option>
              <option>1 time</option>
              <option>No retry</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3">
      <button class="text-xs px-4 py-2 rounded-md border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">Test with sample file</button>
      <button class="text-xs px-4 py-2 rounded-md bg-gradient-to-r from-yellow-500 to-amber-400 text-white font-semibold hover:from-yellow-600 hover:to-amber-500 shadow-sm">Save Profile</button>
    </div>
  </div>

  <script>
    GatewayShared.bindThemeToggle();
    document.querySelectorAll('.fmt-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.fmt-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    lucide.createIcons();
  </script>
</body>
</html>
