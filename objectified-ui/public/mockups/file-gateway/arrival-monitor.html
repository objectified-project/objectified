<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified File Gateway — Arrival Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="gateway-shared.js"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-yellow-500 to-amber-400 flex items-center justify-center">
          <i data-lucide="hard-drive-upload" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-yellow-600 dark:text-yellow-400">File Gateway</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-600 dark:text-gray-400">Arrival Monitor</span>
    </div>
    <div class="flex items-center gap-2">
      <span id="liveCount" class="text-[10px] text-emerald-500 mono">● LIVE — 0 files today</span>
      <button id="pauseBtn" class="text-xs px-3 py-1.5 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">Pause</button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-5 space-y-5">

    <!-- KPI -->
    <div class="grid grid-cols-5 gap-3">
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Arrivals today</div>
        <div id="kpiTotal" class="text-xl font-bold text-yellow-500">0</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Routed OK</div>
        <div id="kpiRouted" class="text-xl font-bold text-emerald-500">0</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Deduplicated</div>
        <div id="kpiDedup" class="text-xl font-bold text-amber-500">0</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Failed</div>
        <div id="kpiFailed" class="text-xl font-bold text-red-500">0</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3">
        <div class="text-[10px] text-gray-400">Avg latency</div>
        <div class="text-xl font-bold text-blue-500">1.2s</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex items-center gap-2 flex-wrap">
      <select id="filterSource" class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
        <option value="">All sources</option>
        <option>S3</option><option>GCS</option><option>Azure Blob</option><option>SFTP</option><option>NFS</option>
      </select>
      <select id="filterFmt" class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
        <option value="">All formats</option>
        <option>Parquet</option><option>CSV</option><option>JSON Lines</option><option>Excel</option><option>Avro</option>
      </select>
      <select id="filterStatus" class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
        <option value="">All statuses</option>
        <option>Routed</option><option>Duplicate</option><option>Failed</option><option>Pending</option>
      </select>
    </div>

    <!-- Feed table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
      <div class="border-b border-gray-100 dark:border-gray-700 px-4 py-2.5 flex items-center gap-2">
        <span class="text-xs font-semibold">Live Arrival Feed</span>
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/30 text-gray-500">
              <th class="text-left px-3 py-2 font-medium">Time</th>
              <th class="text-left px-3 py-2 font-medium">Source</th>
              <th class="text-left px-3 py-2 font-medium">Filename</th>
              <th class="text-left px-3 py-2 font-medium">Format</th>
              <th class="text-right px-3 py-2 font-medium">Size</th>
              <th class="text-left px-3 py-2 font-medium">Rule matched</th>
              <th class="text-left px-3 py-2 font-medium">Target Class</th>
              <th class="text-left px-3 py-2 font-medium">Status</th>
              <th class="text-right px-3 py-2 font-medium">Latency</th>
            </tr>
          </thead>
          <tbody id="arrivalFeed" class="divide-y divide-gray-50 dark:divide-gray-700/40"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
(function() {
  GatewayShared.bindThemeToggle();

  let paused = false;
  let total = 0, routed = 0, dedup = 0, failed = 0;

  const sources  = ['S3', 'GCS', 'Azure Blob', 'SFTP', 'NFS'];
  const fmts     = ['Parquet', 'CSV', 'JSON Lines', 'Excel', 'Avro'];
  const rules    = ['users-parquet-daily', 'orders-parquet-daily', 'partner-sftp-csv', 'catch-all-archive'];
  const classes  = ['User', 'Order', 'Session', 'Contact', 'PageView'];
  const prefixes = ['users_', 'orders_', 'sessions_', 'page_views_', 'crm_contacts_', 'inventory_'];
  const sizes    = ['2.1 MB', '14.8 MB', '112.4 MB', '890 KB', '34.7 MB', '1.2 GB', '244 KB'];

  function srcIcon(s) {
    const map = { 'S3':'☁', 'GCS':'☁', 'Azure Blob':'☁', 'SFTP':'🔒', 'NFS':'📁' };
    return map[s] || '📄';
  }

  function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function addRow() {
    if (paused) return;
    const feed = document.getElementById('arrivalFeed');
    const now = new Date();
    const ts = now.toTimeString().slice(0,8);
    const src = rand(sources);
    const fmt = rand(fmts);
    const pfx = rand(prefixes);
    const ext = fmt === 'Parquet' ? '.parquet' : fmt === 'CSV' ? '.csv' : fmt === 'JSON Lines' ? '.jsonl' : fmt === 'Excel' ? '.xlsx' : '.avro';
    const fname = pfx + now.toISOString().slice(0,10) + '_' + String(Math.floor(Math.random()*9000)+1000) + ext;
    const size = rand(sizes);
    const rule = rand(rules);
    const cls  = rand(classes);
    const statusRoll = Math.random();
    let status, statusClass;
    if (statusRoll < 0.72) { status = 'Routed'; statusClass = 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400'; routed++; }
    else if (statusRoll < 0.90) { status = 'Duplicate'; statusClass = 'bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400'; dedup++; }
    else { status = 'Failed'; statusClass = 'bg-red-100 dark:bg-red-900/30 text-red-500'; failed++; }
    const lat = (Math.random() * 3 + 0.4).toFixed(1) + 's';
    total++;

    const tr = document.createElement('tr');
    tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/20 transition-colors';
    tr.innerHTML = `
      <td class="px-3 py-1.5 mono text-[10px] text-gray-400">${ts}</td>
      <td class="px-3 py-1.5 text-gray-500">${srcIcon(src)} ${src}</td>
      <td class="px-3 py-1.5 mono text-[10px] text-gray-700 dark:text-gray-300 max-w-[160px] truncate">${fname}</td>
      <td class="px-3 py-1.5"><span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-500">${fmt}</span></td>
      <td class="px-3 py-1.5 text-right mono text-[10px] text-gray-400">${size}</td>
      <td class="px-3 py-1.5 mono text-[10px] text-yellow-500 dark:text-yellow-400 truncate max-w-[120px]">${rule}</td>
      <td class="px-3 py-1.5 font-medium text-gray-700 dark:text-gray-200">${cls}</td>
      <td class="px-3 py-1.5"><span class="text-[10px] px-2 py-0.5 rounded-full ${statusClass} font-medium">${status}</span></td>
      <td class="px-3 py-1.5 text-right mono text-[10px] text-gray-400">${lat}</td>`;

    if (feed.firstChild) feed.insertBefore(tr, feed.firstChild);
    else feed.appendChild(tr);

    if (feed.children.length > 50) feed.removeChild(feed.lastChild);

    document.getElementById('kpiTotal').textContent = total;
    document.getElementById('kpiRouted').textContent = routed;
    document.getElementById('kpiDedup').textContent = dedup;
    document.getElementById('kpiFailed').textContent = failed;
    document.getElementById('liveCount').textContent = `● LIVE — ${total} files today`;
  }

  for (let i = 0; i < 12; i++) addRow();

  setInterval(addRow, 1800);

  document.getElementById('pauseBtn').addEventListener('click', function() {
    paused = !paused;
    this.textContent = paused ? 'Resume' : 'Pause';
    document.getElementById('liveCount').textContent = paused ? '⏸ PAUSED' : `● LIVE — ${total} files today`;
    document.getElementById('liveCount').className = paused ? 'text-[10px] text-amber-500 mono' : 'text-[10px] text-emerald-500 mono';
  });

  lucide.createIcons();
})();
</script>
</body>
</html>
