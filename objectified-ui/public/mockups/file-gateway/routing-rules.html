<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified File Gateway — Routing Rules ★</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="gateway-shared.js"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; overflow: hidden; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .pane { height: calc(100vh - 48px); overflow-y: auto; }
    .rule-row { cursor: pointer; border-left: 2px solid transparent; transition: background 0.1s; }
    .rule-row.selected { border-left-color: #eab308; background: rgba(234,179,8,0.07); }
    .rule-row:not(.selected):hover { background: rgba(234,179,8,0.03); }
    .match-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(234,179,8,0.3);
      color: #fde68a;
      border-radius: 6px;
      padding: 6px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      width: 100%;
    }
    .match-input:focus { outline: none; border-color: #eab308; }
    .cond-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 9999px;
      background: rgba(234,179,8,0.12);
      border: 1px solid rgba(234,179,8,0.25);
      color: #fbbf24;
      cursor: pointer;
    }
    .cond-tag.active { background: rgba(234,179,8,0.25); border-color: rgba(234,179,8,0.5); }
    .match-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-family: monospace; }
    .match-ok { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
    .match-miss { background: rgba(107,114,128,0.1); color: #6b7280; }
    .match-err { background: rgba(239,68,68,0.1); color: #f87171; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100" style="height:100vh;overflow:hidden;">

  <!-- Nav -->
  <div class="h-12 border-b border-gray-800 bg-gray-900/95 flex items-center justify-between px-4 flex-shrink-0">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-yellow-500 to-amber-400 flex items-center justify-center">
          <i data-lucide="hard-drive-upload" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold text-gray-100">Objectified</span>
      </a>
      <span class="text-xs text-gray-600">/</span>
      <span class="text-sm font-medium text-yellow-400">File Gateway</span>
      <span class="text-xs text-gray-600">/</span>
      <span class="text-sm text-gray-400">Routing Rules</span>
      <span class="text-[9px] px-1.5 py-0.5 rounded-full bg-yellow-900/40 text-yellow-400 border border-yellow-700/50 font-bold">★ STAR</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="addRuleBtn" class="flex items-center gap-1.5 text-xs bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1.5 rounded-md font-medium">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Rule
      </button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-700 hover:bg-gray-800 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="flex" style="height:calc(100vh - 48px);">

    <!-- LEFT: Rule list (280px) -->
    <div class="pane w-72 flex-shrink-0 border-r border-gray-800 bg-gray-900">
      <div class="px-3 py-3 border-b border-gray-800 flex items-center justify-between">
        <div class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest">Routing Rules</div>
        <div class="text-[10px] text-gray-600">Evaluated in priority order</div>
      </div>
      <div id="ruleList" class="divide-y divide-gray-800/60"></div>
    </div>

    <!-- CENTER: Rule editor -->
    <div class="pane flex-1 bg-gray-950 border-r border-gray-800">
      <div class="sticky top-0 z-10 bg-gray-950/95 backdrop-blur border-b border-gray-800 px-5 py-2.5 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-xs font-semibold text-gray-300">Rule Editor</span>
          <span class="text-[10px] text-yellow-400 mono" id="editorRuleName">users-parquet-daily</span>
        </div>
        <div class="flex items-center gap-2">
          <button class="text-xs px-3 py-1 rounded border border-gray-700 hover:bg-gray-800 text-gray-300">Duplicate</button>
          <button class="text-xs px-3 py-1 rounded border border-red-800/60 text-red-400 hover:bg-red-900/20">Delete</button>
          <button class="text-xs px-3 py-1 rounded bg-yellow-500 hover:bg-yellow-600 text-white font-semibold">Save</button>
        </div>
      </div>

      <div class="px-5 py-4 space-y-5">

        <!-- Priority + name -->
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="text-[10px] text-gray-500 block mb-1 font-semibold uppercase tracking-widest">Priority</label>
            <input type="number" value="10" class="w-full text-xs mono bg-gray-900 border border-gray-700 rounded-md px-3 py-2 text-gray-200 focus:outline-none focus:border-yellow-500" />
          </div>
          <div class="col-span-2">
            <label class="text-[10px] text-gray-500 block mb-1 font-semibold uppercase tracking-widest">Rule Name</label>
            <input type="text" value="users-parquet-daily" class="w-full text-xs mono bg-gray-900 border border-gray-700 rounded-md px-3 py-2 text-gray-200 focus:outline-none focus:border-yellow-500" />
          </div>
        </div>

        <!-- Match conditions -->
        <div>
          <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest mb-2">Match Conditions <span class="text-gray-700 font-normal">(ALL must match)</span></div>
          <div class="space-y-2.5">

            <div class="flex items-center gap-2">
              <div class="w-28 flex-shrink-0">
                <select class="w-full text-[10px] mono bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-300 focus:outline-none focus:border-yellow-500">
                  <option selected>Filename glob</option>
                  <option>Folder path</option>
                  <option>Schema fingerprint</option>
                  <option>File size range</option>
                  <option>Content type</option>
                </select>
              </div>
              <input class="match-input flex-1" type="text" value="users_*.parquet" />
              <button class="text-gray-600 hover:text-red-400 flex-shrink-0"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
            </div>

            <div class="flex items-center gap-2">
              <div class="w-28 flex-shrink-0">
                <select class="w-full text-[10px] mono bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-300 focus:outline-none focus:border-yellow-500">
                  <option>Filename glob</option>
                  <option selected>Folder path</option>
                  <option>Schema fingerprint</option>
                </select>
              </div>
              <input class="match-input flex-1" type="text" value="data/parquet/**" />
              <button class="text-gray-600 hover:text-red-400 flex-shrink-0"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
            </div>

            <div class="flex items-center gap-2">
              <div class="w-28 flex-shrink-0">
                <select class="w-full text-[10px] mono bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-300 focus:outline-none focus:border-yellow-500">
                  <option>Filename glob</option>
                  <option>Folder path</option>
                  <option selected>Schema fingerprint</option>
                </select>
              </div>
              <input class="match-input flex-1" type="text" value="fp_a3f91bc2, fp_b9e0721a" />
              <button class="text-gray-600 hover:text-red-400 flex-shrink-0"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
            </div>

            <button class="flex items-center gap-1.5 text-[10px] text-yellow-500 hover:text-yellow-400">
              <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add condition
            </button>
          </div>
        </div>

        <!-- Action -->
        <div class="border-t border-gray-800 pt-4">
          <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest mb-3">Action</div>
          <div class="grid grid-cols-3 gap-3 mb-4">
            <div>
              <label class="text-[10px] text-gray-500 block mb-1">Action type</label>
              <select class="w-full text-[10px] mono bg-gray-900 border border-gray-700 rounded-md px-2 py-2 text-gray-300 focus:outline-none focus:border-yellow-500">
                <option selected>Route to Forge pipeline</option>
                <option>Direct loader</option>
                <option>Dead-letter drop</option>
                <option>Archive only</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] text-gray-500 block mb-1">Target Class</label>
              <select class="w-full text-[10px] mono bg-gray-900 border border-gray-700 rounded-md px-2 py-2 text-yellow-400 focus:outline-none focus:border-yellow-500">
                <option selected>User</option>
                <option>Order</option>
                <option>Session</option>
                <option>Product</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] text-gray-500 block mb-1">Forge pipeline</label>
              <select class="w-full text-[10px] mono bg-gray-900 border border-gray-700 rounded-md px-2 py-2 text-gray-300 focus:outline-none focus:border-yellow-500">
                <option selected>parquet-user-ingest-v3</option>
                <option>csv-orders-pipeline</option>
                <option>generic-ingest</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[10px] text-gray-500 block mb-1">Dedup policy</label>
              <select class="w-full text-[10px] mono bg-gray-900 border border-gray-700 rounded-md px-2 py-2 text-gray-300 focus:outline-none focus:border-yellow-500">
                <option selected>Skip duplicate (hash check)</option>
                <option>Allow duplicates</option>
                <option>Overwrite previous load</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] text-gray-500 block mb-1">Format profile</label>
              <select class="w-full text-[10px] mono bg-gray-900 border border-gray-700 rounded-md px-2 py-2 text-gray-300 focus:outline-none focus:border-yellow-500">
                <option selected>default-parquet</option>
                <option>csv-partner-exports</option>
              </select>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- RIGHT: Live test panel (300px) -->
    <div class="pane w-80 flex-shrink-0 bg-gray-900">
      <div class="px-4 py-3 border-b border-gray-800">
        <div class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest">Live Rule Tester</div>
      </div>
      <div class="px-4 py-4 space-y-4">
        <div>
          <label class="text-[10px] text-gray-500 block mb-1 font-semibold">Test filename</label>
          <input id="testFilename" type="text" value="users_2026-05-14.parquet" class="w-full text-[11px] mono bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-yellow-300 focus:outline-none focus:border-yellow-500" />
        </div>
        <div>
          <label class="text-[10px] text-gray-500 block mb-1 font-semibold">Test folder path</label>
          <input id="testPath" type="text" value="data/parquet/2026-05-14/" class="w-full text-[11px] mono bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-yellow-300 focus:outline-none focus:border-yellow-500" />
        </div>
        <div>
          <label class="text-[10px] text-gray-500 block mb-1 font-semibold">Schema fingerprint (optional)</label>
          <input id="testFp" type="text" value="fp_a3f91bc2" class="w-full text-[11px] mono bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-yellow-300 focus:outline-none focus:border-yellow-500" />
        </div>
        <button id="testBtn" class="w-full text-xs py-2 rounded-md bg-yellow-500 hover:bg-yellow-600 text-white font-semibold">Run Test →</button>

        <div id="testResults" class="space-y-2 pt-2 border-t border-gray-800">
          <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest mb-2">Evaluation Results</div>
          <!-- populated by JS -->
        </div>
      </div>
    </div>

  </div>

<script>
(function() {
  GatewayShared.bindThemeToggle();

  const rules = [
    { id: 1, name: 'users-parquet-daily',   priority: 10, match: 'users_*.parquet',        target: 'User',    action: 'Forge pipeline', enabled: true },
    { id: 2, name: 'orders-parquet-daily',  priority: 20, match: 'orders_*.parquet',       target: 'Order',   action: 'Forge pipeline', enabled: true },
    { id: 3, name: 'sessions-parquet',      priority: 30, match: 'sessions_*.parquet',     target: 'Session', action: 'Forge pipeline', enabled: true },
    { id: 4, name: 'page-views-parquet',    priority: 40, match: 'page_views_*.parquet',   target: 'PageView',action: 'Direct loader',  enabled: true },
    { id: 5, name: 'partner-sftp-csv',      priority: 50, match: '/exports/daily/*.csv',   target: 'Order',   action: 'Forge pipeline', enabled: true },
    { id: 6, name: 'crm-blob-exports',      priority: 60, match: 'crm_*.xlsx',             target: 'Contact', action: 'Plugin: Excel',  enabled: false },
    { id: 7, name: 'catch-all-archive',     priority: 999,match: '**/*',                   target: '—',       action: 'Archive only',   enabled: true },
  ];

  let selectedRule = rules[0];

  const ruleList = document.getElementById('ruleList');
  const editorRuleName = document.getElementById('editorRuleName');

  function buildRuleList() {
    ruleList.innerHTML = '';
    rules.forEach(r => {
      const div = document.createElement('div');
      div.className = 'rule-row px-3 py-3' + (r.id === selectedRule.id ? ' selected' : '');
      const actionColor = r.action.startsWith('Forge') ? 'text-yellow-400' : r.action.startsWith('Direct') ? 'text-blue-400' : r.action.startsWith('Archive') ? 'text-gray-500' : 'text-purple-400';
      div.innerHTML = `
        <div class="flex items-center justify-between mb-1">
          <div class="flex items-center gap-2">
            <span class="text-[10px] mono text-gray-600 w-6">#${r.priority}</span>
            <span class="text-xs font-semibold text-gray-200">${r.name}</span>
          </div>
          <span class="w-2 h-2 rounded-full ${r.enabled ? 'bg-emerald-500' : 'bg-gray-600'}"></span>
        </div>
        <div class="pl-8 text-[10px] space-y-0.5">
          <div class="mono text-yellow-500/80">${r.match}</div>
          <div class="flex items-center gap-2 text-gray-500">
            <span class="${actionColor}">${r.action}</span>
            ${r.target !== '—' ? `<span>→</span><span class="text-gray-300 font-medium">${r.target}</span>` : ''}
          </div>
        </div>`;
      div.addEventListener('click', () => {
        selectedRule = r;
        editorRuleName.textContent = r.name;
        buildRuleList();
      });
      ruleList.appendChild(div);
    });
  }

  buildRuleList();

  // Live tester
  const testResults = document.getElementById('testResults');

  function runTest() {
    const filename = document.getElementById('testFilename').value.trim();
    const path = document.getElementById('testPath').value.trim();
    const fp = document.getElementById('testFp').value.trim();

    testResults.innerHTML = '<div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest mb-2">Evaluation Results</div>';

    let matched = false;
    rules.forEach(r => {
      if (!r.enabled) return;
      const globMatch = fnmatch(r.match, filename) || fnmatch(r.match, path + filename);
      const actionColor = r.action.startsWith('Forge') ? 'text-yellow-400' : r.action.startsWith('Direct') ? 'text-blue-400' : r.action.startsWith('Archive') ? 'text-gray-500' : 'text-purple-400';
      const div = document.createElement('div');
      if (globMatch) {
        div.className = 'rounded-md bg-yellow-900/20 border border-yellow-700/30 px-3 py-2 text-[10px]';
        div.innerHTML = `
          <div class="flex items-center justify-between mb-1">
            <span class="font-bold text-yellow-300">${matched ? '(also matches)' : '✓ MATCH'} #${r.priority}</span>
            <span class="mono text-gray-500">${r.name}</span>
          </div>
          <div class="text-gray-400">Pattern: <span class="mono text-yellow-400">${r.match}</span></div>
          <div class="text-gray-400 mt-0.5">Action: <span class="${actionColor} font-medium">${r.action}</span>${r.target !== '—' ? ` → <span class="text-gray-300 font-medium">${r.target}</span>` : ''}</div>
          ${!matched ? '<div class="text-emerald-400 font-semibold mt-1">← First match — this rule will fire</div>' : ''}`;
        matched = true;
      } else {
        div.className = 'flex items-center gap-2 py-1 text-[10px] text-gray-700 opacity-60';
        div.innerHTML = `<span class="w-3 h-3 flex-shrink-0 rounded-sm bg-gray-800 flex items-center justify-center text-[8px] text-gray-600">✗</span><span class="mono truncate">${r.name}</span><span class="mono text-gray-700 truncate">${r.match}</span>`;
      }
      testResults.appendChild(div);
    });

    if (!matched) {
      const d = document.createElement('div');
      d.className = 'rounded-md bg-red-900/20 border border-red-800/40 px-3 py-2 text-[10px] text-red-400';
      d.textContent = 'No rules matched — file would be dropped';
      testResults.appendChild(d);
    }
  }

  // Very simple glob match (supports * and **)
  function fnmatch(pattern, str) {
    const re = pattern.replace(/\*\*/g, '§§').replace(/\*/g, '[^/]*').replace(/§§/g, '.*').replace(/\./g, '\\.').replace(/\?/g, '[^/]');
    return new RegExp('^' + re + '$').test(str);
  }

  document.getElementById('testBtn').addEventListener('click', runTest);
  document.getElementById('testFilename').addEventListener('input', runTest);
  document.getElementById('testPath').addEventListener('input', runTest);
  document.getElementById('testFp').addEventListener('input', runTest);

  runTest();
  lucide.createIcons();
})();
</script>
</body>
</html>
