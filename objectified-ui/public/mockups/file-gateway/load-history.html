<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified File Gateway — Load History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="gateway-shared.js"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-yellow-500 to-amber-400 flex items-center justify-center">
          <i data-lucide="hard-drive-upload" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-yellow-600 dark:text-yellow-400">File Gateway</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-600 dark:text-gray-400">Load History</span>
    </div>
    <div class="flex items-center gap-2">
      <button class="text-xs px-3 py-1.5 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 flex items-center gap-1.5">
        <i data-lucide="download" class="w-3.5 h-3.5"></i> Export CSV
      </button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-6 space-y-5">

    <!-- 30-day chart -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold">Files Loaded — Last 30 Days</h2>
        <div class="flex items-center gap-3 text-[10px]">
          <span class="flex items-center gap-1"><span class="w-3 h-2 rounded-sm bg-emerald-400 inline-block"></span> Success</span>
          <span class="flex items-center gap-1"><span class="w-3 h-2 rounded-sm bg-amber-400 inline-block"></span> Partial</span>
          <span class="flex items-center gap-1"><span class="w-3 h-2 rounded-sm bg-red-400 inline-block"></span> Failed</span>
        </div>
      </div>
      <svg viewBox="0 0 660 120" class="w-full" style="height:120px;">
        <defs>
          <linearGradient id="gy" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4ade80" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#4ade80" stop-opacity="0.1"/>
          </linearGradient>
        </defs>
        <g id="chartBars"></g>
        <line x1="0" y1="110" x2="660" y2="110" stroke="currentColor" stroke-opacity="0.1" stroke-width="1"/>
      </svg>
    </div>

    <!-- Audit table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold">Load Audit Trail</h2>
        <div class="flex items-center gap-2">
          <select class="text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-1.5">
            <option>Last 7 days</option>
            <option selected>Last 30 days</option>
            <option>Last 90 days</option>
          </select>
          <select class="text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-md px-3 py-1.5">
            <option value="">All statuses</option>
            <option>Success</option>
            <option>Failed</option>
            <option>Partial</option>
          </select>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/30 text-gray-500">
              <th class="text-left px-3 py-2 font-medium">Loaded at</th>
              <th class="text-left px-3 py-2 font-medium">Filename</th>
              <th class="text-left px-3 py-2 font-medium">Source</th>
              <th class="text-left px-3 py-2 font-medium">Format</th>
              <th class="text-right px-3 py-2 font-medium">Rows loaded</th>
              <th class="text-left px-3 py-2 font-medium">Target Class</th>
              <th class="text-left px-3 py-2 font-medium">Routing rule</th>
              <th class="text-left px-3 py-2 font-medium">Dedup</th>
              <th class="text-left px-3 py-2 font-medium">Outcome</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody id="historyTable" class="divide-y divide-gray-50 dark:divide-gray-700/40"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    GatewayShared.bindThemeToggle();

    // Build bar chart
    const days = 30;
    const svgG = document.getElementById('chartBars');
    const barW = Math.floor(640 / days) - 2;
    for (let i = 0; i < days; i++) {
      const successH = Math.floor(Math.random() * 60 + 30);
      const partialH = Math.floor(Math.random() * 8 + 2);
      const failedH  = Math.floor(Math.random() * 6);
      const totalH = successH + partialH + failedH;
      const x = 10 + i * (barW + 2);
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      [
        { h: successH, color: '#4ade80' },
        { h: partialH, color: '#fbbf24' },
        { h: failedH,  color: '#f87171' },
      ].reduce((yOffset, seg) => {
        if (seg.h === 0) return yOffset;
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x);
        rect.setAttribute('y', 110 - yOffset - seg.h);
        rect.setAttribute('width', barW);
        rect.setAttribute('height', seg.h);
        rect.setAttribute('fill', seg.color);
        rect.setAttribute('rx', '1');
        rect.setAttribute('opacity', '0.7');
        g.appendChild(rect);
        return yOffset + seg.h;
      }, 0);
      svgG.appendChild(g);
    }

    // Build table
    const files = [
      { ts:'2026-05-13 01:14:22', name:'users_2026-05-13.parquet',   src:'S3',        fmt:'Parquet', rows:142300, cls:'User',    rule:'users-parquet-daily', dedup:'New',       outcome:'Success' },
      { ts:'2026-05-13 01:12:04', name:'orders_2026-05-13.parquet',  src:'S3',        fmt:'Parquet', rows:98000,  cls:'Order',   rule:'orders-parquet-daily',dedup:'New',       outcome:'Success' },
      { ts:'2026-05-13 00:45:11', name:'sessions_2026-05-13.parquet',src:'GCS',       fmt:'Parquet', rows:310000, cls:'Session', rule:'sessions-parquet',    dedup:'New',       outcome:'Success' },
      { ts:'2026-05-12 22:30:00', name:'users_2026-05-12.parquet',   src:'S3',        fmt:'Parquet', rows:0,      cls:'User',    rule:'users-parquet-daily', dedup:'Duplicate', outcome:'Skipped' },
      { ts:'2026-05-12 14:20:03', name:'crm_contacts_may.xlsx',      src:'SFTP',      fmt:'Excel',   rows:12440,  cls:'Contact', rule:'catch-all-archive',   dedup:'New',       outcome:'Partial' },
      { ts:'2026-05-12 09:04:44', name:'inventory_2026-05-11.csv',   src:'Azure Blob',fmt:'CSV',     rows:5001,   cls:'Product', rule:'partner-sftp-csv',    dedup:'New',       outcome:'Success' },
      { ts:'2026-05-12 08:55:18', name:'events_2026-05-12.jsonl',    src:'GCS',       fmt:'JSON Lines',rows:0,   cls:'—',       rule:'catch-all-archive',   dedup:'New',       outcome:'Failed' },
      { ts:'2026-05-11 01:00:04', name:'users_2026-05-11.parquet',   src:'S3',        fmt:'Parquet', rows:139800, cls:'User',    rule:'users-parquet-daily', dedup:'New',       outcome:'Success' },
    ];

    const tbody = document.getElementById('historyTable');
    files.forEach(f => {
      const outcomeColors = {
        'Success':'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400',
        'Failed':'bg-red-100 dark:bg-red-900/30 text-red-500',
        'Partial':'bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400',
        'Skipped':'bg-gray-100 dark:bg-gray-700 text-gray-400',
      };
      const dedupColor = f.dedup === 'Duplicate' ? 'text-amber-500' : 'text-gray-400';
      const tr = document.createElement('tr');
      tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/20';
      tr.innerHTML = `
        <td class="px-3 py-1.5 mono text-[10px] text-gray-400">${f.ts}</td>
        <td class="px-3 py-1.5 mono text-[10px] text-gray-700 dark:text-gray-300 max-w-[160px] truncate">${f.name}</td>
        <td class="px-3 py-1.5 text-gray-500">${f.src}</td>
        <td class="px-3 py-1.5"><span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-500">${f.fmt}</span></td>
        <td class="px-3 py-1.5 text-right mono font-medium ${f.rows ? '' : 'text-gray-400'}">${f.rows ? f.rows.toLocaleString() : '—'}</td>
        <td class="px-3 py-1.5 font-medium text-gray-700 dark:text-gray-200">${f.cls}</td>
        <td class="px-3 py-1.5 mono text-[10px] text-yellow-500 dark:text-yellow-400 truncate max-w-[120px]">${f.rule}</td>
        <td class="px-3 py-1.5 ${dedupColor} font-medium">${f.dedup}</td>
        <td class="px-3 py-1.5"><span class="text-[10px] px-2 py-0.5 rounded-full ${outcomeColors[f.outcome]} font-medium">${f.outcome}</span></td>
        <td class="px-3 py-1.5 text-right"><a href="#" class="text-[10px] text-yellow-500 hover:underline">Details</a></td>`;
      tbody.appendChild(tr);
    });

    lucide.createIcons();
  </script>
</body>
</html>
