<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Data Profile — Dataset Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="data-profile-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-violet-500 to-fuchsia-600 flex items-center justify-center">
          <i data-lucide="bar-chart-2" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-violet-600 dark:text-violet-400">Data Profile</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Dataset Catalog</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-violet-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-6 space-y-5">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold">Dataset Catalog</h1>
        <p class="text-xs text-gray-400 mt-0.5">All profiled datasets across connected sources</p>
      </div>
      <div class="flex items-center gap-2">
        <input type="text" placeholder="Search datasets…" class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5 w-48 focus:outline-none focus:border-violet-400" />
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
          <option>All sources</option><option>pg_prod</option><option>snowflake_dw</option><option>mysql_app</option><option>s3_files</option>
        </select>
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
          <option>All PII</option><option>Has PII</option><option>No PII</option>
        </select>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
      <table class="w-full text-xs">
        <thead class="bg-gray-50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
          <tr>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Dataset</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Source</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Rows</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Cols</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">PII</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Avg Null%</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Quality</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Last Profiled</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody id="catalogBody" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
      </table>
    </div>
  </div>

  <script>
    DataProfileShared.bindThemeToggle();

    const datasets = [
      { name:'orders', source:'pg_prod', icon:'🐘', rows:'14,822', cols:5, pii:1, avgNull:0.3, quality:96, lastProfiled:'2026-05-13 20:41', status:'clean' },
      { name:'users', source:'pg_prod', icon:'🐘', rows:'89,432', cols:8, pii:5, avgNull:27.1, quality:72, lastProfiled:'2026-05-13 20:38', status:'anomaly' },
      { name:'transactions', source:'snowflake_dw', icon:'❄️', rows:'4,482,910', cols:6, pii:2, avgNull:4.2, quality:91, lastProfiled:'2026-05-13 19:55', status:'clean' },
      { name:'products', source:'pg_prod', icon:'🐘', rows:'15,200', cols:12, pii:0, avgNull:1.8, quality:98, lastProfiled:'2026-05-13 19:40', status:'clean' },
      { name:'sessions', source:'mysql_app', icon:'🐬', rows:'241,088', cols:7, pii:1, avgNull:8.4, quality:84, lastProfiled:'2026-05-13 19:30', status:'warning' },
      { name:'contacts', source:'mysql_app', icon:'🐬', rows:'71,672', cols:9, pii:3, avgNull:12.3, quality:79, lastProfiled:'2026-05-13 18:50', status:'anomaly' },
      { name:'events_raw', source:'s3_files', icon:'☁️', rows:'18,200,000', cols:14, pii:1, avgNull:2.1, quality:94, lastProfiled:'2026-05-13 18:20', status:'clean' },
      { name:'page_views', source:'s3_files', icon:'☁️', rows:'94,300,000', cols:11, pii:1, avgNull:5.7, quality:88, lastProfiled:'2026-05-13 17:45', status:'warning' },
      { name:'inventory', source:'pg_prod', icon:'🐘', rows:'8,200', cols:10, pii:0, avgNull:4.2, quality:95, lastProfiled:'2026-05-13 17:20', status:'clean' },
      { name:'campaigns', source:'snowflake_dw', icon:'❄️', rows:'2,841', cols:22, pii:0, avgNull:18.4, quality:77, lastProfiled:'2026-05-13 16:55', status:'warning' },
      { name:'refunds', source:'pg_prod', icon:'🐘', rows:'4,219', cols:8, pii:1, avgNull:3.1, quality:93, lastProfiled:'2026-05-13 16:30', status:'clean' },
      { name:'api_logs', source:'s3_files', icon:'☁️', rows:'1,248,000,000', cols:9, pii:1, avgNull:0.8, quality:97, lastProfiled:'2026-05-13 15:00', status:'clean' },
    ];

    const qColor = q => q >= 90 ? 'text-emerald-600 dark:text-emerald-400' : q >= 80 ? 'text-amber-600 dark:text-amber-400' : 'text-red-600 dark:text-red-400';
    const statusBadge = {
      clean: 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400',
      warning: 'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400',
      anomaly: 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400',
    };
    const statusLabel = { clean:'✓ Clean', warning:'⚠ Warning', anomaly:'⚠ Anomaly' };

    const tbody = document.getElementById('catalogBody');
    datasets.forEach(d => {
      const tr = document.createElement('tr');
      tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/30';
      const nullColor = d.avgNull > 20 ? 'text-red-500' : d.avgNull > 10 ? 'text-amber-500' : 'text-gray-600 dark:text-gray-400';
      tr.innerHTML = `
        <td class="px-4 py-3">
          <div class="flex items-center gap-2">
            <span class="text-base">${d.icon}</span>
            <a href="column-profiler.html" class="mono text-[11px] font-semibold text-violet-600 dark:text-violet-400 hover:underline">${d.name}</a>
          </div>
        </td>
        <td class="px-4 py-3 mono text-[10px] text-gray-400">${d.source}</td>
        <td class="px-4 py-3 text-right mono text-[11px] text-gray-600 dark:text-gray-300">${d.rows}</td>
        <td class="px-4 py-3 text-right text-[11px] text-gray-600 dark:text-gray-300">${d.cols}</td>
        <td class="px-4 py-3 text-right text-[11px] ${d.pii > 0 ? 'text-red-500 font-semibold' : 'text-gray-400'}">${d.pii > 0 ? d.pii : '—'}</td>
        <td class="px-4 py-3 text-right mono text-[11px] ${nullColor}">${d.avgNull}%</td>
        <td class="px-4 py-3">
          <div class="flex items-center gap-2">
            <div class="flex-1 bg-gray-100 dark:bg-gray-700 rounded-full h-1.5 w-16">
              <div class="h-full rounded-full ${d.quality >= 90 ? 'bg-emerald-400' : d.quality >= 80 ? 'bg-amber-400' : 'bg-red-400'}" style="width:${d.quality}%"></div>
            </div>
            <span class="mono text-[10px] ${qColor(d.quality)}">${d.quality}</span>
          </div>
        </td>
        <td class="px-4 py-3 text-[10px] text-gray-400">${d.lastProfiled}</td>
        <td class="px-4 py-3">
          <div class="flex items-center gap-1.5">
            <a href="column-profiler.html" class="text-[10px] px-2 py-0.5 rounded border border-violet-200 dark:border-violet-700 text-violet-600 dark:text-violet-400 hover:bg-violet-50 dark:hover:bg-violet-900/20">Profile</a>
            <a href="schema-wizard.html" class="text-[10px] px-2 py-0.5 rounded border border-gray-200 dark:border-gray-600 text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700">Wizard</a>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    lucide.createIcons();
  </script>
</body>
</html>
