  <style>
    html, body { font-family: 'Inter', sans-serif; overflow: hidden; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .grid-bg-dark {
      background-color: #030712;
      background-image: radial-gradient(circle, #334155 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .col-row { cursor: pointer; transition: background 0.12s; }
    .col-row.selected { background: rgba(167,139,250,0.12); border-left: 2px solid #a78bfa; }
    .col-row:not(.selected):hover { background: rgba(255,255,255,0.04); }
    .hist-bar { transition: width 0.5s ease; }
    .scan-entry { animation: fadeSlideIn 0.3s ease; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .pii-pulse { animation: piiBlink 2s infinite; }
    @keyframes piiBlink { 0%,100% { opacity:1; } 50% { opacity:0.55; } }
  </style>
</head>

      <div class="mono text-[10px] text-gray-500">scan events: <span id="scanCount" class="text-violet-400">0</span></div>

        <i data-lucide="pause" class="w-3 h-3"></i> Pause

      </button>
      <div class="w-8 h-8 rounded-full bg-violet-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>

  <!-- 3-pane layout -->
  <div class="flex" style="height: calc(100vh - 48px);">

    <!-- LEFT: Dataset tree / column list -->

        </label>

    </div>

    <div class="flex-1 flex flex-col overflow-hidden grid-bg-dark">

    let selDsId = 'orders';
    let selColName = 'customer_email';
    let paused = false;
    let scanCount = 0;

    function getSel() {
      const ds = datasets.find(d => d.id === selDsId);
      const col = ds ? ds.columns.find(c => c.name === selColName) : null;
      return { ds, col };
    }

    function allPiiCols() {
      const r = [];
      datasets.forEach(ds => ds.columns.filter(c => c.pii).forEach(c => r.push({ ds, col: c })));
      return r;
    }
    function allCols() {
      const r = [];
      datasets.forEach(ds => ds.columns.forEach(c => r.push({ ds, col: c })));
      return r;
    }

    function buildTree() {
      const filter = document.getElementById('colFilter').value.toLowerCase();
      const piiOnly = document.getElementById('piiToggle').checked;
      const tree = document.getElementById('dsTree');
      tree.innerHTML = '';

      datasets.forEach(ds => {
        const cols = ds.columns.filter(c => {
          if (piiOnly && !c.pii) return false;
          if (filter && !c.name.includes(filter) && !ds.id.includes(filter)) return false;
          return true;
        });
        if (!cols.length) return;

        const section = document.createElement('div');
        section.className = 'mb-2';
        section.innerHTML = `
          <div class="px-3 pt-3 pb-1 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i data-lucide="database" class="w-3 h-3 text-gray-600"></i>
              <span class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide">${ds.id}</span>
              <span class="mono text-[9px] text-gray-600">${ds.source}</span>
            </div>
            <span class="mono text-[9px] text-gray-600">${ds.rows.toLocaleString()}</span>
          </div>
        `;

        cols.forEach(col => {
          const isSel = ds.id === selDsId && col.name === selColName;
          const el = document.createElement('div');
          el.className = `col-row px-3 py-2 ml-1 rounded-lg ${isSel ? 'selected' : ''}`;
          el.dataset.dsId = ds.id;
          el.dataset.colName = col.name;
          const nullColor = col.nullPct > 20 ? 'text-red-400' : col.nullPct > 5 ? 'text-amber-400' : 'text-gray-600';
          el.innerHTML = `
            <div class="flex items-center gap-1.5 mb-0.5">
              ${col.pii ? `<span class="pii-pulse w-1.5 h-1.5 rounded-full bg-red-400 flex-shrink-0"></span>` : `<span class="w-1.5 h-1.5 rounded-full bg-gray-700 flex-shrink-0"></span>`}
              <span class="text-[11px] font-medium text-gray-200 truncate">${col.name}</span>
            </div>
            <div class="flex items-center gap-2 pl-3">
              <span class="mono text-[9px] text-gray-500 truncate">${col.type}</span>
              ${col.nullPct > 0 ? `<span class="mono text-[9px] ${nullColor}">${col.nullPct}% null</span>` : ''}
              ${col.pii ? `<span class="text-[8px] px-1 py-0.5 rounded bg-red-900/50 text-red-400 flex-shrink-0">${col.pii.type}</span>` : ''}
            </div>
          `;
          section.appendChild(el);
        });
        tree.appendChild(section);
      });
      lucide.createIcons();
    }

    document.getElementById('dsTree').addEventListener('click', e => {
      const row = e.target.closest('[data-col-name]');
      if (!row) return;
      selDsId = row.dataset.dsId;
      selColName = row.dataset.colName;
      buildTree();
      buildCenter();
    });

    document.getElementById('colFilter').addEventListener('input', () => buildTree());
    document.getElementById('piiToggle').addEventListener('change', () => buildTree());

    function histBarColor(label) {
      if (label === 'null' || label.startsWith('null')) return 'bg-red-500/50';
      return 'bg-violet-500/70';
    }

    function buildCenter() {
      const { ds, col } = getSel();
      if (!col || !ds) return;

      const center = document.getElementById('centerPane');
      const maxPct = Math.max(...col.hist.map(h => h.pct));
      const piiHtml = col.pii ? `
        <span class="pii-pulse flex items-center gap-1 px-2 py-1 rounded-md bg-red-900/40 border border-red-700/60 text-red-400 text-[10px] font-semibold">
          <i data-lucide="shield-alert" class="w-3 h-3"></i>
          ${col.pii.type} — ${col.pii.confidence}% conf
        </span>` : '';

      const histHtml = col.hist.map(h => {
        const isNull = h.label === 'null' || h.label.startsWith('null');
        const barColor = isNull ? 'bg-red-500/55' : 'bg-violet-500/70';
        const labelColor = isNull ? 'text-red-400' : 'text-gray-400';
        const width = ((h.pct / maxPct) * 100).toFixed(1);
        return `
          <div class="flex items-center gap-2 mb-1.5">
            <div class="w-28 text-right mono text-[10px] ${labelColor} truncate flex-shrink-0">${h.label}</div>
            <div class="flex-1 bg-gray-800 rounded h-5 overflow-hidden">
              <div class="hist-bar h-full ${barColor} rounded" style="width:${width}%"></div>
            </div>
            <div class="w-10 text-right mono text-[10px] ${isNull ? 'text-red-400' : 'text-gray-400'}">${h.pct}%</div>
            <div class="w-16 text-right mono text-[9px] text-gray-600">${h.n ? h.n.toLocaleString() : ''}</div>
          </div>`;
      }).join('');

      const colorMap = { sky:'bg-sky-500', emerald:'bg-emerald-500', amber:'bg-amber-400', red:'bg-red-500', violet:'bg-violet-500', indigo:'bg-indigo-500', gray:'bg-gray-600' };
      const patternHtml = col.patterns.map(p => {
        const bg = colorMap[p.color] || 'bg-violet-500';
        return `
          <div class="flex items-center gap-2 mb-1.5">
            <div class="w-44 text-right mono text-[10px] text-gray-400 truncate flex-shrink-0">${p.label}</div>
            <div class="flex-1 bg-gray-800 rounded h-3.5 overflow-hidden">
              <div class="h-full ${bg}/60 rounded" style="width:${p.pct}%"></div>
            </div>
            <div class="w-10 text-right mono text-[10px] text-gray-400">${p.pct}%</div>
          </div>`;
      }).join('');

      const topValsHtml = col.topVals ? `
        <div class="bg-gray-900/60 border border-gray-800 rounded-xl p-4 mb-4">
          <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest mb-3">Top Values</div>
          ${col.topVals.map((v, i) => `
            <div class="flex items-center gap-2 mb-1.5">
              <span class="w-5 mono text-[9px] text-gray-600">#${i+1}</span>
              <span class="mono text-[11px] text-gray-300">${v}</span>
            </div>`).join('')}
        </div>` : '';

      const distinctPct = col.cardinality ? ((col.cardinality / ds.rows) * 100).toFixed(1) + '%' : 'N/A';
      const nullColor = col.nullPct > 20 ? 'text-red-400' : col.nullPct > 5 ? 'text-amber-400' : col.nullPct > 0 ? 'text-yellow-400' : 'text-emerald-400';
      const statCards = [
        { label: 'Null Rate', value: col.nullPct + '%', color: nullColor },
        { label: 'Cardinality', value: col.cardinality ? col.cardinality.toLocaleString() : 'N/A', color: 'text-gray-100' },
        { label: 'Distinct %', value: distinctPct, color: 'text-gray-100' },
        { label: 'Min', value: col.min != null ? String(col.min) : 'N/A', color: 'text-gray-100' },
        { label: 'Max', value: col.max != null ? String(col.max) : 'N/A', color: 'text-gray-100' },
        { label: col.stddev != null ? 'Std Dev' : 'Avg Len', value: col.stddev != null ? col.stddev.toLocaleString() : (col.avgLen != null ? col.avgLen + ' ch' : 'N/A'), color: 'text-gray-100' },
        { label: 'Mean', value: col.mean != null ? col.mean.toLocaleString() : 'N/A', color: 'text-gray-100' },
        { label: 'Hist Buckets', value: col.hist.length, color: 'text-violet-400' },
      ];

      center.innerHTML = `
        <div class="max-w-2xl mx-auto">
          <!-- Header -->
          <div class="flex items-start justify-between mb-6">
            <div>
              <div class="flex items-center gap-2 flex-wrap mb-1">
                <h2 class="text-xl font-bold text-white">${ds.id}<span class="text-gray-600">.</span>${col.name}</h2>
                <span class="mono text-[10px] px-2 py-1 rounded bg-gray-800 border border-gray-700 text-gray-400">${col.type}</span>
                ${piiHtml}
              </div>
              <div class="mono text-[10px] text-gray-500">${ds.source} · ${ds.rows.toLocaleString()} rows · profiled ${ds.profiled}</div>
            </div>
            <a href="schema-wizard.html" class="text-[10px] px-3 py-1.5 rounded-md border border-gray-700 text-gray-500 hover:border-violet-600 hover:text-violet-400 transition-colors flex-shrink-0">Schema Wizard →</a>
          </div>

          <!-- Stat cards -->
          <div class="grid grid-cols-4 gap-2 mb-4">
            ${statCards.map(s => `
              <div class="bg-gray-900/70 border border-gray-800 rounded-lg p-3 text-center">
                <div class="mono text-sm font-bold ${s.color} truncate">${s.value}</div>
                <div class="text-[9px] text-gray-600 mt-0.5">${s.label}</div>
              </div>`).join('')}
          </div>

          <!-- Histogram -->
          <div class="bg-gray-900/60 border border-gray-800 rounded-xl p-5 mb-4">
            <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest mb-4">Distribution</div>
            ${histHtml}
          </div>

          <!-- Pattern Frequency -->
          <div class="bg-gray-900/60 border border-gray-800 rounded-xl p-5 mb-4">
            <div class="text-[10px] text-gray-500 font-semibold uppercase tracking-widest mb-4">Pattern Frequency</div>
            ${patternHtml}
          </div>

          ${topValsHtml}

          <!-- Inference box -->
          <div class="bg-violet-900/20 border border-violet-800/40 rounded-xl p-4 flex items-start justify-between gap-4">
            <div>
              <div class="text-[10px] text-violet-400 font-semibold uppercase tracking-widest mb-1">Recommended objectified Type</div>
              <div class="mono text-sm font-bold text-violet-300">${col.recommendedType}</div>
              ${col.pii ? `<div class="text-[10px] text-red-400 mt-1.5 flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> PII field — apply masking policy in Data Shield</div>` : ''}
            </div>
            <a href="schema-wizard.html" class="flex-shrink-0 text-[10px] px-3 py-2 rounded-md bg-violet-600 hover:bg-violet-700 text-white font-semibold transition-colors">Create Property →</a>
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    // Scan log
    const piiCols = allPiiCols();
    const allColsList = allCols();
    const scanTypes = [
      () => { const { ds, col } = allColsList[Math.floor(Math.random() * allColsList.length)]; return { badge:'histogram', badgeColor:'bg-violet-900/50 text-violet-400', text:`${ds.id}.${col.name} → ${col.hist.length} buckets` }; },
      () => { const { ds, col } = allColsList[Math.floor(Math.random() * allColsList.length)]; return { badge:'null-check', badgeColor:'bg-gray-800 text-gray-400', text:`${ds.id}.${col.name} → ${col.nullPct}%` }; },
      () => { const { ds, col } = allColsList[Math.floor(Math.random() * allColsList.length)]; return { badge:'cardinality', badgeColor:'bg-sky-900/50 text-sky-400', text:`${ds.id}.${col.name} → ${col.cardinality ? col.cardinality.toLocaleString() : 'N/A'}` }; },
      () => { if (!piiCols.length) return null; const { ds, col } = piiCols[Math.floor(Math.random() * piiCols.length)]; return { badge:'PII', badgeColor:'bg-red-900/50 text-red-400', text:`${ds.id}.${col.name} → ${col.pii.type} ${col.pii.confidence}%` }; },
      () => { const ds = datasets[Math.floor(Math.random() * datasets.length)]; const rate = (Math.random() * 2000 + 500).toFixed(0); return { badge:'sampling', badgeColor:'bg-emerald-900/50 text-emerald-400', text:`${ds.id} → ${rate} rows/s` }; },
    ];

    function addScanEntry() {
      if (paused) return;
      const gen = scanTypes[Math.floor(Math.random() * scanTypes.length)]();
      if (!gen) return;
      const now = new Date();
      const ts = now.toTimeString().slice(0, 8);
      const log = document.getElementById('scanLog');
      const entry = document.createElement('div');
      entry.className = 'scan-entry flex items-start gap-1.5 px-3 py-2 text-[10px] mono';
      entry.innerHTML = `
        <span class="text-gray-600 w-14 flex-shrink-0">${ts}</span>
        <span class="px-1.5 py-0.5 rounded text-[9px] ${gen.badgeColor} flex-shrink-0">${gen.badge}</span>
        <span class="text-gray-400 truncate">${gen.text}</span>
      `;
      log.insertBefore(entry, log.firstChild);
      while (log.children.length > 60) log.removeChild(log.lastChild);
      scanCount++;
      document.getElementById('scanCount').textContent = scanCount;
    }

    // Init
    buildTree();
    buildCenter();
    for (let i = 0; i < 16; i++) addScanEntry();
    const liveInterval = setInterval(addScanEntry, 2200);

    document.getElementById('pauseBtn').addEventListener('click', function() {
      paused = !paused;
      this.innerHTML = paused
        ? '<i data-lucide="play" class="w-3 h-3"></i> Resume'
        : '<i data-lucide="pause" class="w-3 h-3"></i> Pause';
      lucide.createIcons();
    });

    lucide.createIcons();
  </script>
</body>
</html>
