<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Data Profile — Profile Runs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="data-profile-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-violet-500 to-fuchsia-600 flex items-center justify-center">
          <i data-lucide="bar-chart-2" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-violet-600 dark:text-violet-400">Data Profile</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Profile Runs</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-violet-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-6 space-y-5">
    <div class="flex items-center justify-between">
      <h1 class="text-lg font-bold">Profile Runs</h1>
      <div class="flex items-center gap-2">
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
          <option>Last 24 hours</option><option>Last 7 days</option><option>Last 30 days</option>
        </select>
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
          <option>All datasets</option><option>orders</option><option>users</option><option>transactions</option>
        </select>
        <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
          <option>All statuses</option><option>Completed</option><option>Failed</option><option>Running</option>
        </select>
      </div>
    </div>

    <!-- KPIs -->
    <div class="grid grid-cols-5 gap-3">
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-gray-700 dark:text-gray-200">87</div>
        <div class="text-[10px] text-gray-400">Runs (24h)</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-emerald-500">84</div>
        <div class="text-[10px] text-gray-400">Completed</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-red-500">3</div>
        <div class="text-[10px] text-gray-400">Failed</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-violet-500">4.2B</div>
        <div class="text-[10px] text-gray-400">Rows sampled</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
        <div class="text-xl font-bold text-gray-700 dark:text-gray-200">38s</div>
        <div class="text-[10px] text-gray-400">Avg duration</div>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
      <table class="w-full text-xs">
        <thead class="bg-gray-50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
          <tr>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Run ID</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Dataset</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Source</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Rows Sampled</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Cols</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">PII Found</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Duration</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Started</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Status</th>
          </tr>
        </thead>
        <tbody id="runsBody" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
      </table>
    </div>
  </div>

  <script>
    DataProfileShared.bindThemeToggle();

    const runs = [
      { id:'PRF-2847', ds:'orders', src:'pg_prod', rows:'14,822', cols:5, pii:1, dur:'12s', started:'20:41:03', status:'completed' },
      { id:'PRF-2846', ds:'users', src:'pg_prod', rows:'89,432', cols:8, pii:5, dur:'41s', started:'20:38:11', status:'completed' },
      { id:'PRF-2845', ds:'transactions', src:'snowflake_dw', rows:'100,000', cols:6, pii:2, dur:'1m 24s', started:'19:55:30', status:'completed' },
      { id:'PRF-2844', ds:'products', src:'pg_prod', rows:'15,200', cols:12, pii:0, dur:'18s', started:'19:40:22', status:'completed' },
      { id:'PRF-2843', ds:'sessions', src:'mysql_app', rows:'100,000', cols:7, pii:1, dur:'38s', started:'19:30:15', status:'completed' },
      { id:'PRF-2842', ds:'contacts', src:'mysql_app', rows:'71,672', cols:9, pii:3, dur:'44s', started:'18:50:09', status:'completed' },
      { id:'PRF-2841', ds:'events_raw', src:'s3_files', rows:'100,000', cols:14, pii:1, dur:'2m 11s', started:'18:20:44', status:'completed' },
      { id:'PRF-2840', ds:'api_logs', src:'s3_files', rows:'100,000', cols:9, pii:1, dur:'55s', started:'15:00:01', status:'completed' },
      { id:'PRF-2839', ds:'page_views', src:'s3_files', rows:'100,000', cols:11, pii:1, dur:'1m 03s', started:'17:45:18', status:'completed' },
      { id:'PRF-2838', ds:'campaigns', src:'snowflake_dw', rows:'2,841', cols:22, pii:0, dur:'28s', started:'16:55:34', status:'completed' },
      { id:'PRF-2837', ds:'inventory', src:'pg_prod', rows:'8,200', cols:10, pii:0, dur:'9s', started:'17:20:57', status:'completed' },
      { id:'PRF-2836', ds:'refunds', src:'pg_prod', rows:'4,219', cols:8, pii:1, dur:'8s', started:'16:30:22', status:'completed' },
      { id:'PRF-2835', ds:'orders_archive', src:'s3_files', rows:'0', cols:0, pii:0, dur:'—', started:'14:10:08', status:'failed', error:'S3 credentials expired' },
      { id:'PRF-2834', ds:'user_events', src:'mysql_app', rows:'0', cols:0, pii:0, dur:'—', started:'13:44:19', status:'failed', error:'Connection timeout after 30s' },
    ];

    const statusBadge = {
      completed: 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400',
      failed: 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400',
      running: 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400',
    };

    const tbody = document.getElementById('runsBody');
    runs.forEach(r => {
      const tr = document.createElement('tr');
      tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/30' + (r.status === 'failed' ? ' bg-red-50/30 dark:bg-red-900/5' : '');
      tr.innerHTML = `
        <td class="px-4 py-2.5 mono text-[10px] text-gray-400">${r.id}</td>
        <td class="px-4 py-2.5">
          <a href="column-profiler.html" class="mono text-[11px] font-semibold text-violet-600 dark:text-violet-400 hover:underline">${r.ds}</a>
        </td>
        <td class="px-4 py-2.5 mono text-[10px] text-gray-400">${r.src}</td>
        <td class="px-4 py-2.5 text-right mono text-[11px] text-gray-600 dark:text-gray-300">${r.rows}</td>
        <td class="px-4 py-2.5 text-right text-[11px] text-gray-600 dark:text-gray-300">${r.cols || '—'}</td>
        <td class="px-4 py-2.5 text-right text-[11px] ${r.pii > 0 ? 'text-red-500 font-semibold' : 'text-gray-400'}">${r.pii > 0 ? r.pii : '—'}</td>
        <td class="px-4 py-2.5 text-right mono text-[11px] text-gray-500">${r.dur}</td>
        <td class="px-4 py-2.5 mono text-[10px] text-gray-400">${r.started}</td>
        <td class="px-4 py-2.5">
          <div>
            <span class="text-[10px] px-2 py-0.5 rounded-full ${statusBadge[r.status]} font-medium">${r.status}</span>
            ${r.error ? `<div class="mono text-[9px] text-red-400 mt-0.5">${r.error}</div>` : ''}
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    lucide.createIcons();
  </script>
</body>
</html>
