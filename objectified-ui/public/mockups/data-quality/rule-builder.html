<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Quality — Rule Builder ★</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="data-quality-shared.js"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; overflow: hidden; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .grid-bg-dark {
      background-color: #030712;
      background-image: radial-gradient(circle, #334155 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .rule-row { cursor: pointer; transition: background 0.12s; }
    .rule-row.selected { background: rgba(251,146,60,0.12); border-left: 2px solid #fb923c; }
    .rule-row:not(.selected):hover { background: rgba(255,255,255,0.04); }
    .event-entry { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }
    .counter-bump { animation: bump 0.35s ease; }
    @keyframes bump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); color: #fb923c; } }
    .gate-bar { transition: width 0.6s ease; }
    .row-card { animation: slideRight 0.3s ease; }
    @keyframes slideRight { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">

  <!-- Nav -->
  <div class="h-12 border-b border-gray-800 bg-gray-900 flex items-center justify-between px-4 z-10 relative">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-orange-600 to-red-500 flex items-center justify-center">
          <i data-lucide="list-checks" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-600">/</span>
      <span class="text-sm font-medium text-orange-400">Quality</span>
      <span class="text-xs text-gray-600">/</span>
      <span class="text-sm text-gray-400">Rule Builder</span>
      <span class="text-[9px] px-1.5 py-0.5 rounded-full bg-amber-500/20 text-amber-400 font-bold ml-1">★ star</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="mono text-[10px] text-gray-500">processed: <span id="processedCount" class="text-orange-400">0</span></div>
      <button id="pauseBtn" class="text-[10px] px-2.5 py-1 rounded bg-gray-800 hover:bg-gray-700 text-gray-400 border border-gray-700 flex items-center gap-1">
        <i data-lucide="pause" class="w-3 h-3"></i> Pause
      </button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-700 hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <!-- 3-pane layout -->
  <div class="flex" style="height:calc(100vh - 48px); overflow:hidden;">

    <!-- LEFT: Rule tree -->
    <div class="w-64 border-r border-gray-800 bg-gray-900 flex flex-col flex-shrink-0 overflow-hidden">
      <div class="px-3 py-2.5 border-b border-gray-800">
        <input type="text" placeholder="Search rules…" class="w-full text-[10px] bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-gray-300 placeholder-gray-600 focus:outline-none focus:border-orange-500" />
      </div>
      <div class="px-3 py-2 border-b border-gray-800 flex items-center gap-1.5 flex-wrap">
        <button class="text-[9px] px-1.5 py-0.5 rounded bg-orange-500/20 text-orange-400 border border-orange-500/30">All</button>
        <button class="text-[9px] px-1.5 py-0.5 rounded bg-gray-800 text-gray-500 border border-gray-700 hover:border-orange-500/40">active</button>
        <button class="text-[9px] px-1.5 py-0.5 rounded bg-gray-800 text-gray-500 border border-gray-700 hover:border-orange-500/40">failing</button>
        <button class="text-[9px] px-1.5 py-0.5 rounded bg-gray-800 text-gray-500 border border-gray-700 hover:border-orange-500/40">disabled</button>
      </div>
      <div class="flex-1 overflow-y-auto" id="ruleTree"></div>
    </div>

    <!-- CENTER: Live validation canvas -->
    <div class="flex-1 grid-bg-dark flex flex-col overflow-hidden">

      <!-- Counter bar -->
      <div class="border-b border-gray-800/60 bg-gray-950/80 px-5 py-2 flex items-center gap-6">
        <div class="text-center">
          <div id="cntProcessed" class="mono text-lg font-bold text-gray-200">0</div>
          <div class="text-[9px] text-gray-500 uppercase tracking-wide">Processed</div>
        </div>
        <div class="text-center">
          <div id="cntPassed" class="mono text-lg font-bold text-emerald-400">0</div>
          <div class="text-[9px] text-gray-500 uppercase tracking-wide">Passed</div>
        </div>
        <div class="text-center">
          <div id="cntRejected" class="mono text-lg font-bold text-red-400">0</div>
          <div class="text-[9px] text-gray-500 uppercase tracking-wide">Rejected</div>
        </div>
        <div class="text-center">
          <div id="cntQuarantined" class="mono text-lg font-bold text-amber-400">0</div>
          <div class="text-[9px] text-gray-500 uppercase tracking-wide">Quarantined</div>
        </div>
        <div class="text-center">
          <div id="cntCleansed" class="mono text-lg font-bold text-sky-400">0</div>
          <div class="text-[9px] text-gray-500 uppercase tracking-wide">Cleansed</div>
        </div>
        <div class="flex-1"></div>
        <div class="text-right">
          <div id="passRatePct" class="mono text-lg font-bold text-orange-400">—</div>
          <div class="text-[9px] text-gray-500 uppercase tracking-wide">Pass rate</div>
        </div>
        <div class="w-24">
          <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
            <div id="passRateBar" class="h-full rounded-full gate-bar bg-gradient-to-r from-orange-500 to-emerald-500" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Rule gates panel -->
      <div class="border-b border-gray-800/60 bg-gray-950/60 px-5 py-3">
        <div class="text-[9px] text-gray-500 uppercase tracking-widest mb-2">Rule Gates — <span id="selRuleName" class="text-orange-400">Select a rule</span></div>
        <div id="gatesPanel" class="space-y-1.5"></div>
      </div>

      <!-- Recent row stream -->
      <div class="flex-1 overflow-hidden flex flex-col px-5 py-3">
        <div class="text-[9px] text-gray-500 uppercase tracking-widest mb-2">Live Row Stream</div>
        <div id="rowStream" class="flex-1 overflow-y-auto space-y-1 flex flex-col-reverse"></div>
      </div>
    </div>

    <!-- RIGHT: Event log -->
    <div class="w-72 border-l border-gray-800 bg-gray-900 flex flex-col flex-shrink-0 overflow-hidden">
      <div class="px-3 py-2 border-b border-gray-800 flex items-center justify-between">
        <span class="text-[10px] text-gray-500 uppercase tracking-widest">Validation Log</span>
        <span class="mono text-[9px] text-gray-600" id="logCount">0 events</span>
      </div>
      <div id="eventLog" class="flex-1 overflow-y-auto flex flex-col-reverse px-2 py-1 space-y-0.5 space-y-reverse"></div>
    </div>
  </div>

  <script>
    DataQualityShared.bindThemeToggle();

    const classes = [
      { id:'customer', label:'Customer', color:'#fb923c', rules:[
        { id:'r01', name:'email_not_null', type:'not-null', field:'email', action:'quarantine', passRate:96, status:'active' },
        { id:'r02', name:'email_format', type:'format', field:'email', action:'cleanse', passRate:88, status:'failing' },
        { id:'r03', name:'phone_e164', type:'regex', field:'phone', action:'quarantine', passRate:72, status:'failing' },
        { id:'r04', name:'customer_id_unique', type:'uniqueness', field:'customer_id', action:'reject', passRate:100, status:'active' },
        { id:'r05', name:'dob_range', type:'range', field:'date_of_birth', action:'quarantine', passRate:99, status:'active' },
      ]},
      { id:'order', label:'Order', color:'#f97316', rules:[
        { id:'r06', name:'order_id_positive', type:'range', field:'order_id', action:'reject', passRate:100, status:'active' },
        { id:'r07', name:'status_enum', type:'enum', field:'status', action:'quarantine', passRate:99, status:'active' },
        { id:'r08', name:'amount_not_negative', type:'range', field:'total_amount', action:'reject', passRate:100, status:'active' },
        { id:'r09', name:'amount_max', type:'range', field:'total_amount', action:'quarantine', passRate:99, status:'active' },
      ]},
      { id:'transaction', label:'Transaction', color:'#ea580c', rules:[
        { id:'r10', name:'txn_ref_integrity', type:'ref-integrity', field:'customer_id → Customer', action:'reject', passRate:100, status:'active' },
        { id:'r11', name:'card_last4_format', type:'format', field:'card_last4', action:'cleanse', passRate:100, status:'active' },
        { id:'r12', name:'merchant_enum', type:'enum', field:'merchant_category', action:'quarantine', passRate:98, status:'active' },
        { id:'r13', name:'ip_address_format', type:'format', field:'ip_address', action:'quarantine', passRate:87, status:'failing' },
      ]},
      { id:'product', label:'Product', color:'#c2410c', rules:[
        { id:'r14', name:'sku_unique', type:'uniqueness', field:'sku', action:'reject', passRate:100, status:'active' },
        { id:'r15', name:'price_positive', type:'range', field:'price', action:'reject', passRate:100, status:'active' },
        { id:'r16', name:'description_not_null', type:'not-null', field:'description', action:'quarantine', passRate:94, status:'active' },
        { id:'r17', name:'category_sql', type:'custom-sql', field:'category IN (SELECT name FROM categories)', action:'quarantine', passRate:97, status:'active' },
      ]},
    ];

    const typeColors = { 'not-null':'bg-sky-900/40 text-sky-400', 'format':'bg-violet-900/40 text-violet-400', 'regex':'bg-fuchsia-900/40 text-fuchsia-400', 'range':'bg-blue-900/40 text-blue-400', 'enum':'bg-purple-900/40 text-purple-400', 'uniqueness':'bg-teal-900/40 text-teal-400', 'ref-integrity':'bg-amber-900/40 text-amber-400', 'custom-sql':'bg-rose-900/40 text-rose-400' };
    const actionColors = { reject:'text-red-400', quarantine:'text-amber-400', cleanse:'text-sky-400' };
    const statusDots = { active:'bg-emerald-400', failing:'bg-red-400', disabled:'bg-gray-600' };

    let selRuleId = 'r02';

    function buildTree() {
      const tree = document.getElementById('ruleTree');
      tree.innerHTML = '';
      classes.forEach(cls => {
        const hdr = document.createElement('div');
        hdr.className = 'px-3 py-1.5 text-[9px] uppercase tracking-widest text-gray-500 border-b border-gray-800/50 flex items-center gap-1.5';
        hdr.innerHTML = `<span class="w-1.5 h-1.5 rounded-full inline-block" style="background:${cls.color}"></span>${cls.label} <span class="text-gray-600">(${cls.rules.length})</span>`;
        tree.appendChild(hdr);
        cls.rules.forEach(r => {
          const row = document.createElement('div');
          row.className = 'rule-row px-3 py-1.5 border-b border-gray-800/30' + (r.id === selRuleId ? ' selected' : '');
          row.dataset.ruleId = r.id;
          row.innerHTML = `
            <div class="flex items-center gap-2">
              <span class="w-1.5 h-1.5 rounded-full flex-shrink-0 ${statusDots[r.status]}"></span>
              <span class="mono text-[10px] text-gray-300 truncate">${r.name}</span>
            </div>
            <div class="flex items-center gap-1.5 mt-0.5 pl-3.5">
              <span class="text-[8px] px-1 py-0 rounded ${typeColors[r.type] || 'bg-gray-700 text-gray-400'}">${r.type}</span>
              <span class="text-[8px] ${actionColors[r.action]}">${r.action}</span>
              <span class="mono text-[8px] text-gray-500 ml-auto">${r.passRate}%</span>
            </div>
          `;
          tree.appendChild(row);
        });
      });
    }

    document.getElementById('ruleTree').addEventListener('click', e => {
      const row = e.target.closest('[data-rule-id]');
      if (!row) return;
      selRuleId = row.dataset.ruleId;
      buildTree();
      updateGates();
    });

    function getSelRule() {
      for (const cls of classes) {
        const r = cls.rules.find(r => r.id === selRuleId);
        if (r) return { cls, rule: r };
      }
      return null;
    }

    function updateGates() {
      const sel = getSelRule();
      if (!sel) return;
      document.getElementById('selRuleName').textContent = sel.rule.name + ' (' + sel.cls.label + ')';
      const gp = document.getElementById('gatesPanel');
      // Show all rules for selected class as gates
      gp.innerHTML = '';
      sel.cls.rules.forEach(r => {
        const pct = r.passRate;
        const barColor = pct === 100 ? 'bg-emerald-500' : pct >= 90 ? 'bg-amber-400' : 'bg-red-500';
        const selected = r.id === selRuleId;
        const div = document.createElement('div');
        div.className = 'flex items-center gap-2' + (selected ? ' opacity-100' : ' opacity-60');
        div.innerHTML = `
          <span class="mono text-[9px] text-gray-400 w-40 truncate ${selected ? 'text-orange-400' : ''}">${r.name}</span>
          <div class="flex-1 h-1.5 bg-gray-800 rounded-full overflow-hidden">
            <div class="h-full rounded-full gate-bar ${barColor}" style="width:${pct}%"></div>
          </div>
          <span class="mono text-[9px] w-8 text-right ${pct >= 90 ? 'text-emerald-400' : 'text-red-400'}">${pct}%</span>
          <span class="text-[8px] ${actionColors[r.action]}">${r.action}</span>
        `;
        gp.appendChild(div);
      });
    }

    // Counters
    let processed = 0, passed = 0, rejected = 0, quarantined = 0, cleansed = 0;
    let paused = false;
    let logCount = 0;

    // Pre-populate some events
    const initialEvents = [
      { outcome:'pass', cls:'Customer', rule:'email_not_null', rowId:10012, msg:'All rules passed' },
      { outcome:'cleanse', cls:'Customer', rule:'email_format', rowId:10011, msg:'email: \'John@ACME.COM\' → normalised to lowercase' },
      { outcome:'quarantine', cls:'Customer', rule:'phone_e164', rowId:10010, msg:'phone: \'555-1234\' not E.164 format' },
      { outcome:'pass', cls:'Order', rule:'status_enum', rowId:20041, msg:'All rules passed' },
      { outcome:'reject', cls:'Transaction', rule:'txn_ref_integrity', rowId:30072, msg:'customer_id: 99999 not found in Customer class' },
      { outcome:'pass', cls:'Customer', rule:'dob_range', rowId:10009, msg:'All rules passed' },
      { outcome:'quarantine', cls:'Transaction', rule:'ip_address_format', rowId:30071, msg:'ip_address: \'999.1.2.3\' is not a valid IP' },
      { outcome:'pass', cls:'Product', rule:'sku_unique', rowId:40015, msg:'All rules passed' },
      { outcome:'cleanse', cls:'Customer', rule:'email_format', rowId:10008, msg:'email: \'ALICE@EXAMPLE.COM\' → normalised to lowercase' },
      { outcome:'pass', cls:'Order', rule:'amount_max', rowId:20040, msg:'All rules passed' },
      { outcome:'quarantine', cls:'Customer', rule:'phone_e164', rowId:10007, msg:'phone: \'(800) 555-0100\' not E.164 format' },
      { outcome:'pass', cls:'Product', rule:'category_sql', rowId:40014, msg:'All rules passed' },
    ];

    initialEvents.forEach(ev => {
      processed++; if (ev.outcome === 'pass') passed++; else if (ev.outcome === 'reject') rejected++; else if (ev.outcome === 'quarantine') quarantined++; else cleansed++;
      addLogEntry(ev);
      addRowCard(ev);
    });
    updateCounters();

    const outcomeCfg = {
      pass: { color:'text-emerald-400', bg:'bg-emerald-500/10 border-emerald-500/20', label:'PASS' },
      reject: { color:'text-red-400', bg:'bg-red-500/10 border-red-500/20', label:'REJECT' },
      quarantine: { color:'text-amber-400', bg:'bg-amber-500/10 border-amber-500/20', label:'QUAR' },
      cleanse: { color:'text-sky-400', bg:'bg-sky-500/10 border-sky-500/20', label:'CLNS' },
    };

    function addLogEntry(ev) {
      logCount++;
      const cfg = outcomeCfg[ev.outcome];
      const log = document.getElementById('eventLog');
      const entry = document.createElement('div');
      entry.className = 'event-entry flex gap-2 items-start py-1 border-b border-gray-800/40';
      const ts = new Date().toLocaleTimeString('en-US', { hour12:false });
      entry.innerHTML = `
        <span class="mono text-[9px] text-gray-600 flex-shrink-0 mt-0.5">${ts}</span>
        <span class="mono text-[9px] font-bold flex-shrink-0 ${cfg.color}">${cfg.label}</span>
        <div class="min-w-0">
          <div class="mono text-[9px] text-gray-300">${ev.cls} <span class="text-gray-600">#${ev.rowId}</span></div>
          <div class="text-[9px] text-gray-500 truncate">${ev.rule}: ${ev.msg}</div>
        </div>
      `;
      log.prepend(entry);
      if (log.children.length > 80) log.removeChild(log.lastChild);
      document.getElementById('logCount').textContent = logCount + ' events';
    }

    function addRowCard(ev) {
      const cfg = outcomeCfg[ev.outcome];
      const stream = document.getElementById('rowStream');
      const card = document.createElement('div');
      card.className = `row-card flex items-center gap-3 rounded-lg border px-3 py-1.5 ${cfg.bg}`;
      card.innerHTML = `
        <span class="mono text-[9px] font-bold ${cfg.color} w-10 flex-shrink-0">${cfg.label}</span>
        <span class="mono text-[9px] text-gray-400 flex-shrink-0">${ev.cls} <span class="text-gray-600">#${ev.rowId}</span></span>
        <span class="text-[9px] text-gray-500 truncate">${ev.rule}</span>
        <span class="text-[9px] text-gray-600 ml-auto truncate max-w-xs">${ev.msg}</span>
      `;
      stream.prepend(card);
      if (stream.children.length > 20) stream.removeChild(stream.lastChild);
    }

    function updateCounters() {
      document.getElementById('cntProcessed').textContent = processed.toLocaleString();
      document.getElementById('cntPassed').textContent = passed.toLocaleString();
      document.getElementById('cntRejected').textContent = rejected.toLocaleString();
      document.getElementById('cntQuarantined').textContent = quarantined.toLocaleString();
      document.getElementById('cntCleansed').textContent = cleansed.toLocaleString();
      document.getElementById('processedCount').textContent = processed.toLocaleString();
      const rate = processed > 0 ? ((passed + cleansed) / processed * 100).toFixed(1) : '0.0';
      document.getElementById('passRatePct').textContent = rate + '%';
      document.getElementById('passRateBar').style.width = rate + '%';
    }

    const rowTemplates = [
      { outcome:'pass', cls:'Customer', rule:'email_not_null', msg:'All rules passed' },
      { outcome:'pass', cls:'Order', rule:'status_enum', msg:'All rules passed' },
      { outcome:'pass', cls:'Customer', rule:'dob_range', msg:'All rules passed' },
      { outcome:'pass', cls:'Transaction', rule:'card_last4_format', msg:'All rules passed' },
      { outcome:'pass', cls:'Product', rule:'price_positive', msg:'All rules passed' },
      { outcome:'pass', cls:'Order', rule:'order_id_positive', msg:'All rules passed' },
      { outcome:'pass', cls:'Product', rule:'sku_unique', msg:'All rules passed' },
      { outcome:'cleanse', cls:'Customer', rule:'email_format', msg:'email uppercase → normalised to lowercase' },
      { outcome:'cleanse', cls:'Transaction', rule:'card_last4_format', msg:'card_last4: leading spaces trimmed' },
      { outcome:'quarantine', cls:'Customer', rule:'phone_e164', msg:'phone: local format not E.164' },
      { outcome:'quarantine', cls:'Transaction', rule:'ip_address_format', msg:'ip_address: malformed IP octet' },
      { outcome:'quarantine', cls:'Product', rule:'description_not_null', msg:'description: NULL value, threshold 94%' },
      { outcome:'reject', cls:'Transaction', rule:'txn_ref_integrity', msg:'customer_id foreign key not found' },
      { outcome:'reject', cls:'Order', rule:'amount_not_negative', msg:'total_amount: -15.00 is negative' },
    ];

    let rowId = 30100;
    const interval = setInterval(() => {
      if (paused) return;
      const batchSize = Math.floor(Math.random() * 4) + 2;
      for (let i = 0; i < batchSize; i++) {
        const tpl = rowTemplates[Math.floor(Math.random() * rowTemplates.length)];
        rowId++;
        const ev = { ...tpl, rowId };
        processed++;
        if (ev.outcome === 'pass') passed++;
        else if (ev.outcome === 'reject') rejected++;
        else if (ev.outcome === 'quarantine') quarantined++;
        else cleansed++;
        addLogEntry(ev);
        if (i === 0) addRowCard(ev);
      }
      updateCounters();
    }, 1800);

    document.getElementById('pauseBtn').addEventListener('click', () => {
      paused = !paused;
      const btn = document.getElementById('pauseBtn');
      btn.innerHTML = paused
        ? '<i data-lucide="play" class="w-3 h-3"></i> Resume'
        : '<i data-lucide="pause" class="w-3 h-3"></i> Pause';
      lucide.createIcons();
    });

    buildTree();
    updateGates();
    lucide.createIcons();
  </script>
</body>
</html>
