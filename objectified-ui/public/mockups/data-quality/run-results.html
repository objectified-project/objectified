<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Quality — Run Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="data-quality-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-orange-600 to-red-500 flex items-center justify-center">
          <i data-lucide="list-checks" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-orange-600 dark:text-orange-400">Quality</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Run Results</span>
    </div>
    <div class="flex items-center gap-2">
      <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
        <option>All classes</option><option>Customer</option><option>Order</option><option>Transaction</option>
      </select>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-6 space-y-5">
    <h1 class="text-lg font-bold">Run Results</h1>

    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
      <table class="w-full text-xs">
        <thead class="bg-gray-50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
          <tr>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Run ID</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Class</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Load Job</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Rows</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Passed</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Rejected</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Quarantined</th>
            <th class="px-4 py-2.5 text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Cleansed</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Pass %</th>
            <th class="px-4 py-2.5 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Started</th>
          </tr>
        </thead>
        <tbody id="runsTbody" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
      </table>
    </div>
  </div>

  <script>
    DataQualityShared.bindThemeToggle();

    const runs = [
      { id:'DQR-4481', cls:'Customer', job:'LJ-1204', rows:89432, passed:79801, rejected:1420, quarantined:6991, cleansed:1220, started:'20:38:11' },
      { id:'DQR-4480', cls:'Order', job:'LJ-1203', rows:14822, passed:14673, rejected:0, quarantined:149, cleansed:0, started:'20:38:09' },
      { id:'DQR-4479', cls:'Transaction', job:'LJ-1202', rows:4482910, passed:4258764, rejected:39210, quarantined:134466, cleansed:50470, started:'19:55:30' },
      { id:'DQR-4478', cls:'Product', job:'LJ-1201', rows:15200, passed:14744, rejected:0, quarantined:342, cleansed:114, started:'19:40:22' },
      { id:'DQR-4477', cls:'Customer', job:'LJ-1200', rows:50000, passed:44500, rejected:800, quarantined:3900, cleansed:800, started:'18:20:11' },
      { id:'DQR-4476', cls:'Campaign', job:'LJ-1199', rows:2841, passed:2102, rejected:180, quarantined:559, cleansed:0, started:'16:55:34' },
      { id:'DQR-4475', cls:'Order', job:'LJ-1198', rows:8200, passed:8118, rejected:0, quarantined:82, cleansed:0, started:'16:30:22' },
      { id:'DQR-4474', cls:'Transaction', job:'LJ-1197', rows:1248000, passed:1185600, rejected:10920, quarantined:37440, cleansed:14040, started:'15:00:01' },
    ];

    const tbody = document.getElementById('runsTbody');
    runs.forEach(r => {
      const passRate = ((r.passed + r.cleansed) / r.rows * 100).toFixed(1);
      const rateColor = +passRate >= 95 ? 'text-emerald-500' : +passRate >= 80 ? 'text-amber-500' : 'text-red-500';
      const barColor = +passRate >= 95 ? 'bg-emerald-400' : +passRate >= 80 ? 'bg-amber-400' : 'bg-red-400';
      const tr = document.createElement('tr');
      tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/30';
      tr.innerHTML = `
        <td class="px-4 py-2.5 mono text-[10px] text-gray-400">${r.id}</td>
        <td class="px-4 py-2.5 text-[11px] font-semibold">${r.cls}</td>
        <td class="px-4 py-2.5 mono text-[10px] text-gray-400">${r.job}</td>
        <td class="px-4 py-2.5 text-right mono text-[11px]">${r.rows.toLocaleString()}</td>
        <td class="px-4 py-2.5 text-right mono text-[11px] text-emerald-500">${r.passed.toLocaleString()}</td>
        <td class="px-4 py-2.5 text-right mono text-[11px] ${r.rejected > 0 ? 'text-red-500 font-semibold' : 'text-gray-400'}">${r.rejected > 0 ? r.rejected.toLocaleString() : '—'}</td>
        <td class="px-4 py-2.5 text-right mono text-[11px] ${r.quarantined > 0 ? 'text-amber-500' : 'text-gray-400'}">${r.quarantined > 0 ? r.quarantined.toLocaleString() : '—'}</td>
        <td class="px-4 py-2.5 text-right mono text-[11px] ${r.cleansed > 0 ? 'text-sky-500' : 'text-gray-400'}">${r.cleansed > 0 ? r.cleansed.toLocaleString() : '—'}</td>
        <td class="px-4 py-2.5">
          <div class="flex items-center gap-2">
            <div class="w-14 h-1.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
              <div class="h-full ${barColor} rounded-full" style="width:${passRate}%"></div>
            </div>
            <span class="mono text-[10px] ${rateColor}">${passRate}%</span>
          </div>
        </td>
        <td class="px-4 py-2.5 mono text-[10px] text-gray-400">${r.started}</td>
      `;
      tbody.appendChild(tr);
    });

    lucide.createIcons();
  </script>
</body>
</html>
