<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Quality — Quality Score</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="data-quality-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-orange-600 to-red-500 flex items-center justify-center">
          <i data-lucide="list-checks" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-orange-600 dark:text-orange-400">Quality</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Quality Score</span>
    </div>
    <div class="flex items-center gap-2">
      <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-1.5">
        <option>Last 7 days</option><option>Last 30 days</option><option>Last 90 days</option>
      </select>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-6 space-y-5">
    <h1 class="text-lg font-bold">Quality Score Dashboard</h1>

    <!-- KPIs -->
    <div class="grid grid-cols-4 gap-3">
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-emerald-500">94.7%</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Overall pass rate</div>
        <div class="text-[9px] text-emerald-500 mt-1">↑ +1.2% vs last week</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-gray-700 dark:text-gray-200">2.1M</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Rows validated (7d)</div>
        <div class="text-[9px] text-gray-400 mt-1">↑ +340K vs prior week</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-amber-500">1,284</div>
        <div class="text-[10px] text-gray-400 mt-0.5">In quarantine</div>
        <div class="text-[9px] text-red-400 mt-1">↑ +89 since yesterday</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-red-500">3</div>
        <div class="text-[10px] text-gray-400 mt-0.5">SLA breaches (7d)</div>
        <div class="text-[9px] text-gray-400 mt-1">Threshold: 92%</div>
      </div>
    </div>

    <!-- Per-class scores -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
      <h2 class="text-sm font-semibold mb-4">Pass Rate by Class</h2>
      <div class="space-y-4" id="classScores"></div>
    </div>

    <!-- Trend sparklines (CSS bars) -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
      <h2 class="text-sm font-semibold mb-4">7-Day Pass Rate Trend</h2>
      <div class="space-y-5" id="trendCharts"></div>
    </div>
  </div>

  <script>
    DataQualityShared.bindThemeToggle();

    const classes = [
      { cls:'Customer', passRate:89, sla:92, rows:'441,288', rejected:12400, quarantined:820 },
      { cls:'Order', passRate:99, sla:95, rows:'882,200', rejected:1200, quarantined:50 },
      { cls:'Transaction', passRate:95, sla:95, rows:'680,100', rejected:8800, quarantined:300 },
      { cls:'Product', passRate:97, sla:90, rows:'44,200', rejected:410, quarantined:114 },
      { cls:'UserSession', passRate:100, sla:90, rows:'52,000', rejected:0, quarantined:0 },
      { cls:'Campaign', passRate:74, sla:80, rows:'8,400', rejected:1100, quarantined:900 },
    ];

    const scoresDiv = document.getElementById('classScores');
    classes.forEach(c => {
      const breaching = c.passRate < c.sla;
      const barColor = c.passRate >= 95 ? 'bg-emerald-400' : c.passRate >= 80 ? 'bg-amber-400' : 'bg-red-400';
      const rateColor = c.passRate >= 95 ? 'text-emerald-500' : c.passRate >= 80 ? 'text-amber-500' : 'text-red-500';
      const div = document.createElement('div');
      div.className = 'flex items-center gap-4';
      div.innerHTML = `
        <span class="text-xs font-semibold w-28 flex-shrink-0">${c.cls}${breaching ? ' <span class="text-red-400 text-[9px]">⚠ SLA breach</span>' : ''}</span>
        <div class="flex-1 h-3 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
          <div class="h-full ${barColor} rounded-full transition-all" style="width:${c.passRate}%"></div>
        </div>
        <span class="mono text-xs font-bold ${rateColor} w-12 text-right">${c.passRate}%</span>
        <span class="text-[9px] text-gray-400 w-20 text-right">SLA: ${c.sla}%</span>
        <span class="mono text-[9px] text-gray-400 w-20 text-right">${c.rows} rows</span>
      `;
      scoresDiv.appendChild(div);
    });

    // Trend data: 7 days, Mon-Sun pass rates
    const trends = [
      { cls:'Customer', data:[88,87,90,89,88,90,89] },
      { cls:'Order', data:[98,99,99,100,99,99,99] },
      { cls:'Transaction', data:[96,95,94,96,95,95,95] },
      { cls:'Campaign', data:[80,78,76,74,73,74,74] },
    ];
    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const trendsDiv = document.getElementById('trendCharts');
    trends.forEach(t => {
      const maxH = 40;
      const minV = Math.min(...t.data) - 5;
      const maxV = Math.max(...t.data) + 1;
      const bars = t.data.map((v, i) => {
        const h = Math.round(((v - minV) / (maxV - minV)) * maxH);
        const color = v >= 95 ? 'bg-emerald-400' : v >= 80 ? 'bg-amber-400' : 'bg-red-400';
        return `<div class="flex flex-col items-center gap-1">
          <span class="mono text-[8px] text-gray-500">${v}</span>
          <div class="w-6 ${color} rounded-sm" style="height:${h}px"></div>
          <span class="text-[8px] text-gray-500">${days[i]}</span>
        </div>`;
      }).join('');
      const row = document.createElement('div');
      row.className = 'flex items-end gap-3';
      row.innerHTML = `<span class="text-xs font-semibold w-24 flex-shrink-0">${t.cls}</span><div class="flex items-end gap-1.5">${bars}</div>`;
      trendsDiv.appendChild(row);
    });

    lucide.createIcons();
  </script>
</body>
</html>
