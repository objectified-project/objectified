<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Quality — Rule Sets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="data-quality-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-orange-600 to-red-500 flex items-center justify-center">
          <i data-lucide="list-checks" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Objectified</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm font-medium text-orange-600 dark:text-orange-400">Quality</span>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Rule Sets</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-6 space-y-5">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold">Rule Sets</h1>
        <p class="text-xs text-gray-400 mt-0.5">DQ rule collections attached to objectified Classes, versioned alongside schema changes</p>
      </div>
      <button class="text-xs px-3 py-1.5 rounded-md bg-orange-600 hover:bg-orange-700 text-white font-semibold flex items-center gap-1.5">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i> New Rule Set
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="ruleSetsGrid"></div>
  </div>

  <script>
    DataQualityShared.bindThemeToggle();

    const ruleSets = [
      { cls:'Customer', version:'v2.3', rules:5, failing:2, passRate:89, status:'review-required', reviewMsg:'Class bumped to v2.3 — 2 rules flagged for review', lastRun:'2026-05-13 20:41', applied:12 },
      { cls:'Order', version:'v1.8', rules:4, failing:0, passRate:99, status:'active', lastRun:'2026-05-13 20:38', applied:9 },
      { cls:'Transaction', version:'v3.1', rules:4, failing:1, passRate:95, status:'active', lastRun:'2026-05-13 19:55', applied:7 },
      { cls:'Product', version:'v1.4', rules:4, failing:0, passRate:97, status:'active', lastRun:'2026-05-13 19:40', applied:4 },
      { cls:'UserSession', version:'v1.0', rules:3, failing:0, passRate:100, status:'active', lastRun:'2026-05-13 18:30', applied:2 },
      { cls:'Campaign', version:'v2.0', rules:6, failing:3, passRate:74, status:'review-required', reviewMsg:'Class changed major version — rules need re-validation', lastRun:'2026-05-13 16:55', applied:3 },
    ];

    const statusCfg = {
      'active': { badge:'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400', label:'Active' },
      'review-required': { badge:'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400', label:'⚠ Review Required' },
      'disabled': { badge:'bg-gray-100 dark:bg-gray-700 text-gray-400', label:'Disabled' },
    };

    const grid = document.getElementById('ruleSetsGrid');
    ruleSets.forEach(rs => {
      const sc = statusCfg[rs.status];
      const rateColor = rs.passRate >= 95 ? 'text-emerald-500' : rs.passRate >= 80 ? 'text-amber-500' : 'text-red-500';
      const div = document.createElement('div');
      div.className = 'bg-white dark:bg-gray-800 rounded-xl border ' + (rs.status === 'review-required' ? 'border-amber-300 dark:border-amber-700' : 'border-gray-200 dark:border-gray-700') + ' p-4 space-y-3';
      div.innerHTML = `
        <div class="flex items-start justify-between">
          <div>
            <div class="flex items-center gap-2">
              <span class="font-semibold text-sm">${rs.cls}</span>
              <span class="mono text-[9px] bg-gray-100 dark:bg-gray-700 text-gray-500 px-1.5 py-0.5 rounded">${rs.version}</span>
            </div>
            <div class="text-[10px] text-gray-400 mt-0.5">${rs.rules} rules · applied to ${rs.applied} load jobs</div>
          </div>
          <span class="text-[10px] px-2 py-0.5 rounded-full font-medium ${sc.badge}">${sc.label}</span>
        </div>
        ${rs.reviewMsg ? `<div class="text-[10px] bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 px-3 py-2 rounded-lg border border-amber-200 dark:border-amber-800 flex items-start gap-2"><i data-lucide="alert-triangle" class="w-3 h-3 flex-shrink-0 mt-0.5"></i>${rs.reviewMsg}</div>` : ''}
        <div class="grid grid-cols-3 gap-3 text-center">
          <div>
            <div class="mono text-base font-bold ${rateColor}">${rs.passRate}%</div>
            <div class="text-[9px] text-gray-400">Pass rate</div>
          </div>
          <div>
            <div class="mono text-base font-bold ${rs.failing > 0 ? 'text-red-500' : 'text-gray-400'}">${rs.failing}</div>
            <div class="text-[9px] text-gray-400">Failing rules</div>
          </div>
          <div>
            <div class="mono text-base font-bold text-gray-600 dark:text-gray-300">${rs.rules}</div>
            <div class="text-[9px] text-gray-400">Total rules</div>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <span class="mono text-[9px] text-gray-400">Last run: ${rs.lastRun}</span>
          <div class="flex gap-1.5">
            <a href="rule-builder.html" class="text-[10px] px-2 py-1 rounded border border-orange-200 dark:border-orange-700 text-orange-600 dark:text-orange-400 hover:bg-orange-50 dark:hover:bg-orange-900/20">Edit rules</a>
            <button class="text-[10px] px-2 py-1 rounded border border-gray-200 dark:border-gray-600 text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700">Clone</button>
          </div>
        </div>
      `;
      grid.appendChild(div);
    });

    lucide.createIcons();
  </script>
</body>
</html>
