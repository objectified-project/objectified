<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Reverse — Sync Runs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="reverse-etl-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">
          <i data-lucide="send" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Reverse</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Sync Runs</span>
    </div>
    <div class="flex items-center gap-2">
      <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-1.5 focus:outline-none">
        <option>All Destinations</option>
        <option>Salesforce</option>
        <option>HubSpot</option>
        <option>Snowflake</option>
      </select>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-8 space-y-6">

    <!-- KPIs -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-gray-700 dark:text-gray-200">284</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Total runs (7d)</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-emerald-500">98.9%</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Success rate</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-pink-500">4.2M</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Rows synced</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-amber-500">3</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Errors (7d)</div>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/50">
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Run ID</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Destination</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Segment</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Started</th>
            <th class="text-right px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Rows Synced</th>
            <th class="text-right px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Errors</th>
            <th class="text-right px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Duration</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Status</th>
          </tr>
        </thead>
        <tbody id="runsTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    ReverseEtlShared.bindThemeToggle();
    const runs = [
      { id:'RSR-4401', dest:'☁️ Salesforce', seg:'Enterprise Customers', started:'2026-05-13 15:58', rows:48200, errors:0, duration:'4s', status:'success' },
      { id:'RSR-4400', dest:'🟠 HubSpot', seg:'Enterprise Customers', started:'2026-05-13 15:00', rows:11800, errors:0, duration:'22s', status:'success' },
      { id:'RSR-4399', dest:'❄️ Snowflake', seg:'All Customers', started:'2026-05-13 15:00', rows:840200, errors:0, duration:'4m 12s', status:'success' },
      { id:'RSR-4398', dest:'🔵 BigQuery', seg:'All Customers, HV Orders', started:'2026-05-13 15:00', rows:622000, errors:0, duration:'3m 48s', status:'success' },
      { id:'RSR-4397', dest:'⚫ Klaviyo', seg:'Churned Customers', started:'2026-05-13 15:00', rows:22100, errors:2, duration:'58s', status:'partial' },
      { id:'RSR-4396', dest:'☁️ Salesforce', seg:'Enterprise Customers', started:'2026-05-13 14:58', rows:47900, errors:0, duration:'4s', status:'success' },
      { id:'RSR-4395', dest:'🔴 Redshift', seg:'Analytics Export', started:'2026-05-13 14:00', rows:0, errors:1, duration:'12s', status:'error' },
      { id:'RSR-4394', dest:'💜 Marketo', seg:'MQL List', started:'2026-05-13 04:00', rows:8800, errors:0, duration:'1m 22s', status:'success' },
      { id:'RSR-4393', dest:'🔗 REST API', seg:'Custom Webhook', started:'2026-05-13 03:00', rows:2200, errors:0, duration:'28s', status:'success' },
      { id:'RSR-4392', dest:'🟠 HubSpot', seg:'Enterprise Customers', started:'2026-05-13 14:00', rows:11700, errors:0, duration:'19s', status:'success' },
      { id:'RSR-4391', dest:'❄️ Snowflake', seg:'All Customers', started:'2026-05-13 14:00', rows:838800, errors:0, duration:'4m 08s', status:'success' },
    ];
    const statusMap = {
      success: 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400',
      partial: 'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400',
      error: 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400',
    };
    const tbody = document.getElementById('runsTable');
    runs.forEach(r => {
      const sc = statusMap[r.status];
      tbody.innerHTML += `
        <tr class="border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors ${r.status==='error'?'bg-red-50/30 dark:bg-red-900/5':''}">
          <td class="px-4 py-2.5 mono text-[10px] text-pink-500 dark:text-pink-400">${r.id}</td>
          <td class="px-4 py-2.5 text-xs">${r.dest}</td>
          <td class="px-4 py-2.5 text-[10px] text-gray-500 truncate max-w-[140px]">${r.seg}</td>
          <td class="px-4 py-2.5 mono text-[10px] text-gray-500">${r.started}</td>
          <td class="px-4 py-2.5 mono text-[10px] text-right">${r.rows.toLocaleString()}</td>
          <td class="px-4 py-2.5 mono text-[10px] text-right ${r.errors>0?'text-red-500 font-bold':''}">${r.errors}</td>
          <td class="px-4 py-2.5 mono text-[10px] text-right text-gray-500">${r.duration}</td>
          <td class="px-4 py-2.5"><span class="text-[9px] px-2 py-0.5 rounded-full font-semibold ${sc}">${r.status}</span></td>
        </tr>`;
    });
    lucide.createIcons();
  </script>
</body>
</html>
