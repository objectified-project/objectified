<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Reverse — Segment Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="reverse-etl-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">
          <i data-lucide="send" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Reverse</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Segment Library</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="audience-builder.html" class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg bg-pink-600 hover:bg-pink-700 text-white font-semibold">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i> New Segment
      </a>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-8 space-y-6">
    <h2 class="text-sm font-semibold">Saved Audience Segments</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="segmentCards"></div>
  </div>

  <script>
    ReverseEtlShared.bindThemeToggle();
    const segments = [
      {
        name: 'Enterprise Customers',
        cls: 'Customer',
        rowCount: 156824,
        conditions: ['tier = "enterprise"', 'last_activity > 30d', 'mrr >= 5000'],
        destinations: ['☁️ Salesforce','🟠 HubSpot'],
        lastRefresh: '2 min ago',
        refreshCadence: 'Real-time',
        owner: 'RevOps',
        tags: ['crm', 'enterprise'],
        trending: true,
      },
      {
        name: 'Churned in 30d',
        cls: 'Customer',
        rowCount: 3420,
        conditions: ['status = "churned"', 'churned_at > now()-30d'],
        destinations: ['⚫ Klaviyo','🟠 HubSpot'],
        lastRefresh: '1h ago',
        refreshCadence: 'Hourly',
        owner: 'CS Team',
        tags: ['win-back', 'churn'],
        trending: false,
      },
      {
        name: 'High-Value Orders (90d)',
        cls: 'Order',
        rowCount: 22841,
        conditions: ['total_amount > 10000', 'status = "completed"', 'created_at > 90d'],
        destinations: ['❄️ Snowflake','🔵 BigQuery'],
        lastRefresh: '1h ago',
        refreshCadence: 'Hourly',
        owner: 'Analytics',
        tags: ['analytics', 'high-value'],
        trending: true,
      },
      {
        name: 'Marketing Qualified Leads',
        cls: 'Customer',
        rowCount: 8811,
        conditions: ['lead_score >= 80', 'status = "prospect"'],
        destinations: ['💜 Marketo','🟠 HubSpot'],
        lastRefresh: '4h ago',
        refreshCadence: 'Daily',
        owner: 'Marketing',
        tags: ['mql', 'marketing'],
        trending: false,
      },
      {
        name: 'Re-Engagement (60d inactive)',
        cls: 'Customer',
        rowCount: 14200,
        conditions: ['last_activity_date < now()-60d', 'status = "active"'],
        destinations: ['⚫ Klaviyo'],
        lastRefresh: '5h ago',
        refreshCadence: 'Daily',
        owner: 'Marketing',
        tags: ['re-engagement', 'email'],
        trending: false,
      },
      {
        name: 'Custom Webhook Export',
        cls: 'Customer',
        rowCount: 2200,
        conditions: ['custom_flag = true'],
        destinations: ['🔗 REST API'],
        lastRefresh: '12h ago',
        refreshCadence: 'Daily',
        owner: 'Data Eng',
        tags: ['custom', 'webhook'],
        trending: false,
      },
    ];
    const cards = document.getElementById('segmentCards');
    segments.forEach(s => {
      cards.innerHTML += `
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between mb-2">
            <div>
              <div class="flex items-center gap-1.5">
                <div class="text-sm font-semibold">${s.name}</div>
                ${s.trending ? '<span class="text-[9px] bg-amber-100 dark:bg-amber-900/30 text-amber-600 px-1.5 py-0.5 rounded font-bold">🔥 trending</span>' : ''}
              </div>
              <div class="flex items-center gap-2 mt-0.5">
                <span class="mono text-[9px] text-pink-500">Class: ${s.cls}</span>
                <span class="text-[9px] text-gray-400">· ${s.owner}</span>
              </div>
            </div>
            <div class="text-right">
              <div class="mono text-base font-bold text-gray-700 dark:text-gray-200">${s.rowCount.toLocaleString()}</div>
              <div class="text-[9px] text-gray-400">rows</div>
            </div>
          </div>
          <div class="space-y-1 mb-3">
            ${s.conditions.map(c => `<div class="mono text-[9px] text-gray-500 bg-gray-50 dark:bg-gray-700/50 px-2 py-0.5 rounded">${c}</div>`).join('')}
          </div>
          <div class="flex flex-wrap gap-1 mb-3">
            ${s.destinations.map(d => `<span class="text-[9px] bg-pink-50 dark:bg-pink-900/20 border border-pink-200 dark:border-pink-800/40 text-pink-600 dark:text-pink-400 px-2 py-0.5 rounded">${d}</span>`).join('')}
          </div>
          <div class="flex items-center justify-between text-[9px] text-gray-400 border-t border-gray-100 dark:border-gray-700 pt-2">
            <span>Refreshed ${s.lastRefresh}</span>
            <span class="px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-700">${s.refreshCadence}</span>
          </div>
          <div class="flex gap-1.5 mt-2">
            <a href="audience-builder.html" class="flex-1 text-center text-[9px] py-1 rounded border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Edit</a>
            <button class="flex-1 text-[9px] py-1 rounded border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Clone</button>
            <button class="flex-1 text-[9px] py-1 rounded border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-pink-500">Sync now</button>
          </div>
        </div>`;
    });
    lucide.createIcons();
  </script>
</body>
</html>
