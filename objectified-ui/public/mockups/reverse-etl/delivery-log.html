<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Reverse — Delivery Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="reverse-etl-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">
          <i data-lucide="send" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Reverse</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Delivery Log</span>
    </div>
    <div class="flex items-center gap-2">
      <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-1.5 focus:outline-none">
        <option>All statuses</option>
        <option>Errors only</option>
        <option>Delivered</option>
      </select>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-8 space-y-6">

    <!-- Rate limit bars -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3">API Rate Limit Consumption</h3>
      <div class="space-y-2" id="rateBars"></div>
    </div>

    <!-- Delivery log table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/50">
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Timestamp</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Row ID</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Destination</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Object</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Operation</th>
            <th class="text-right px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">HTTP</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Status</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Error</th>
          </tr>
        </thead>
        <tbody id="deliveryTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    ReverseEtlShared.bindThemeToggle();

    const rateLimits = [
      { dest:'☁️ Salesforce', pct:38, cur:'3,840/min', max:'10,000/min' },
      { dest:'🟠 HubSpot', pct:12, cur:'4,800/hr', max:'40,000/hr' },
      { dest:'❄️ Snowflake', pct:62, cur:'840K rows/hr', max:'~unlimited' },
      { dest:'⚫ Klaviyo', pct:44, cur:'22,100/hr', max:'50,000/hr' },
      { dest:'🔴 Redshift', pct:0, cur:'paused', max:'unlimited' },
    ];
    const rateBars = document.getElementById('rateBars');
    rateLimits.forEach(r => {
      const color = r.pct > 75 ? 'bg-red-500' : r.pct > 50 ? 'bg-amber-400' : 'bg-emerald-400';
      rateBars.innerHTML += `
        <div class="flex items-center gap-3">
          <span class="text-xs w-24 flex-shrink-0">${r.dest}</span>
          <div class="flex-1 h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
            <div class="h-full ${color} rounded-full" style="width:${r.pct}%"></div>
          </div>
          <span class="mono text-[9px] text-gray-500 w-8 text-right">${r.pct}%</span>
          <span class="mono text-[9px] text-gray-400 w-32 text-right">${r.cur} / ${r.max}</span>
        </div>`;
    });

    const logs = [
      { ts:'15:58:42.112', row:'C-10012', dest:'☁️ Salesforce', obj:'Contact', op:'upsert', http:200, status:'delivered', error:'' },
      { ts:'15:58:42.118', row:'C-10018', dest:'☁️ Salesforce', obj:'Contact', op:'upsert', http:200, status:'delivered', error:'' },
      { ts:'15:58:42.130', row:'C-10024', dest:'☁️ Salesforce', obj:'Contact', op:'upsert', http:200, status:'delivered', error:'' },
      { ts:'15:58:42.141', row:'C-10031', dest:'☁️ Salesforce', obj:'Contact', op:'upsert', http:429, status:'rate-limited', error:'RATE_LIMIT_EXCEEDED: retry after 1s' },
      { ts:'15:58:43.200', row:'C-10031', dest:'☁️ Salesforce', obj:'Contact', op:'upsert (retry)', http:200, status:'delivered', error:'' },
      { ts:'15:58:43.220', row:'C-50011', dest:'⚫ Klaviyo', obj:'Profile', op:'upsert', http:422, status:'error', error:'Invalid email format: john@startup' },
      { ts:'15:58:43.221', row:'C-10039', dest:'☁️ Salesforce', obj:'Contact', op:'upsert', http:200, status:'delivered', error:'' },
      { ts:'15:58:43.240', row:'C-50022', dest:'⚫ Klaviyo', obj:'Profile', op:'upsert', http:422, status:'error', error:'Phone must be E.164 format' },
      { ts:'15:58:43.310', row:'C-10041', dest:'☁️ Salesforce', obj:'Contact', op:'upsert', http:200, status:'delivered', error:'' },
      { ts:'15:58:43.320', row:'C-10055', dest:'☁️ Salesforce', obj:'Contact', op:'upsert', http:200, status:'delivered', error:'' },
      { ts:'15:00:02.800', row:'C-10012', dest:'🟠 HubSpot', obj:'Contact', op:'update', http:200, status:'delivered', error:'' },
      { ts:'15:00:02.901', row:'C-10018', dest:'🟠 HubSpot', obj:'Contact', op:'update', http:200, status:'delivered', error:'' },
      { ts:'14:00:12.001', dest:'🔴 Redshift', row:'—', obj:'analytics_export', op:'insert batch', http:503, status:'error', error:'Connection refused: Redshift cluster unavailable' },
    ];
    const statusMap = {
      delivered: 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400',
      'rate-limited': 'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400',
      error: 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400',
    };
    const httpColors = { 200:'text-emerald-500', 429:'text-amber-500', 422:'text-orange-500', 503:'text-red-500' };
    const tbody = document.getElementById('deliveryTable');
    logs.forEach(l => {
      const sc = statusMap[l.status];
      const hc = httpColors[l.http] || 'text-gray-500';
      tbody.innerHTML += `
        <tr class="border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors ${l.status==='error'?'bg-red-50/30 dark:bg-red-900/5':''}">
          <td class="px-4 py-2 mono text-[9px] text-gray-400">${l.ts}</td>
          <td class="px-4 py-2 mono text-[10px] text-pink-500">${l.row}</td>
          <td class="px-4 py-2 text-[10px]">${l.dest}</td>
          <td class="px-4 py-2 mono text-[10px] text-gray-500">${l.obj}</td>
          <td class="px-4 py-2 text-[10px] text-gray-600 dark:text-gray-400">${l.op}</td>
          <td class="px-4 py-2 mono text-[10px] text-right font-bold ${hc}">${l.http}</td>
          <td class="px-4 py-2"><span class="text-[9px] px-2 py-0.5 rounded-full font-semibold ${sc}">${l.status}</span></td>
          <td class="px-4 py-2 mono text-[9px] text-red-400 max-w-[180px] truncate">${l.error || '—'}</td>
        </tr>`;
    });
    lucide.createIcons();
  </script>
</body>
</html>
