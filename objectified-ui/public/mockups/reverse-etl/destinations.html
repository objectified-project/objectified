<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Reverse — Destinations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="reverse-etl-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">
          <i data-lucide="send" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Reverse</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Destinations</span>
    </div>
    <div class="flex items-center gap-2">
      <button class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg bg-pink-600 hover:bg-pink-700 text-white font-semibold">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Destination
      </button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-8 space-y-6">
    <h2 class="text-sm font-semibold">Connected Destinations</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="destCards"></div>

    <div class="mt-8">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3">Available Connectors</h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3" id="availConnectors"></div>
    </div>
  </div>

  <script>
    ReverseEtlShared.bindThemeToggle();
    const destinations = [
      { name:'Salesforce', emoji:'☁️', type:'CRM', status:'healthy', lastSync:'2 min ago', rowsDay:'48,200', segments:4, syncMode:'Real-time', description:'Push Customer segments to Contact/Lead objects. Upsert on email.' },
      { name:'HubSpot', emoji:'🟠', type:'CRM', status:'healthy', lastSync:'8 min ago', rowsDay:'12,400', segments:3, syncMode:'Hourly', description:'Sync Customer and Order data to Contacts and Deals.' },
      { name:'Snowflake', emoji:'❄️', type:'Data Warehouse', status:'healthy', lastSync:'1h ago', rowsDay:'840,000', segments:6, syncMode:'Hourly', description:'Full objectified-db table replication to external Snowflake tenant.' },
      { name:'BigQuery', emoji:'🔵', type:'Data Warehouse', status:'healthy', lastSync:'1h ago', rowsDay:'620,000', segments:5, syncMode:'Hourly', description:'Push curated views to BigQuery for BI consumption.' },
      { name:'Redshift', emoji:'🔴', type:'Data Warehouse', status:'degraded', lastSync:'3h ago', rowsDay:'0', segments:2, syncMode:'Daily', description:'Rate limited — sync paused. Last error: connection timeout.' },
      { name:'Marketo', emoji:'💜', type:'Marketing Automation', status:'healthy', lastSync:'4h ago', rowsDay:'8,800', segments:2, syncMode:'Daily', description:'Sync lead lists and activity scores to Marketo programs.' },
      { name:'Klaviyo', emoji:'⚫', type:'Email Marketing', status:'healthy', lastSync:'5h ago', rowsDay:'22,100', segments:2, syncMode:'Hourly', description:'Audience sync for email campaign targeting.' },
      { name:'REST API', emoji:'🔗', type:'Custom Webhook', status:'healthy', lastSync:'12h ago', rowsDay:'2,200', segments:1, syncMode:'Daily', description:'Push JSON payloads to a custom REST endpoint with OAuth bearer auth.' },
    ];
    const statusMap = {
      healthy: { badge:'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400', dot:'bg-emerald-400' },
      degraded: { badge:'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400', dot:'bg-amber-400' },
    };
    const cards = document.getElementById('destCards');
    destinations.forEach(d => {
      const s = statusMap[d.status];
      cards.innerHTML += `
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="text-2xl">${d.emoji}</span>
              <div>
                <div class="text-sm font-semibold">${d.name}</div>
                <div class="text-[9px] text-gray-400">${d.type}</div>
              </div>
            </div>
            <span class="text-[9px] px-2 py-0.5 rounded-full font-semibold ${s.badge}">${d.status}</span>
          </div>
          <p class="text-[10px] text-gray-500 dark:text-gray-400 mb-3">${d.description}</p>
          <div class="grid grid-cols-2 gap-2 mb-3">
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg px-2 py-1.5">
              <div class="mono text-[10px] font-bold text-gray-700 dark:text-gray-300">${d.rowsDay}</div>
              <div class="text-[9px] text-gray-400">rows / day</div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg px-2 py-1.5">
              <div class="mono text-[10px] font-bold text-gray-700 dark:text-gray-300">${d.segments}</div>
              <div class="text-[9px] text-gray-400">segments</div>
            </div>
          </div>
          <div class="flex items-center justify-between text-[9px] text-gray-400">
            <span>Last sync: ${d.lastSync}</span>
            <span class="px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-700">${d.syncMode}</span>
          </div>
          <div class="mt-3 flex gap-1.5">
            <a href="field-mapping.html" class="flex-1 text-center text-[10px] py-1 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Map fields</a>
            <a href="sync-schedule.html" class="flex-1 text-center text-[10px] py-1 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Schedule</a>
          </div>
        </div>`;
    });
    const available = [
      { name:'Intercom', emoji:'💬', type:'Support' },
      { name:'Amplitude', emoji:'📈', type:'Analytics' },
      { name:'Mixpanel', emoji:'🔮', type:'Analytics' },
      { name:'Zendesk', emoji:'🟢', type:'Support' },
      { name:'Stripe', emoji:'🏦', type:'Payments' },
      { name:'Braze', emoji:'🔥', type:'Marketing' },
      { name:'Segment', emoji:'◎', type:'CDP' },
      { name:'Databricks', emoji:'🧱', type:'Data Warehouse' },
    ];
    const avail = document.getElementById('availConnectors');
    available.forEach(c => {
      avail.innerHTML += `<button class="flex items-center gap-2 bg-white dark:bg-gray-800 border border-dashed border-gray-300 dark:border-gray-600 rounded-xl px-3 py-2.5 hover:border-pink-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 transition-colors text-left">
        <span class="text-xl">${c.emoji}</span>
        <div><div class="text-xs font-semibold">${c.name}</div><div class="text-[9px] text-gray-400">${c.type}</div></div>
      </button>`;
    });
    lucide.createIcons();
  </script>
</body>
</html>
