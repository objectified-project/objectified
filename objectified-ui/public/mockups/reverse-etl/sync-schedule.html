<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Reverse — Sync Schedule</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="reverse-etl-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">
          <i data-lucide="send" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Reverse</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Sync Schedule</span>
    </div>
    <div class="flex items-center gap-2">
      <button class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg bg-pink-600 hover:bg-pink-700 text-white font-semibold">
        <i data-lucide="save" class="w-3.5 h-3.5"></i> Save Changes
      </button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-8 space-y-6">
    <h2 class="text-sm font-semibold">Per-Destination Sync Cadence</h2>

    <!-- Schedule cards -->
    <div class="space-y-3" id="scheduleCards"></div>

    <!-- Timezone note -->
    <div class="flex items-start gap-2 text-[10px] text-gray-500 bg-blue-50 dark:bg-blue-900/10 border border-blue-200 dark:border-blue-800/40 rounded-xl px-4 py-3">
      <i data-lucide="info" class="w-3.5 h-3.5 text-blue-400 flex-shrink-0 mt-0.5"></i>
      <span>All schedule times are stored in UTC. The display timezone (America/Los_Angeles) is per-user. Daily batch windows run at 03:00 UTC to avoid peak API rate-limit windows for Salesforce and HubSpot.</span>
    </div>
  </div>

  <script>
    ReverseEtlShared.bindThemeToggle();
    const schedules = [
      { name:'Salesforce', emoji:'☁️', mode:'Real-time', segments:'Enterprise Customers', lag:'< 5s', nextRun:'continuous', rateLimitPct:38, rateTotal:'10,000/min', rateCur:'3,840/min' },
      { name:'HubSpot', emoji:'🟠', mode:'Hourly', segments:'Enterprise Customers, Growth Leads', lag:'~45 min', nextRun:'16:00 UTC', rateLimitPct:12, rateTotal:'40,000/hr', rateCur:'4,800/hr' },
      { name:'Snowflake', emoji:'❄️', mode:'Hourly', segments:'All Customers, All Orders, Transactions', lag:'~60 min', nextRun:'16:00 UTC', rateLimitPct:62, rateTotal:'Unlimited', rateCur:'840K rows/hr' },
      { name:'BigQuery', emoji:'🔵', mode:'Hourly', segments:'All Customers, High-Value Orders', lag:'~60 min', nextRun:'16:15 UTC', rateLimitPct:44, rateTotal:'Unlimited', rateCur:'620K rows/hr' },
      { name:'Redshift', emoji:'🔴', mode:'Daily', segments:'Analytics Export', lag:'~24h', nextRun:'03:00 UTC', rateLimitPct:0, rateTotal:'Unlimited', rateCur:'paused' },
      { name:'Marketo', emoji:'💜', mode:'Daily', segments:'Marketing Qualified Leads', lag:'~24h', nextRun:'04:00 UTC', rateLimitPct:8, rateTotal:'50,000/day', rateCur:'8,800/day' },
      { name:'Klaviyo', emoji:'⚫', mode:'Hourly', segments:'Churned Customers, Re-engagement', lag:'~45 min', nextRun:'16:30 UTC', rateLimitPct:44, rateTotal:'50,000/hr', rateCur:'22,100/hr' },
      { name:'REST API', emoji:'🔗', mode:'Daily', segments:'Custom Webhook Export', lag:'~24h', nextRun:'03:00 UTC', rateLimitPct:4, rateTotal:'Unlimited', rateCur:'2,200/day' },
    ];
    const modeColors = {
      'Real-time': 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400',
      'Hourly': 'bg-sky-100 dark:bg-sky-900/30 text-sky-700 dark:text-sky-400',
      'Daily': 'bg-violet-100 dark:bg-violet-900/30 text-violet-700 dark:text-violet-400',
    };
    const cards = document.getElementById('scheduleCards');
    schedules.forEach(s => {
      const mc = modeColors[s.mode];
      const ratePct = s.rateLimitPct;
      const rateBarColor = ratePct > 75 ? 'bg-red-500' : ratePct > 50 ? 'bg-amber-500' : 'bg-emerald-500';
      cards.innerHTML += `
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
          <div class="flex items-center gap-3 mb-3">
            <span class="text-xl">${s.emoji}</span>
            <div class="flex-1">
              <div class="flex items-center gap-2">
                <span class="text-sm font-semibold">${s.name}</span>
                <span class="text-[9px] px-2 py-0.5 rounded-full font-semibold ${mc}">${s.mode}</span>
              </div>
              <div class="text-[10px] text-gray-400 mt-0.5">Segments: ${s.segments}</div>
            </div>
            <div class="text-right text-[10px] text-gray-400">
              <div>Next run: <span class="mono text-gray-600 dark:text-gray-300">${s.nextRun}</span></div>
              <div>Est. lag: <span class="mono text-gray-600 dark:text-gray-300">${s.lag}</span></div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="text-[9px] text-gray-500 w-20 flex-shrink-0">API Rate</div>
            <div class="flex-1 h-1.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
              <div class="h-full ${rateBarColor} rounded-full transition-all" style="width:${ratePct}%"></div>
            </div>
            <div class="mono text-[9px] text-gray-500">${ratePct}%</div>
            <div class="mono text-[9px] text-gray-400">${s.rateCur} / ${s.rateTotal}</div>
          </div>
        </div>`;
    });
    lucide.createIcons();
  </script>
</body>
</html>
