<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Wormhole — Bridges</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="wormhole-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-sky-500 to-indigo-700 flex items-center justify-center">
          <i data-lucide="route" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Wormhole</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Bridges</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="bridge-designer.html" class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg bg-sky-600 hover:bg-sky-700 text-white font-semibold">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i> New Bridge
      </a>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
    </div>
  </div>
  <div class="max-w-5xl mx-auto px-6 py-8 space-y-6">
    <h2 class="text-sm font-semibold">Configured Bridges</h2>
    <div class="space-y-3" id="bridgeCards"></div>
  </div>
  <script>
    WormholeShared.bindThemeToggle();
    const bridges = [
      { id:'WH-001', src:'Production (US-East)', dest:'Staging (US-East)', dir:'bidirectional', mode:'scheduled', schedule:'Hourly', classes:['Customer','Order','Product','Transaction','Subscription','ApiKey'], status:'active', rowsDay:'1.2M', lastRun:'5 min ago', schemaOk:true, conflictPolicy:'source-wins' },
      { id:'WH-002', src:'Production (US-East)', dest:'Production (EU-West)', dir:'bidirectional', mode:'real-time', schedule:'Real-time', classes:['Customer','Order','Product','Subscription'], status:'active', rowsDay:'840K', lastRun:'12s ago', schemaOk:true, conflictPolicy:'source-wins' },
      { id:'WH-003', src:'Production (EU-West)', dest:'Production (APAC)', dir:'one-way', mode:'scheduled', schedule:'Daily 02:00 UTC', classes:['Product','Subscription','Config'], status:'active', rowsDay:'320K', lastRun:'2h ago', schemaOk:true, conflictPolicy:'n/a' },
      { id:'WH-004', src:'Staging (US-East)', dest:'Dev (US-East)', dir:'one-way', mode:'scheduled', schedule:'Every 6h', classes:['Customer','Order','Product','Transaction','ApiKey','Config','Permission','UserProfile'], status:'active', rowsDay:'480K', lastRun:'1h ago', schemaOk:true, conflictPolicy:'n/a' },
      { id:'WH-005', src:'Production (US-East)', dest:'Production (APAC)', dir:'one-way', mode:'scheduled', schedule:'Daily 03:00 UTC', classes:['Customer','Subscription'], status:'degraded', rowsDay:'0', lastRun:'3h ago', schemaOk:false, conflictPolicy:'n/a', issue:'Schema mismatch: Customer v2.1 → APAC has v2.0' },
      { id:'WH-006', src:'Production (US-East)', dest:'DR (US-West)', dir:'one-way', mode:'real-time', schedule:'Real-time', classes:['Customer','Order','Transaction'], status:'paused', rowsDay:'paused', lastRun:'1d ago', schemaOk:true, conflictPolicy:'n/a' },
    ];
    const statusColors = {
      active:   'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400',
      degraded: 'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400',
      paused:   'bg-gray-100 dark:bg-gray-700 text-gray-500',
    };
    const dirColors = {
      'bidirectional': 'bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400',
      'one-way':       'bg-sky-100 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400',
    };
    const cards = document.getElementById('bridgeCards');
    bridges.forEach(b => {
      cards.innerHTML += `
        <div class="bg-white dark:bg-gray-800 rounded-xl border ${b.status==='degraded'?'border-amber-300 dark:border-amber-700':'border-gray-200 dark:border-gray-700'} p-4">
          ${b.issue ? `<div class="flex items-center gap-2 text-[10px] text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-700/40 rounded-lg px-3 py-2 mb-3"><i data-lucide="alert-triangle" class="w-3 h-3 flex-shrink-0"></i>${b.issue}</div>` : ''}
          <div class="flex items-center gap-3 mb-3">
            <span class="mono text-[10px] text-gray-400">${b.id}</span>
            <span class="text-[9px] px-2 py-0.5 rounded-full font-semibold ${statusColors[b.status]}">${b.status}</span>
            <span class="text-[9px] px-2 py-0.5 rounded-full ${dirColors[b.dir]}">${b.dir}</span>
            <span class="text-[9px] px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-500 ml-auto">${b.schedule}</span>
          </div>
          <div class="flex items-center gap-3 text-sm mb-3">
            <div class="flex-1 bg-gray-50 dark:bg-gray-700/50 rounded-lg px-3 py-2">
              <div class="text-[9px] text-gray-400 mb-0.5">Source</div>
              <div class="font-semibold text-xs">${b.src}</div>
            </div>
            <i data-lucide="${b.dir==='bidirectional'?'arrow-left-right':'arrow-right'}" class="w-4 h-4 text-sky-400 flex-shrink-0"></i>
            <div class="flex-1 bg-gray-50 dark:bg-gray-700/50 rounded-lg px-3 py-2">
              <div class="text-[9px] text-gray-400 mb-0.5">Destination</div>
              <div class="font-semibold text-xs">${b.dest}</div>
            </div>
          </div>
          <div class="flex flex-wrap gap-1 mb-3">
            ${b.classes.map(c => `<span class="mono text-[9px] px-1.5 py-0.5 rounded bg-sky-50 dark:bg-sky-900/20 text-sky-600 dark:text-sky-400">${c}</span>`).join('')}
          </div>
          <div class="flex items-center gap-4 text-[9px] text-gray-400">
            <span>Last run: ${b.lastRun}</span>
            <span class="mono">${b.rowsDay} rows/day</span>
            <span class="${b.schemaOk?'text-emerald-500':'text-red-500'}">${b.schemaOk?'✓ schema compatible':'✗ schema mismatch'}</span>
            ${b.dir==='bidirectional'?`<span>Conflict: ${b.conflictPolicy}</span>`:''}
            <div class="ml-auto flex gap-1.5">
              <a href="schema-compat.html" class="text-[9px] px-2 py-0.5 rounded border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Check schema</a>
              <button class="text-[9px] px-2 py-0.5 rounded border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">${b.status==='paused'?'Resume':'Pause'}</button>
            </div>
          </div>
        </div>`;
    });
    lucide.createIcons();
  </script>
</body>
</html>
