<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Wormhole — Transfer Runs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="wormhole-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-sky-500 to-indigo-700 flex items-center justify-center">
          <i data-lucide="route" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Wormhole</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Transfer Runs</span>
    </div>
    <div class="flex items-center gap-2">
      <select class="text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-1.5 focus:outline-none">
        <option>All bridges</option>
        <option>WH-001</option>
        <option>WH-002</option>
        <option>WH-005</option>
      </select>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-8 space-y-6">

    <!-- KPIs -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-gray-700 dark:text-gray-200">194</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Runs (7d)</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-emerald-500">99.97%</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Success rate</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-sky-500">8.1M</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Rows transferred</div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 text-center">
        <div class="text-2xl font-bold text-amber-500">1</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Errors</div>
      </div>
    </div>

    <!-- Runs table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/50">
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Run ID</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Bridge</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Route</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Started</th>
            <th class="text-right px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Rows</th>
            <th class="text-right px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Conflicts</th>
            <th class="text-right px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Duration</th>
            <th class="text-left px-4 py-2.5 text-[9px] font-semibold uppercase tracking-widest text-gray-500">Status</th>
          </tr>
        </thead>
        <tbody id="runsTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    WormholeShared.bindThemeToggle();
    const runs = [
      { id:'WTR-8801', bridge:'WH-001', route:'Prod US→Staging US', started:'2026-05-13 16:00', rows:1200400, conflicts:0, duration:'2m 18s', status:'success' },
      { id:'WTR-8800', bridge:'WH-002', route:'Prod US↔Prod EU',    started:'2026-05-13 15:58', rows:840200,  conflicts:2, duration:'3m 04s', status:'success' },
      { id:'WTR-8799', bridge:'WH-003', route:'Prod EU→Prod APAC',  started:'2026-05-13 15:00', rows:320100,  conflicts:0, duration:'1m 44s', status:'success' },
      { id:'WTR-8798', bridge:'WH-004', route:'Staging US→Dev US',  started:'2026-05-13 12:00', rows:480800,  conflicts:0, duration:'58s',    status:'success' },
      { id:'WTR-8797', bridge:'WH-005', route:'Prod US→Prod APAC',  started:'2026-05-13 03:00', rows:0,       conflicts:0, duration:'12s',    status:'error', reason:'Schema mismatch: Transaction v2.0' },
      { id:'WTR-8796', bridge:'WH-001', route:'Prod US→Staging US', started:'2026-05-13 15:00', rows:1199800, conflicts:1, duration:'2m 22s', status:'success' },
      { id:'WTR-8795', bridge:'WH-002', route:'Prod US↔Prod EU',    started:'2026-05-13 14:58', rows:839600,  conflicts:3, duration:'2m 58s', status:'success' },
      { id:'WTR-8794', bridge:'WH-003', route:'Prod EU→Prod APAC',  started:'2026-05-13 02:00', rows:319400,  conflicts:0, duration:'1m 38s', status:'success' },
      { id:'WTR-8793', bridge:'WH-004', route:'Staging US→Dev US',  started:'2026-05-13 06:00', rows:480200,  conflicts:0, duration:'55s',    status:'success' },
    ];
    const statusColors = {
      success: 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400',
      error:   'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400',
    };
    const tbody = document.getElementById('runsTable');
    runs.forEach(r => {
      tbody.innerHTML += `
        <tr class="border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/20 transition-colors ${r.status==='error'?'bg-red-50/30 dark:bg-red-900/5':''}">
          <td class="px-4 py-2.5 mono text-[10px] text-sky-500"><a href="transfer-audit.html" class="hover:underline">${r.id}</a></td>
          <td class="px-4 py-2.5 mono text-[10px] text-indigo-500">${r.bridge}</td>
          <td class="px-4 py-2.5 text-[10px] text-gray-500">${r.route}</td>
          <td class="px-4 py-2.5 mono text-[10px] text-gray-500">${r.started}</td>
          <td class="px-4 py-2.5 mono text-[10px] text-right">${r.rows.toLocaleString()}</td>
          <td class="px-4 py-2.5 mono text-[10px] text-right ${r.conflicts>0?'text-amber-500':''}">${r.conflicts}</td>
          <td class="px-4 py-2.5 mono text-[10px] text-right text-gray-400">${r.duration}</td>
          <td class="px-4 py-2.5">
            <span class="text-[9px] px-2 py-0.5 rounded-full font-semibold ${statusColors[r.status]}">${r.status}</span>
            ${r.reason?`<div class="mono text-[9px] text-red-400 mt-0.5">${r.reason}</div>`:''}
          </td>
        </tr>`;
    });
    lucide.createIcons();
  </script>
</body>
</html>
