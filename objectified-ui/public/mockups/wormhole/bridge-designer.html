<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified Wormhole — Bridge Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="wormhole-shared.js"></script>
  <style>html,body{font-family:'Inter',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}
  .step-active { border-color: #0ea5e9; background: rgba(14,165,233,0.06); }
  .step-done { border-color: #34d399; background: rgba(52,211,153,0.05); }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-sky-500 to-indigo-700 flex items-center justify-center">
          <i data-lucide="route" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold">Wormhole</span>
      </a>
      <span class="text-xs text-gray-400">/</span>
      <span class="text-sm text-gray-500">Bridge Designer</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-6 py-8 space-y-6">

    <!-- Step progress -->
    <div class="flex items-center gap-1">
      <div class="flex items-center gap-2 flex-1">
        <div class="w-6 h-6 rounded-full bg-sky-500 text-white text-[10px] flex items-center justify-center font-bold">1</div>
        <span class="text-[11px] font-semibold text-sky-600 dark:text-sky-400">Environments</span>
      </div>
      <div class="h-px flex-1 bg-sky-200 dark:bg-sky-800"></div>
      <div class="flex items-center gap-2 flex-1 justify-center">
        <div class="w-6 h-6 rounded-full bg-sky-500 text-white text-[10px] flex items-center justify-center font-bold">2</div>
        <span class="text-[11px] font-semibold text-sky-600 dark:text-sky-400">Classes</span>
      </div>
      <div class="h-px flex-1 bg-gray-200 dark:bg-gray-700"></div>
      <div class="flex items-center gap-2 flex-1 justify-center">
        <div class="w-6 h-6 rounded-full bg-gray-300 dark:bg-gray-600 text-gray-500 text-[10px] flex items-center justify-center font-bold">3</div>
        <span class="text-[11px] text-gray-400">Policy</span>
      </div>
      <div class="h-px flex-1 bg-gray-200 dark:bg-gray-700"></div>
      <div class="flex items-center gap-2 flex-1 justify-end">
        <div class="w-6 h-6 rounded-full bg-gray-300 dark:bg-gray-600 text-gray-500 text-[10px] flex items-center justify-center font-bold">4</div>
        <span class="text-[11px] text-gray-400">Schedule</span>
      </div>
    </div>

    <!-- Step 1: Environments -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-sky-300 dark:border-sky-700 p-5 step-active">
      <h3 class="text-sm font-semibold mb-4 flex items-center gap-2">
        <span class="w-5 h-5 rounded-full bg-sky-500 text-white text-[9px] flex items-center justify-center font-bold">1</span>
        Source & Destination Environments
      </h3>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 block">Source Environment</label>
          <select class="w-full text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:border-sky-500">
            <option>Production (US-East)</option>
            <option>Production (EU-West)</option>
            <option>Staging (US-East)</option>
            <option>Dev (US-East)</option>
          </select>
        </div>
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 block">Destination Environment</label>
          <select class="w-full text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:border-sky-500">
            <option>Production (APAC)</option>
            <option>Production (EU-West)</option>
            <option>Staging (US-East)</option>
            <option>DR (US-West)</option>
          </select>
        </div>
      </div>
      <div class="mt-4">
        <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 block">Transfer Direction</label>
        <div class="flex gap-3">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="dir" value="one-way" checked class="accent-sky-500"/>
            <span class="text-xs">One-way (source → dest)</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="dir" value="bidir" class="accent-sky-500"/>
            <span class="text-xs">Bidirectional (⇄)</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Step 2: Classes -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-sky-300 dark:border-sky-700 p-5 step-active">
      <h3 class="text-sm font-semibold mb-4 flex items-center gap-2">
        <span class="w-5 h-5 rounded-full bg-sky-500 text-white text-[9px] flex items-center justify-center font-bold">2</span>
        Class Selection & Schema Check
      </h3>
      <div class="space-y-2" id="classChecks"></div>
    </div>

    <!-- Step 3: Policy -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 opacity-60">
      <h3 class="text-sm font-semibold mb-4 flex items-center gap-2">
        <span class="w-5 h-5 rounded-full bg-gray-300 dark:bg-gray-600 text-gray-500 text-[9px] flex items-center justify-center font-bold">3</span>
        Residency Policy &amp; Conflict Resolution
      </h3>
      <div class="grid grid-cols-2 gap-4 pointer-events-none">
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 block">Conflict Resolution</label>
          <select class="w-full text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none" disabled>
            <option>source-wins</option>
            <option>destination-wins</option>
            <option>manual-merge</option>
          </select>
        </div>
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 block">Residency Override</label>
          <select class="w-full text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none" disabled>
            <option>Apply default policies</option>
            <option>Require manual approval</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Step 4: Schedule -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 opacity-60">
      <h3 class="text-sm font-semibold mb-4 flex items-center gap-2">
        <span class="w-5 h-5 rounded-full bg-gray-300 dark:bg-gray-600 text-gray-500 text-[9px] flex items-center justify-center font-bold">4</span>
        Schedule &amp; Activation
      </h3>
      <div class="flex gap-3 pointer-events-none">
        <label class="flex items-center gap-2"><input type="radio" name="sched" disabled/><span class="text-xs">Real-time</span></label>
        <label class="flex items-center gap-2"><input type="radio" name="sched" disabled/><span class="text-xs">Hourly</span></label>
        <label class="flex items-center gap-2"><input type="radio" name="sched" disabled/><span class="text-xs">Daily</span></label>
        <label class="flex items-center gap-2"><input type="radio" name="sched" disabled/><span class="text-xs">Cron expression</span></label>
      </div>
    </div>

    <div class="flex justify-end gap-3">
      <button class="text-xs px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Cancel</button>
      <button class="text-xs px-4 py-2 rounded-lg bg-sky-600 hover:bg-sky-700 text-white font-semibold">Continue →</button>
    </div>
  </div>

  <script>
    WormholeShared.bindThemeToggle();
    const classes = [
      { name:'Customer',   compat:true,  srcVer:'v2.1', destVer:'v2.1' },
      { name:'Order',      compat:true,  srcVer:'v3.0', destVer:'v3.0' },
      { name:'Product',    compat:true,  srcVer:'v1.4', destVer:'v1.4' },
      { name:'Subscription',compat:true, srcVer:'v1.2', destVer:'v1.2' },
      { name:'Transaction',compat:false, srcVer:'v2.0', destVer:'v1.9', issue:'Dest missing field: payment_method_v2' },
      { name:'UserProfile',compat:false, srcVer:'v1.5', destVer:'v1.5', issue:'Residency policy: PII class blocked for APAC' },
      { name:'ApiKey',     compat:true,  srcVer:'v1.0', destVer:'v1.0' },
    ];
    const cc = document.getElementById('classChecks');
    classes.forEach(c => {
      const checked = c.compat && !c.issue;
      cc.innerHTML += `
        <div class="flex items-center gap-3 px-3 py-2 rounded-lg border ${c.compat && !c.issue ? 'border-gray-100 dark:border-gray-700' : 'border-amber-200 dark:border-amber-700/40 bg-amber-50 dark:bg-amber-900/5'}">
          <input type="checkbox" ${checked ? 'checked' : ''} ${!c.compat ? 'disabled' : ''} class="accent-sky-500 w-3.5 h-3.5"/>
          <span class="mono text-[11px] text-gray-700 dark:text-gray-200 w-28">${c.name}</span>
          <span class="mono text-[9px] text-gray-400">${c.srcVer}</span>
          <i data-lucide="arrow-right" class="w-3 h-3 text-gray-400 flex-shrink-0"></i>
          <span class="mono text-[9px] text-gray-400">${c.destVer}</span>
          ${c.compat ? '<span class="text-emerald-500 text-[9px] ml-auto">✓ compatible</span>' : ''}
          ${c.issue ? `<span class="text-amber-500 text-[9px] ml-auto">${c.issue}</span>` : ''}
        </div>`;
    });
    lucide.createIcons();
  </script>
</body>
</html>
