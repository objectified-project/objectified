<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectified CDC — Capture Stream ★</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="cdc-shared.js"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; overflow: hidden; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .pane { height: calc(100vh - 48px); overflow-y: auto; }
    .grid-bg-dark {
      background-color: #030712;
      background-image: radial-gradient(circle, #334155 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .event-row { animation: slideIn 0.25s ease-out; }
    @keyframes slideIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
    .pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .table-row { cursor: pointer; transition: background 0.1s; }
    .table-row.selected { background: rgba(225,29,72,0.08); border-left: 2px solid #e11d48; }
    .table-row:not(.selected):hover { background: rgba(255,255,255,0.03); }
  </style>
</head>
<body class="bg-gray-900 text-gray-100" style="height:100vh;overflow:hidden;">

  <!-- Nav -->
  <div class="h-12 border-b border-gray-800 bg-gray-900/90 backdrop-blur flex items-center justify-between px-4 flex-shrink-0" style="position:relative;z-index:10;">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-rose-600 to-fuchsia-500 flex items-center justify-center">
          <i data-lucide="waves" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-sm font-semibold text-gray-100">Objectified</span>
      </a>
      <span class="text-xs text-gray-600">/</span>
      <span class="text-sm font-medium text-rose-400">CDC</span>
      <span class="text-xs text-gray-600">/</span>
      <span class="text-sm text-gray-400">Capture Stream</span>
      <span class="text-[9px] px-1.5 py-0.5 rounded-full bg-rose-900/40 text-rose-400 border border-rose-700/50 font-bold">★ STAR</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1.5 text-xs text-emerald-400">
        <span class="w-2 h-2 rounded-full bg-emerald-500 pulse"></span>
        <span id="evtCounter">0 events captured</span>
      </div>
      <button id="pauseBtn" class="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded border border-gray-700 hover:bg-gray-800 text-gray-300">
        <i data-lucide="pause" class="w-3 h-3"></i> Pause
      </button>
      <button id="themeBtn" class="w-8 h-8 rounded-md border border-gray-700 hover:bg-gray-800 flex items-center justify-center">
        <i data-lucide="sun-moon" class="w-4 h-4"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-rose-600 flex items-center justify-center text-white text-xs font-semibold">KS</div>
    </div>
  </div>

  <div class="flex" style="height:calc(100vh - 48px);">

    <!-- LEFT: Table list (260px) -->
    <div class="pane w-64 flex-shrink-0 border-r border-gray-800 bg-gray-900">
      <div class="px-3 py-3 border-b border-gray-800">
        <div class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-2">Source Tables</div>
        <div class="text-[10px] text-gray-500 mono">prod-postgres-main</div>
      </div>
      <div id="tableList" class="divide-y divide-gray-800/60">
      </div>
    </div>

    <!-- CENTER: Live event stream (dark canvas) -->
    <div class="flex-1 pane grid-bg-dark relative" id="eventCanvas">
      <!-- stream header -->
      <div class="sticky top-0 z-10 bg-gray-950/90 backdrop-blur border-b border-gray-800/60 px-4 py-2 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-xs font-semibold text-gray-300">Live CDC Events</span>
          <span class="text-[10px] text-gray-500 mono" id="tableLabel">public.users</span>
        </div>
        <div class="flex items-center gap-3 text-[10px]">
          <span class="flex items-center gap-1 text-emerald-400"><span class="w-2 h-2 rounded-sm bg-emerald-500"></span> INSERT</span>
          <span class="flex items-center gap-1 text-amber-400"><span class="w-2 h-2 rounded-sm bg-amber-500"></span> UPDATE</span>
          <span class="flex items-center gap-1 text-red-400"><span class="w-2 h-2 rounded-sm bg-red-500"></span> DELETE</span>
        </div>
      </div>
      <div id="eventStream" class="px-4 py-3 space-y-1.5 font-mono text-[11px]"></div>
    </div>

    <!-- RIGHT: Event detail / before-after diff (280px) -->
    <div class="pane w-72 flex-shrink-0 border-l border-gray-800 bg-gray-900">
      <div class="px-4 py-3 border-b border-gray-800">
        <div class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest">Event Detail</div>
      </div>
      <div id="detailPanel" class="px-4 py-3">
        <div class="text-center text-gray-600 text-xs pt-8">
          <i data-lucide="mouse-pointer-click" class="w-8 h-8 mx-auto mb-2 opacity-40"></i>
          Click an event to inspect before/after values
        </div>
      </div>
    </div>

  </div>

<script>
(function() {
  CDCShared.bindThemeToggle();

  const tables = [
    { name: 'users', schema: 'public', ins: 142, upd: 87, del: 3, rps: 4.2 },
    { name: 'sessions', schema: 'public', ins: 890, upd: 12, del: 411, rps: 18.7 },
    { name: 'orders', schema: 'public', ins: 34, upd: 201, del: 2, rps: 3.1 },
    { name: 'order_items', schema: 'public', ins: 68, upd: 5, del: 1, rps: 2.8 },
    { name: 'products', schema: 'analytics', ins: 2, upd: 44, del: 0, rps: 0.4 },
    { name: 'page_views', schema: 'analytics', ins: 5200, upd: 0, del: 0, rps: 88.1 },
    { name: 'tenant_config', schema: 'public', ins: 0, upd: 7, del: 0, rps: 0.1 },
  ];

  let selectedTable = tables[0];
  let paused = false;
  let totalEvents = 0;
  let streamTimer = null;

  const tableList = document.getElementById('tableList');
  const eventStream = document.getElementById('eventStream');
  const detailPanel = document.getElementById('detailPanel');
  const evtCounter = document.getElementById('evtCounter');
  const tableLabel = document.getElementById('tableLabel');
  const pauseBtn = document.getElementById('pauseBtn');

  // Build table list
  function buildTableList() {
    tableList.innerHTML = '';
    tables.forEach(t => {
      const div = document.createElement('div');
      div.className = 'table-row px-3 py-2.5' + (t.name === selectedTable.name ? ' selected' : '');
      div.innerHTML = `
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs font-semibold text-gray-200">${t.schema}.<span class="text-rose-400">${t.name}</span></span>
          <span class="text-[10px] text-gray-500 mono">${t.rps}/s</span>
        </div>
        <div class="flex gap-2 text-[10px]">
          <span class="text-emerald-500">↑${t.ins}</span>
          <span class="text-amber-400">↻${t.upd}</span>
          <span class="text-red-400">✕${t.del}</span>
        </div>`;
      div.addEventListener('click', () => {
        selectedTable = t;
        tableLabel.textContent = t.schema + '.' + t.name;
        eventStream.innerHTML = '';
        buildTableList();
      });
      tableList.appendChild(div);
    });
  }
  buildTableList();

  const userFirstNames = ['Alice','Bob','Carlos','Diana','Ethan','Fatima','George','Hannah','Ivan','Jia','Kenji','Laura'];
  const userLastNames = ['Smith','Johnson','Garcia','Williams','Lee','Brown','Davis','Wilson','Martinez','Anderson'];
  const emailDomains = ['example.com','acme.org','corp.io','data.dev'];
  const plans = ['free','pro','enterprise'];
  const statuses = ['active','inactive','pending'];

  function randEl(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
  function randId() { return randInt(1000, 9999); }

  function genEvent(table) {
    const ops = ['INSERT','UPDATE','DELETE'];
    const weights = [0.5, 0.35, 0.15];
    let r = Math.random(), cumW = 0, op = 'INSERT';
    for (let i = 0; i < ops.length; i++) { cumW += weights[i]; if (r < cumW) { op = ops[i]; break; } }

    const lsn = `0/${(Math.floor(Math.random() * 0x5000000)).toString(16).toUpperCase().padStart(8,'0')}`;
    const now = new Date().toISOString().replace('T',' ').slice(0,23);
    const id = randInt(10000, 99999);
    const fn = randEl(userFirstNames), ln = randEl(userLastNames);
    const email = fn.toLowerCase() + '.' + ln.toLowerCase() + '@' + randEl(emailDomains);

    if (table.name === 'users') {
      const before = op !== 'INSERT' ? { id, email, first_name: fn, last_name: ln, plan: randEl(plans), status: randEl(statuses), updated_at: now } : null;
      const after = op !== 'DELETE' ? { id, email: op === 'UPDATE' ? (email+'_new') : email, first_name: fn, last_name: ln, plan: op === 'UPDATE' ? randEl(plans) : randEl(plans), status: op === 'UPDATE' ? randEl(statuses) : randEl(statuses), updated_at: now } : null;
      return { op, lsn, ts: now, table: table.schema+'.'+table.name, before, after };
    }
    if (table.name === 'orders') {
      const amount = (randInt(10,4999)/100).toFixed(2);
      const before = op !== 'INSERT' ? { id, customer_id: randInt(1,5000), amount, status: randEl(['pending','paid','shipped']), created_at: now } : null;
      const after = op !== 'DELETE' ? { id, customer_id: randInt(1,5000), amount, status: randEl(['pending','paid','shipped','cancelled']), updated_at: now } : null;
      return { op, lsn, ts: now, table: table.schema+'.'+table.name, before, after };
    }
    // generic
    const before = op !== 'INSERT' ? { id, value: randInt(100,9999), updated_at: now } : null;
    const after = op !== 'DELETE' ? { id, value: randInt(100,9999), created_at: now } : null;
    return { op, lsn, ts: now, table: table.schema+'.'+table.name, before, after };
  }

  function opColor(op) {
    if (op === 'INSERT') return 'text-emerald-400';
    if (op === 'UPDATE') return 'text-amber-400';
    return 'text-red-400';
  }
  function opBg(op) {
    if (op === 'INSERT') return 'bg-emerald-900/20 border-l-2 border-emerald-500/40';
    if (op === 'UPDATE') return 'bg-amber-900/20 border-l-2 border-amber-500/40';
    return 'bg-red-900/20 border-l-2 border-red-500/40';
  }

  function renderEventRow(evt) {
    const div = document.createElement('div');
    div.className = `event-row ${opBg(evt.op)} rounded px-3 py-2 cursor-pointer hover:brightness-125 transition-all`;
    div.innerHTML = `<div class="flex items-center gap-3">
      <span class="text-[10px] font-bold w-14 ${opColor(evt.op)}">${evt.op}</span>
      <span class="text-gray-500 text-[10px]">${evt.ts.slice(11,23)}</span>
      <span class="text-gray-400 mono text-[10px] flex-1 truncate">${evt.table}</span>
      <span class="text-gray-600 mono text-[10px]">${evt.lsn}</span>
    </div>
    <div class="mt-1 text-[10px] mono text-gray-500 truncate pl-16">
      ${evt.after ? renderInline(evt.after) : (evt.before ? renderInline(evt.before) : '')}
    </div>`;
    div.addEventListener('click', () => renderDetail(evt));
    return div;
  }

  function renderInline(obj) {
    return Object.entries(obj).slice(0,4).map(([k,v]) => `<span class="text-gray-600">${k}=</span><span class="text-gray-300">${JSON.stringify(v)}</span>`).join(' ');
  }

  function renderDetail(evt) {
    const colorClass = opColor(evt.op);
    let html = `<div class="mb-3">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-sm font-bold ${colorClass}">${evt.op}</span>
        <span class="text-xs text-gray-400 mono">${evt.table}</span>
      </div>
      <div class="text-[10px] text-gray-500 mono">${evt.lsn} · ${evt.ts}</div>
    </div>`;

    if (evt.op === 'UPDATE' && evt.before && evt.after) {
      html += `<div class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-2">Field-level diff</div>
        <div class="space-y-1.5">`;
      const allKeys = new Set([...Object.keys(evt.before), ...Object.keys(evt.after)]);
      allKeys.forEach(k => {
        const bv = evt.before[k], av = evt.after[k];
        const changed = JSON.stringify(bv) !== JSON.stringify(av);
        if (changed) {
          html += `<div class="rounded bg-amber-900/20 border border-amber-700/30 p-2">
            <div class="text-[10px] font-semibold text-amber-400 mb-1">${k} <span class="text-gray-500 font-normal">changed</span></div>
            <div class="flex items-start gap-2">
              <span class="text-[10px] mono text-red-400 line-through opacity-70">${JSON.stringify(bv)}</span>
              <span class="text-gray-600">→</span>
              <span class="text-[10px] mono text-emerald-400">${JSON.stringify(av)}</span>
            </div>
          </div>`;
        } else {
          html += `<div class="flex items-center gap-2 py-1 border-b border-gray-800/60">
            <span class="text-[10px] text-gray-500 w-24 truncate">${k}</span>
            <span class="text-[10px] mono text-gray-400 truncate">${JSON.stringify(av ?? bv)}</span>
          </div>`;
        }
      });
      html += '</div>';
    } else if (evt.op === 'INSERT' && evt.after) {
      html += `<div class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-2">New row values</div>
        <div class="space-y-1">`;
      Object.entries(evt.after).forEach(([k,v]) => {
        html += `<div class="flex items-center gap-2 py-1 border-b border-gray-800/60">
          <span class="text-[10px] text-gray-500 w-24 truncate">${k}</span>
          <span class="text-[10px] mono text-emerald-400 truncate">${JSON.stringify(v)}</span>
        </div>`;
      });
      html += '</div>';
    } else if (evt.op === 'DELETE' && evt.before) {
      html += `<div class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-2">Deleted row values</div>
        <div class="space-y-1">`;
      Object.entries(evt.before).forEach(([k,v]) => {
        html += `<div class="flex items-center gap-2 py-1 border-b border-gray-800/60">
          <span class="text-[10px] text-gray-500 w-24 truncate">${k}</span>
          <span class="text-[10px] mono text-red-400 line-through truncate">${JSON.stringify(v)}</span>
        </div>`;
      });
      html += '</div>';
    }

    detailPanel.innerHTML = html;
  }

  function addEvent() {
    if (paused) return;
    const evt = genEvent(selectedTable);
    totalEvents++;
    evtCounter.textContent = totalEvents.toLocaleString() + ' events captured';
    const row = renderEventRow(evt);
    eventStream.insertBefore(row, eventStream.firstChild);
    // trim to 40
    while (eventStream.children.length > 40) eventStream.removeChild(eventStream.lastChild);
    // update table counters
    if (evt.op === 'INSERT') selectedTable.ins++;
    else if (evt.op === 'UPDATE') selectedTable.upd++;
    else selectedTable.del++;
    buildTableList();
  }

  streamTimer = setInterval(addEvent, 600);

  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.innerHTML = paused
      ? '<i data-lucide="play" class="w-3 h-3"></i> Resume'
      : '<i data-lucide="pause" class="w-3 h-3"></i> Pause';
    lucide.createIcons();
  });

  lucide.createIcons();
})();
</script>
</body>
</html>
