<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events · Workflow canvas (React Flow)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12.10.2/dist/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; }
    .sidebar-light { background: linear-gradient(180deg, #ffffff 0%, #faf5ff 100%); box-shadow: 4px 0 18px rgba(88, 28, 135, 0.06); }
    .sidebar-dark  { background: linear-gradient(180deg, #1e1b2e 0%, #0f172a 100%); box-shadow: 4px 0 18px rgba(2, 6, 23, 0.32); }
    #flow-root { min-height: 560px; height: min(70vh, 720px); }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-2 text-sm flex-wrap">
      <div class="w-7 h-7 rounded-md bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center"><i data-lucide="zap" class="w-4 h-4 text-white"></i></div>
      <span class="font-semibold">Events</span><span class="text-gray-400">/</span><span class="text-violet-600 dark:text-violet-400">Workflow</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="index.html" class="text-xs text-gray-500 hover:text-violet-600">← Hub</a>
      <button id="themeBtn" type="button" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center"><i data-lucide="sun-moon" class="w-4 h-4"></i></button>
    </div>
  </div>
  <div class="flex flex-col md:flex-row" style="min-height: calc(100vh - 48px);">
    <aside class="flex-shrink-0 sidebar-light dark:sidebar-dark hidden md:block border-r border-violet-500/10" style="width: 260px;"><div class="p-4 overflow-auto max-h-[40vh] md:max-h-none" id="sidebar"></div></aside>
    <main class="flex-1 flex flex-col min-w-0 p-4 sm:p-6">
      <div class="mb-4 max-w-3xl">
        <h1 class="text-2xl font-bold flex items-center gap-2"><i data-lucide="workflow" class="w-7 h-7 text-violet-600"></i> Workflow canvas</h1>
        <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">Powered by <strong>React Flow</strong> (<code class="text-xs bg-gray-100 dark:bg-gray-800 px-1 rounded">@xyflow/react</code>) loaded via ESM. Drag nodes, connect edges, use minimap — graph is illustrative of pre → parallel → join → success/failure → audit.</p>
        <p id="flow-err" class="hidden mt-2 text-sm text-rose-600 dark:text-rose-400"></p>
      </div>
      <div class="flex-1 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-950 overflow-hidden shadow-inner" id="flow-root"></div>
    </main>
  </div>
  <script>
    const themeKey = 'events-mockup-theme';
    const stored = localStorage.getItem(themeKey);
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'dark' || (!stored && prefersDark)) document.documentElement.classList.add('dark');
    document.getElementById('themeBtn').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem(themeKey, document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>
  <script src="sidebar.js"></script>
  <script>lucide.createIcons();</script>
  <script type="module">
    import('./workflow-app.js').catch(function (e) {
      var el = document.getElementById('flow-err');
      if (el) {
        el.textContent = 'Could not load workflow bundle: ' + (e && e.message ? e.message : String(e)) + '. Serve over HTTP and allow esm.sh.';
        el.classList.remove('hidden');
      }
    });
  </script>
  <script>
    window.addEventListener('error', function (e) {
      var el = document.getElementById('flow-err');
      if (el && e.filename && e.filename.indexOf('workflow') !== -1) {
        el.textContent = 'Could not load React Flow bundle (network or CSP). Serve this folder over HTTP and allow esm.sh.';
        el.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
