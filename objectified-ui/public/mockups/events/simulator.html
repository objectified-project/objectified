<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events · Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .sidebar-light { background: linear-gradient(180deg, #ffffff 0%, #faf5ff 100%); box-shadow: 4px 0 18px rgba(88, 28, 135, 0.06); }
    .sidebar-dark  { background: linear-gradient(180deg, #1e1b2e 0%, #0f172a 100%); box-shadow: 4px 0 18px rgba(2, 6, 23, 0.32); }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-2 text-sm flex-wrap">
      <div class="w-7 h-7 rounded-md bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center"><i data-lucide="zap" class="w-4 h-4 text-white"></i></div>
      <span class="font-semibold">Events</span><span class="text-gray-400">/</span><span class="text-violet-600 dark:text-violet-400">Simulator</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="index.html" class="text-xs text-gray-500 hover:text-violet-600">← Hub</a>
      <button id="themeBtn" type="button" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center"><i data-lucide="sun-moon" class="w-4 h-4"></i></button>
    </div>
  </div>
  <div class="flex" style="min-height: calc(100vh - 48px);">
    <aside class="flex-shrink-0 sidebar-light dark:sidebar-dark hidden md:block" style="width: 260px;"><div class="p-4 h-full overflow-auto" id="sidebar"></div></aside>
    <main class="flex-1 overflow-auto p-4 sm:p-6 w-full max-w-4xl mx-auto">
      <h1 class="text-2xl font-bold mb-2">Dry-run simulator</h1>
      <p class="text-sm text-gray-600 dark:text-gray-400 mb-6">No writes — emits the same audit shape as production with <span class="mono">dry_run: true</span> on each step.</p>
      <div class="grid md:grid-cols-3 gap-6">
        <div class="md:col-span-1 space-y-3">
          <label class="text-xs font-semibold uppercase text-gray-500" for="sc">Scenario</label>
          <select id="sc" class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2 text-sm">
            <option value="q">Import quarantine + partial script failure</option>
            <option value="a">Auth threshold full parallel success</option>
            <option value="p">Projection dry-run (no writes)</option>
          </select>
          <button type="button" id="runBtn" class="w-full flex items-center justify-center gap-2 rounded-lg bg-violet-600 text-white py-2.5 text-sm font-semibold hover:bg-violet-700"><i data-lucide="play" class="w-4 h-4"></i> Run trace</button>
        </div>
        <div class="md:col-span-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-950 p-4 min-h-[280px]">
          <pre id="out" class="mono text-[11px] leading-relaxed text-emerald-100 whitespace-pre-wrap">Select a scenario and run trace.</pre>
        </div>
      </div>
    </main>
  </div>
  <script>
    const themeKey = 'events-mockup-theme';
    const stored = localStorage.getItem(themeKey);
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'dark' || (!stored && prefersDark)) document.documentElement.classList.add('dark');
    document.getElementById('themeBtn').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem(themeKey, document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
    const traces = {
      q: "[11:05:44.000] outbox → RuleEngine.evaluate(rule_import_quarantine)\n[11:05:44.010] MATCH: status transition predicate\n[11:05:44.012] PRE freeze_dependent_transforms → OK (42ms)\n[11:05:44.055] MAIN parallel begin (ADAPTIVE)\n[11:05:44.118] BRANCH-A tag_dependents → OK\n[11:05:44.860] BRANCH-B reconcile_graph.py → ERROR (cyclic spec)\n[11:05:44.861] JOIN → PARTIAL\n[11:05:44.893] POST_FAILURE open_remediation_task → OK",
      a: "[14:22:01.000] LoginAttempt stream → window 5m\n[14:22:01.004] MATCH: count>=8\n[14:22:01.015] PRE audit_snapshot → OK\n[14:22:01.071] MAIN lock_user_sessions → OK\n[14:22:01.075] MAIN parallel slack|pagerduty|metrics → OK (94ms)\n[14:22:01.285] POST_SUCCESS incident → OK",
      p: "[09:18:22.100] hr.Employee update (job_title)\n[09:18:22.102] MATCH: projection predicate\n[09:18:22.110] PRE validate_projection_schema → OK\n[09:18:22.130] DRY_RUN sync_owner_roster.py → WOULD_UPSERT 6 rows\n[09:18:22.131] POST_SUCCESS skipped (dry-run) — audit AUD-DRY-9981",
    };
    document.getElementById('runBtn').addEventListener('click', () => {
      document.getElementById('out').textContent = traces[document.getElementById('sc').value] || '';
    });
  </script>
  <script src="sidebar.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
