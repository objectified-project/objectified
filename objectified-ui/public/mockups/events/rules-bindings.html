<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events · Rules &amp; bindings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .sidebar-light { background: linear-gradient(180deg, #ffffff 0%, #faf5ff 100%); box-shadow: 4px 0 18px rgba(88, 28, 135, 0.06); }
    .sidebar-dark  { background: linear-gradient(180deg, #1e1b2e 0%, #0f172a 100%); box-shadow: 4px 0 18px rgba(2, 6, 23, 0.32); }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <div class="h-12 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-between px-4">
    <div class="flex items-center gap-2 text-sm flex-wrap">
      <div class="w-7 h-7 rounded-md bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center"><i data-lucide="zap" class="w-4 h-4 text-white"></i></div>
      <span class="font-semibold">Events</span><span class="text-gray-400">/</span><span class="text-violet-600 dark:text-violet-400">Rules</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="index.html" class="text-xs text-gray-500 hover:text-violet-600">← Hub</a>
      <button id="themeBtn" type="button" class="w-8 h-8 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center"><i data-lucide="sun-moon" class="w-4 h-4"></i></button>
    </div>
  </div>
  <div class="flex" style="min-height: calc(100vh - 48px);">
    <aside class="flex-shrink-0 sidebar-light dark:sidebar-dark hidden md:block" style="width: 260px;"><div class="p-4 h-full overflow-auto" id="sidebar"></div></aside>
    <main class="flex-1 overflow-auto px-4 sm:px-6 py-6 w-full">
      <div class="max-w-6xl mx-auto grid grid-cols-1 xl:grid-cols-5 gap-6">
        <div class="xl:col-span-2 space-y-3">
          <h1 class="text-2xl font-bold">Rules &amp; record bindings</h1>
          <p class="text-sm text-gray-600 dark:text-gray-400">Select a rule (mock). Each stores an <strong class="text-gray-800 dark:text-gray-200">auditReasonTemplate</strong> rendered with evaluated facts at runtime.</p>
          <ul class="space-y-2" id="ruleList"></ul>
        </div>
        <div class="xl:col-span-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-5 shadow-sm" id="ruleDetail">
          <p class="text-sm text-gray-500">Select a rule on the left.</p>
        </div>
      </div>
    </main>
  </div>
  <script>
    const themeKey = 'events-mockup-theme';
    const stored = localStorage.getItem(themeKey);
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'dark' || (!stored && prefersDark)) document.documentElement.classList.add('dark');
    document.getElementById('themeBtn').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem(themeKey, document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });

    const RULES = [
      { id: 'r1', name: 'Import quarantine → hold dependents', trig: 'Import reconciliation', src: 'import.FileIngest', cond: "after.status == 'quarantined' && before.status != 'quarantined'", pre: 'catalog.freeze_dependent_transforms', main: 'Parallel: tag_dependents | reconcile_graph.py', ok: 'catalog.notify_owners', fail: 'catalog.open_remediation_task', audit: 'Import reconciliation detected authoritative status change; dependents held pending script outcome.', live: true },
      { id: 'r2', name: 'Burst failed logins', trig: 'Threshold window', src: 'security.LoginAttempt', cond: "count_window('5m', ['user_id','ip']) >= 8", pre: 'catalog.audit_snapshot', main: 'lock_user_sessions + parallel notify', ok: 'create_incident + pagerduty', fail: 'rollback_lock + compensate_sessions.py', audit: 'Sliding aggregate exceeded policy AUTH-412 §4.2.', live: true },
      { id: 'r3', name: 'HR title → API owner roster', trig: 'Record change', src: 'hr.Employee', cond: "diff.has('job_title') && !diff.has('cost_center')", pre: 'catalog.validate_projection_schema', main: 'sync_owner_roster.py', ok: "webhook('owner.roster.updated')", fail: "enqueue_retry('15m')", audit: 'Field-level diff satisfied; projection contract v3 applied.', live: true },
      { id: 'r4', name: 'Nightly stale import', trig: 'Scheduled', src: 'import.ImportBatch', cond: "cron('0 3 * * *') && age_days(import_completed_at) > 30", pre: '—', main: 'catalog.mark_archived', ok: 'script.archive_metrics.py', fail: 'catalog.alert_ops_low', audit: 'Scheduled window; dry-run available in staging.', live: false },
    ];

    const listEl = document.getElementById('ruleList');
    const detailEl = document.getElementById('ruleDetail');
    function renderDetail(r) {
      detailEl.innerHTML = `
        <div class="flex items-start justify-between gap-3 flex-wrap">
          <h2 class="text-xl font-bold">${r.name}</h2>
          <span class="text-[10px] font-bold uppercase px-2 py-1 rounded-full ${r.live ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-950/50 dark:text-emerald-300' : 'bg-gray-200 text-gray-600 dark:bg-gray-700 dark:text-gray-400'}">${r.live ? 'live' : 'paused'}</span>
        </div>
        <p class="mt-3 text-sm text-gray-600 dark:text-gray-400 leading-relaxed">${r.audit}</p>
        <dl class="mt-5 grid gap-4 text-sm sm:grid-cols-2">
          <div><dt class="text-[10px] uppercase text-gray-500 font-semibold">Trigger</dt><dd class="mt-1 font-medium">${r.trig}</dd></div>
          <div><dt class="text-[10px] uppercase text-gray-500 font-semibold">Source type</dt><dd class="mt-1 mono text-xs">${r.src}</dd></div>
          <div class="sm:col-span-2"><dt class="text-[10px] uppercase text-gray-500 font-semibold">Condition</dt><dd class="mt-1 mono text-xs bg-gray-100 dark:bg-gray-900 p-3 rounded border border-gray-200 dark:border-gray-700">${r.cond}</dd></div>
          <div class="sm:col-span-2"><dt class="text-[10px] uppercase text-gray-500 font-semibold">Pre-action</dt><dd class="mt-1">${r.pre}</dd></div>
          <div class="sm:col-span-2"><dt class="text-[10px] uppercase text-gray-500 font-semibold">Main</dt><dd class="mt-1">${r.main}</dd></div>
          <div><dt class="text-[10px] uppercase text-gray-500 font-semibold">On success</dt><dd class="mt-1 mono text-xs">${r.ok}</dd></div>
          <div><dt class="text-[10px] uppercase text-gray-500 font-semibold">On failure</dt><dd class="mt-1 mono text-xs">${r.fail}</dd></div>
        </dl>`;
    }
    RULES.forEach((r, i) => {
      const li = document.createElement('li');
      li.innerHTML = `<button type="button" class="rule-btn w-full text-left rounded-lg border px-4 py-3 text-sm transition border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-violet-300 dark:hover:border-violet-600 ${i === 0 ? 'ring-2 ring-violet-400 border-violet-300' : ''}" data-id="${r.id}">
        <span class="font-semibold">${r.name}</span>
        <span class="block text-xs text-gray-500 mt-1">${r.trig}</span>
      </button>`;
      listEl.appendChild(li);
    });
    listEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.rule-btn');
      if (!btn) return;
      document.querySelectorAll('.rule-btn').forEach((b) => b.classList.remove('ring-2', 'ring-violet-400', 'border-violet-300'));
      btn.classList.add('ring-2', 'ring-violet-400', 'border-violet-300');
      const r = RULES.find((x) => x.id === btn.dataset.id);
      if (r) renderDetail(r);
    });
    renderDetail(RULES[0]);
  </script>
  <script src="sidebar.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
