openapi: 3.0.0
info:
  title: Employee Management API
  version: 1.0.0

components:
  schemas:
    Person:
      type: object
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    Developer:
      type: object
      required:
        - programmingLanguages
      properties:
        programmingLanguages:
          type: array
          items:
            type: string
        yearsOfExperience:
          type: integer
        githubUsername:
          type: string

    Manager:
      type: object
      required:
        - department
        - teamSize
      properties:
        department:
          type: string
        teamSize:
          type: integer
        budgetAllocation:
          type: number

    Employee:
      allOf:
        - $ref: '#/components/schemas/Person'
        - type: object
          required:
            - employeeId
            - hireDate
          properties:
            employeeId:
              type: string
            hireDate:
              type: string
              format: date
            salary:
              type: number
            roles:
              anyOf:
                - $ref: '#/components/schemas/Developer'
                - $ref: '#/components/schemas/Manager'
