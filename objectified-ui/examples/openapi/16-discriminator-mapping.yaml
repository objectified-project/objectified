openapi: 3.1.0
info:
  title: Discriminator Mapping Example
  version: 1.0.0
  description: Demonstrates discriminator mapping with x- tags and propertyName

components:
  schemas:
    Pet:
      type: object
      description: Base pet schema with discriminator
      required:
        - petType
        - name
      properties:
        petType:
          type: string
          description: Type discriminator
          examples:
            - "dog"
        name:
          type: string
          examples:
            - "Buddy"
      discriminator:
        propertyName: petType
        mapping:
          dog: "#/components/schemas/Dog"
          cat: "#/components/schemas/Cat"
          bird: "#/components/schemas/Bird"
        x-discriminator-values:
          - dog
          - cat
          - bird
        x-default-type: "dog"

    Dog:
      allOf:
        - $ref: "#/components/schemas/Pet"
        - type: object
          properties:
            breed:
              type: string
              examples:
                - "Golden Retriever"
            barkVolume:
              type: integer
              minimum: 1
              maximum: 10
              examples:
                - 7
          required:
            - breed
      x-discriminator-value: "dog"
      x-display-name: "Domestic Dog"

    Cat:
      allOf:
        - $ref: "#/components/schemas/Pet"
        - type: object
          properties:
            furColor:
              type: string
              examples:
                - "orange"
            clawsRetracted:
              type: boolean
              examples:
                - true
          required:
            - furColor
      x-discriminator-value: "cat"
      x-display-name: "Domestic Cat"

    Bird:
      allOf:
        - $ref: "#/components/schemas/Pet"
        - type: object
          properties:
            wingspan:
              type: number
              minimum: 0
              examples:
                - 12.5
            canFly:
              type: boolean
              examples:
                - true
          required:
            - wingspan
      x-discriminator-value: "bird"
      x-display-name: "Bird Species"

