// Protobuf (proto3) example — a simple user message.
//
// Recognized by the format-detection sniffer via the `syntax = "proto3"` marker
// (routes to the `protobuf` format / data-schema paradigm). Each message becomes
// a catalog class and each field a property; the enum demonstrates an enumerated
// property type.
syntax = "proto3";

package example.user.v1;

option java_package = "com.example.user.v1";
option go_package = "example.com/user/v1;userv1";

// A registered user of the system.
message User {
  // Unique user identifier.
  string id = 1;
  // The user's email address.
  string email = 2;
  // Optional human-readable display name.
  string display_name = 3;
  // Account status.
  Status status = 4;
  // Roles assigned to the user.
  repeated string roles = 5;
  // When the account was created (Unix epoch seconds).
  int64 created_at = 6;
}

// Lifecycle status of an account.
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_SUSPENDED = 2;
  STATUS_DELETED = 3;
}
