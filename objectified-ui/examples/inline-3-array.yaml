openapi: 3.1.0
info:
  title: Project Management API
  version: 1.0.0
  description: API for managing projects, tasks, and team collaboration with nested structures

servers:
  - url: https://api.projectmanager.com/v1

paths:
  /projects:
    get:
      summary: Get all projects
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
    post:
      summary: Create new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /teams/{teamId}/reports:
    get:
      summary: Get team reports
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamReport'

components:
  schemas:
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        timeline:
          type: object
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
            milestones:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  dueDate:
                    type: string
                    format: date
                  deliverables:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        status:
                          type: string
                          enum: [pending, completed, overdue]
                        assignedTo:
                          type: string
        resources:
          type: object
          properties:
            budget:
              type: object
              properties:
                total:
                  type: number
                spent:
                  type: number
                currency:
                  type: string
                breakdown:
                  type: array
                  items:
                    type: object
                    properties:
                      category:
                        type: string
                      amount:
                        type: number
                      invoices:
                        type: array
                        items:
                          type: object
                          properties:
                            invoiceId:
                              type: string
                            vendor:
                              type: string
                            amount:
                              type: number
                            date:
                              type: string
                              format: date
            team:
              type: array
              items:
                type: object
                properties:
                  userId:
                    type: string
                  role:
                    type: string
                  allocation:
                    type: object
                    properties:
                      percentage:
                        type: integer
                      hoursPerWeek:
                        type: number
                  skills:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        level:
                          type: string
                          enum: [beginner, intermediate, advanced, expert]
        tasks:
          type: array
          items:
            type: object
            properties:
              taskId:
                type: string
              title:
                type: string
              priority:
                type: string
                enum: [low, medium, high, critical]
              dependencies:
                type: object
                properties:
                  blockedBy:
                    type: array
                    items:
                      type: string
                  blocks:
                    type: array
                    items:
                      type: string
              comments:
                type: array
                items:
                  type: object
                  properties:
                    commentId:
                      type: string
                    author:
                      type: string
                    text:
                      type: string
                    timestamp:
                      type: string
                      format: date-time
                    attachments:
                      type: array
                      items:
                        type: object
                        properties:
                          filename:
                            type: string
                          url:
                            type: string
                            format: uri
                          fileType:
                            type: string

    ProjectList:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        summary:
          type: object
          properties:
            total:
              type: integer
            byStatus:
              type: object
              properties:
                active:
                  type: integer
                completed:
                  type: integer
                onHold:
                  type: integer

    TeamReport:
      type: object
      properties:
        teamId:
          type: string
        reportPeriod:
          type: object
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
        performance:
          type: object
          properties:
            metrics:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  value:
                    type: number
                  unit:
                    type: string
                  trend:
                    type: object
                    properties:
                      direction:
                        type: string
                        enum: [up, down, stable]
                      changePercent:
                        type: number
            taskCompletion:
              type: object
              properties:
                completed:
                  type: integer
                inProgress:
                  type: integer
                overdue:
                  type: integer
                velocity:
                  type: array
                  items:
                    type: object
                    properties:
                      week:
                        type: string
                      tasksCompleted:
                        type: integer
                      storyPoints:
                        type: number
