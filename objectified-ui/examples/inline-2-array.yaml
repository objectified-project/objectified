openapi: 3.1.0
info:
  title: Inline 2 Array E-Commerce Platform API
  version: 1.0.0
  description: API for managing products and orders with complex nested structures

servers:
  - url: https://api.ecommerce.com/v1

paths:
  /products:
    get:
      summary: Get product catalog
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCatalog'
    post:
      summary: Create new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /orders:
    post:
      summary: Create new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sku:
          type: string
        pricing:
          type: object
          properties:
            base:
              type: number
              format: double
            currency:
              type: string
            tiers:
              type: array
              items:
                type: object
                properties:
                  minQuantity:
                    type: integer
                  maxQuantity:
                    type: integer
                  price:
                    type: number
                    format: double
                  discount:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [percentage, fixed]
                      value:
                        type: number
        inventory:
          type: object
          properties:
            warehouses:
              type: array
              items:
                type: object
                properties:
                  locationId:
                    type: string
                  locationName:
                    type: string
                  quantity:
                    type: integer
                  reserved:
                    type: integer
                  reorderPoint:
                    type: integer
            totalAvailable:
              type: integer
        variants:
          type: array
          items:
            type: object
            properties:
              variantId:
                type: string
              attributes:
                type: object
                properties:
                  size:
                    type: string
                  color:
                    type: string
                  material:
                    type: string
              media:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [image, video]
                    url:
                      type: string
                      format: uri
                    order:
                      type: integer

    ProductCatalog:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        filters:
          type: object
          properties:
            categories:
              type: array
              items:
                type: string
            priceRange:
              type: object
              properties:
                min:
                  type: number
                max:
                  type: number

    Order:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        customer:
          type: object
          properties:
            customerId:
              type: string
            email:
              type: string
              format: email
            shippingAddress:
              type: object
              properties:
                street:
                  type: string
                city:
                  type: string
                state:
                  type: string
                zipCode:
                  type: string
                country:
                  type: string
                coordinates:
                  type: object
                  properties:
                    latitude:
                      type: number
                    longitude:
                      type: number
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              variantId:
                type: string
              quantity:
                type: integer
              price:
                type: number
              customizations:
                type: object
                properties:
                  options:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        additionalCost:
                          type: number
        payment:
          type: object
          properties:
            method:
              type: string
              enum: [credit_card, paypal, bank_transfer]
            transactions:
              type: array
              items:
                type: object
                properties:
                  transactionId:
                    type: string
                  amount:
                    type: number
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
