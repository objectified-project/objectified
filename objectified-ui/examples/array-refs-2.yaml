openapi: 3.1.0
info:
  title: Array Refs 2 Application Release Management API
  version: 1.0.0
  description: API for managing application releases with arrays of referenced schemas

servers:
  - url: https://api.releasemanager.com/v1

paths:
  /releases/{releaseId}:
    get:
      summary: Get release details
      parameters:
        - name: releaseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
    patch:
      summary: Update release
      parameters:
        - name: releaseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Release'
      responses:
        '200':
          description: Release updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'

  /applications/{appId}:
    get:
      summary: Get application details
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'

components:
  schemas:
    Release:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
        status:
          type: string
          enum: [draft, testing, staging, production, archived]
        artifacts:
          type: object
          properties:
            frontend:
              type: object
              properties:
                bundles:
                  type: array
                  items:
                    $ref: '#/components/schemas/Bundle'
                assets:
                  type: array
                  items:
                    $ref: '#/components/schemas/Asset'
                sourceMaps:
                  type: array
                  items:
                    $ref: '#/components/schemas/SourceMap'
            backend:
              type: object
              properties:
                containers:
                  type: array
                  items:
                    $ref: '#/components/schemas/Container'
                lambdas:
                  type: array
                  items:
                    $ref: '#/components/schemas/Lambda'
        dependencies:
          type: object
          properties:
            npm:
              type: object
              properties:
                production:
                  type: array
                  items:
                    $ref: '#/components/schemas/NpmDependency'
                development:
                  type: array
                  items:
                    $ref: '#/components/schemas/NpmDependency'
            python:
              type: object
              properties:
                pip:
                  type: array
                  items:
                    $ref: '#/components/schemas/PipPackage'
                requirements:
                  type: array
                  items:
                    $ref: '#/components/schemas/Requirement'
        database:
          type: object
          properties:
            migrations:
              type: object
              properties:
                pending:
                  type: array
                  items:
                    $ref: '#/components/schemas/DatabaseMigration'
                applied:
                  type: array
                  items:
                    $ref: '#/components/schemas/DatabaseMigration'
            seeds:
              type: array
              items:
                $ref: '#/components/schemas/DatabaseSeed'
        testing:
          type: object
          properties:
            unit:
              type: object
              properties:
                javascript:
                  type: array
                  items:
                    $ref: '#/components/schemas/TestSuite'
                typescript:
                  type: array
                  items:
                    $ref: '#/components/schemas/TestSuite'
                python:
                  type: array
                  items:
                    $ref: '#/components/schemas/TestSuite'
            integration:
              type: array
              items:
                $ref: '#/components/schemas/IntegrationTest'
            e2e:
              type: array
              items:
                $ref: '#/components/schemas/E2ETest'
        quality:
          type: object
          properties:
            linting:
              type: object
              properties:
                typescript:
                  type: array
                  items:
                    $ref: '#/components/schemas/LintReport'
                javascript:
                  type: array
                  items:
                    $ref: '#/components/schemas/LintReport'
                python:
                  type: array
                  items:
                    $ref: '#/components/schemas/LintReport'
            security:
              type: object
              properties:
                vulnerabilities:
                  type: array
                  items:
                    $ref: '#/components/schemas/SecurityVulnerability'
                audits:
                  type: array
                  items:
                    $ref: '#/components/schemas/SecurityAudit'
        deployment:
          type: object
          properties:
            environments:
              type: array
              items:
                $ref: '#/components/schemas/DeploymentEnvironment'
            rollback:
              type: object
              properties:
                snapshots:
                  type: array
                  items:
                    $ref: '#/components/schemas/Snapshot'

    Application:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        stack:
          type: object
          properties:
            frontend:
              type: object
              properties:
                framework:
                  type: string
                  enum: [react, vue, angular]
                components:
                  type: array
                  items:
                    $ref: '#/components/schemas/Component'
                hooks:
                  type: array
                  items:
                    $ref: '#/components/schemas/ReactHook'
                routes:
                  type: array
                  items:
                    $ref: '#/components/schemas/Route'
            backend:
              type: object
              properties:
                services:
                  type: array
                  items:
                    $ref: '#/components/schemas/Service'
                apis:
                  type: array
                  items:
                    $ref: '#/components/schemas/ApiEndpoint'
                middleware:
                  type: array
                  items:
                    $ref: '#/components/schemas/Middleware'
            database:
              type: object
              properties:
                schemas:
                  type: array
                  items:
                    $ref: '#/components/schemas/DatabaseSchema'
                indexes:
                  type: array
                  items:
                    $ref: '#/components/schemas/DatabaseIndex'
                views:
                  type: array
                  items:
                    $ref: '#/components/schemas/DatabaseView'
        build:
          type: object
          properties:
            javascript:
              type: object
              properties:
                webpack:
                  type: object
                  properties:
                    plugins:
                      type: array
                      items:
                        $ref: '#/components/schemas/WebpackPlugin'
                    loaders:
                      type: array
                      items:
                        $ref: '#/components/schemas/WebpackLoader'
            typescript:
              type: object
              properties:
                compilerOptions:
                  type: object
                paths:
                  type: array
                  items:
                    $ref: '#/components/schemas/TypeScriptPath'
            python:
              type: object
              properties:
                setupTools:
                  type: object
                  properties:
                    packages:
                      type: array
                      items:
                        $ref: '#/components/schemas/PythonPackage'
        packageManagers:
          type: object
          properties:
            npm:
              type: object
              properties:
                scripts:
                  type: array
                  items:
                    $ref: '#/components/schemas/NpmScript'
                workspaces:
                  type: array
                  items:
                    $ref: '#/components/schemas/Workspace'
            yarn:
              type: object
              properties:
                workspaces:
                  type: array
                  items:
                    $ref: '#/components/schemas/YarnWorkspace'
                plugins:
                  type: array
                  items:
                    $ref: '#/components/schemas/YarnPlugin'
        monitoring:
          type: object
          properties:
            metrics:
              type: array
              items:
                $ref: '#/components/schemas/Metric'
            alerts:
              type: array
              items:
                $ref: '#/components/schemas/Alert'
            logs:
              type: object
              properties:
                streams:
                  type: array
                  items:
                    $ref: '#/components/schemas/LogStream'

    Bundle:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        hash:
          type: string
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/Chunk'

    Asset:
      type: object
      properties:
        path:
          type: string
        type:
          type: string
          enum: [css, image, font]
        size:
          type: integer

    SourceMap:
      type: object
      properties:
        bundle:
          type: string
        file:
          type: string
        sources:
          type: array
          items:
            type: string

    Container:
      type: object
      properties:
        image:
          type: string
        tag:
          type: string
        layers:
          type: array
          items:
            $ref: '#/components/schemas/ContainerLayer'

    Lambda:
      type: object
      properties:
        name:
          type: string
        runtime:
          type: string
          enum: [nodejs18, python311]
        handler:
          type: string

    NpmDependency:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        resolved:
          type: string

    PipPackage:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        source:
          type: string

    Requirement:
      type: object
      properties:
        package:
          type: string
        version:
          type: string
        extras:
          type: array
          items:
            type: string

    DatabaseMigration:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        sql:
          type: string
        rollback:
          type: string

    DatabaseSeed:
      type: object
      properties:
        table:
          type: string
        data:
          type: array
          items:
            type: object

    TestSuite:
      type: object
      properties:
        name:
          type: string
        language:
          type: string
          enum: [typescript, javascript, python]
        tests:
          type: array
          items:
            $ref: '#/components/schemas/Test'

    IntegrationTest:
      type: object
      properties:
        name:
          type: string
        endpoints:
          type: array
          items:
            type: string

    E2ETest:
      type: object
      properties:
        name:
          type: string
        scenarios:
          type: array
          items:
            $ref: '#/components/schemas/TestScenario'

    LintReport:
      type: object
      properties:
        file:
          type: string
        language:
          type: string
          enum: [typescript, javascript, python]
        issues:
          type: array
          items:
            $ref: '#/components/schemas/LintIssue'

    SecurityVulnerability:
      type: object
      properties:
        package:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        cve:
          type: string

    SecurityAudit:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        findings:
          type: array
          items:
            $ref: '#/components/schemas/SecurityFinding'

    DeploymentEnvironment:
      type: object
      properties:
        name:
          type: string
          enum: [development, staging, production]
        deployments:
          type: array
          items:
            $ref: '#/components/schemas/Deployment'

    Snapshot:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        state:
          type: object

    Component:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [functional, class]
        props:
          type: array
          items:
            $ref: '#/components/schemas/ComponentProp'

    ReactHook:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [useState, useEffect, useContext, custom]

    Route:
      type: object
      properties:
        path:
          type: string
        component:
          type: string
        guards:
          type: array
          items:
            type: string

    Service:
      type: object
      properties:
        name:
          type: string
        language:
          type: string
          enum: [typescript, javascript, python]
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/ServiceEndpoint'

    ApiEndpoint:
      type: object
      properties:
        path:
          type: string
        method:
          type: string
        handler:
          type: string

    Middleware:
      type: object
      properties:
        name:
          type: string
        order:
          type: integer

    DatabaseSchema:
      type: object
      properties:
        name:
          type: string
        tables:
          type: array
          items:
            $ref: '#/components/schemas/DatabaseTable'

    DatabaseIndex:
      type: object
      properties:
        name:
          type: string
        table:
          type: string
        columns:
          type: array
          items:
            type: string

    DatabaseView:
      type: object
      properties:
        name:
          type: string
        query:
          type: string

    WebpackPlugin:
      type: object
      properties:
        name:
          type: string
        options:
          type: object

    WebpackLoader:
      type: object
      properties:
        test:
          type: string
        use:
          type: string

    TypeScriptPath:
      type: object
      properties:
        alias:
          type: string
        path:
          type: string

    PythonPackage:
      type: object
      properties:
        name:
          type: string
        version:
          type: string

    NpmScript:
      type: object
      properties:
        name:
          type: string
        command:
          type: string

    Workspace:
      type: object
      properties:
        name:
          type: string
        path:
          type: string

    YarnWorkspace:
      type: object
      properties:
        name:
          type: string
        location:
          type: string

    YarnPlugin:
      type: object
      properties:
        name:
          type: string
        spec:
          type: string

    Metric:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [counter, gauge, histogram]

    Alert:
      type: object
      properties:
        name:
          type: string
        condition:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/AlertAction'

    LogStream:
      type: object
      properties:
        name:
          type: string
        level:
          type: string
          enum: [debug, info, warn, error]

    Chunk:
      type: object
      properties:
        id:
          type: string
        files:
          type: array
          items:
            type: string

    ContainerLayer:
      type: object
      properties:
        digest:
          type: string
        size:
          type: integer

    Test:
      type: object
      properties:
        name:
          type: string
        file:
          type: string
        status:
          type: string
          enum: [passed, failed, skipped]

    TestScenario:
      type: object
      properties:
        description:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/TestStep'

    LintIssue:
      type: object
      properties:
        line:
          type: integer
        column:
          type: integer
        message:
          type: string

    SecurityFinding:
      type: object
      properties:
        type:
          type: string
        severity:
          type: string

    Deployment:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time

    ComponentProp:
      type: object
      properties:
        name:
          type: string
        type:
          type: string

    ServiceEndpoint:
      type: object
      properties:
        path:
          type: string
        method:
          type: string

    DatabaseTable:
      type: object
      properties:
        name:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/DatabaseColumn'

    AlertAction:
      type: object
      properties:
        type:
          type: string
          enum: [email, slack, webhook]
        target:
          type: string

    TestStep:
      type: object
      properties:
        action:
          type: string
        selector:
          type: string

    DatabaseColumn:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        nullable:
          type: boolean
