openapi: 3.1.0
info:
  title: Content Management API
  version: 1.0.0
  description: API for managing articles and assets with nested object properties

servers:
  - url: https://api.example.com/v1

paths:
  /articles:
    get:
      summary: Get list of articles
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleList'
    post:
      summary: Create new article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Article'
      responses:
        '201':
          description: Article created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'

  /assets:
    get:
      summary: Get list of assets
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCollection'

components:
  schemas:
    Article:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        author:
          type: string
        pages:
          type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  pageNumber:
                    type: integer
                  content:
                    type: string
                  wordCount:
                    type: integer
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                          format: uri
                        caption:
                          type: string
                        alt:
                          type: string
            totalPages:
              type: integer
            currentPage:
              type: integer
        metadata:
          type: object
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            tags:
              type: array
              items:
                type: string

    ArticleList:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        pagination:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer

    AssetCollection:
      type: object
      properties:
        assets:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              type:
                type: string
                enum: [image, video, document]
              files:
                type: array
                items:
                  type: object
                  properties:
                    filename:
                      type: string
                    size:
                      type: integer
                    format:
                      type: string
                    url:
                      type: string
                      format: uri
                    thumbnails:
                      type: object
                      properties:
                        small:
                          type: string
                          format: uri
                        medium:
                          type: string
                          format: uri
                        large:
                          type: string
                          format: uri
