arazzo: 1.0.1
info:
  title: Simple Todo Workflow
  version: 1.0.0
  description: A minimal Arazzo example with a single workflow and two steps

sourceDescriptions:
  - name: TodoAPI
    type: openapi
    url: https://example.com/openapi/todo.json

workflows:
  - name: CreateAndGetTodo
    description: Creates a todo item and then retrieves it
    steps:
      - name: CreateTodo
        description: Create a todo item
        request:
          source: TodoAPI
          operationId: createTodo
          parameters:
            body:
              title: "Buy milk"
              dueDate: "2025-12-25"
              priority: "high"
        outputs:
          - name: todoId
            description: The created todo ID
            path: $.id
      - name: GetTodo
        description: Get the created todo item by ID
        when:
          expression: ${todoId != null}
        request:
          source: TodoAPI
          operationId: getTodo
          parameters:
            path:
              id: ${todoId}
        assertions:
          - expression: ${response.status == 200}
            description: Response should be 200 OK
          - expression: ${response.body.title == "Buy milk"}
            description: Title should match the created value

