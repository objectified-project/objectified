openapi: 3.1.0
info:
  title: Inline 2 Application Deployment API
  version: 1.0.0
  description: API for managing application deployments with nested configuration properties

servers:
  - url: https://api.deployment.com/v1

paths:
  /deployments/{deploymentId}:
    get:
      summary: Get deployment configuration
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
    patch:
      summary: Update deployment configuration
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Deployment'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'

  /environments/{environmentId}:
    get:
      summary: Get environment details
      parameters:
        - name: environmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'

components:
  schemas:
    Deployment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        applicationName:
          type: string
        version:
          type: string
        runtime:
          type: object
          properties:
            node:
              type: object
              properties:
                version:
                  type: string
                packageManager:
                  type: object
                  properties:
                    name:
                      type: string
                      enum: [npm, yarn]
                    version:
                      type: string
                    registry:
                      type: object
                      properties:
                        url:
                          type: string
                          format: uri
                        authenticated:
                          type: boolean
            python:
              type: object
              properties:
                version:
                  type: string
                virtualEnv:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    tool:
                      type: string
                      enum: [venv, pipenv, poetry]
                    location:
                      type: string
        database:
          type: object
          properties:
            primary:
              type: object
              properties:
                engine:
                  type: string
                  enum: [postgresql, mysql, mongodb, sql-server]
                host:
                  type: string
                port:
                  type: integer
                credentials:
                  type: object
                  properties:
                    username:
                      type: string
                    passwordRef:
                      type: string
                    connectionString:
                      type: string
                pool:
                  type: object
                  properties:
                    minConnections:
                      type: integer
                    maxConnections:
                      type: integer
                    timeout:
                      type: integer
                    idleTimeout:
                      type: integer
            replica:
              type: object
              properties:
                enabled:
                  type: boolean
                host:
                  type: string
                port:
                  type: integer
                lag:
                  type: object
                  properties:
                    threshold:
                      type: integer
                    unit:
                      type: string
                      enum: [milliseconds, seconds]
        frontend:
          type: object
          properties:
            framework:
              type: object
              properties:
                name:
                  type: string
                  enum: [react, vue, angular, svelte]
                version:
                  type: string
            build:
              type: object
              properties:
                optimization:
                  type: object
                  properties:
                    minify:
                      type: boolean
                    sourceMaps:
                      type: boolean
                    splitChunks:
                      type: boolean
                    treeShaking:
                      type: boolean
                output:
                  type: object
                  properties:
                    directory:
                      type: string
                    publicPath:
                      type: string
                    assetsPath:
                      type: string
            cdn:
              type: object
              properties:
                enabled:
                  type: boolean
                provider:
                  type: string
                configuration:
                  type: object
                  properties:
                    origin:
                      type: string
                      format: uri
                    caching:
                      type: object
                      properties:
                        ttl:
                          type: integer
                        browserCache:
                          type: boolean
                        edgeCache:
                          type: boolean
        monitoring:
          type: object
          properties:
            logging:
              type: object
              properties:
                level:
                  type: string
                  enum: [debug, info, warn, error]
                format:
                  type: string
                  enum: [json, text]
                destination:
                  type: object
                  properties:
                    console:
                      type: boolean
                    file:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        path:
                          type: string
                        rotation:
                          type: object
                          properties:
                            maxSize:
                              type: string
                            maxFiles:
                              type: integer
            metrics:
              type: object
              properties:
                enabled:
                  type: boolean
                collector:
                  type: object
                  properties:
                    endpoint:
                      type: string
                      format: uri
                    interval:
                      type: integer
                    authentication:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [bearer, api-key]
                        tokenRef:
                          type: string

    Environment:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          enum: [development, staging, production]
        infrastructure:
          type: object
          properties:
            cloud:
              type: object
              properties:
                provider:
                  type: string
                  enum: [aws, azure, gcp]
                region:
                  type: string
                credentials:
                  type: object
                  properties:
                    accessKeyRef:
                      type: string
                    secretKeyRef:
                      type: string
            compute:
              type: object
              properties:
                instanceType:
                  type: string
                scaling:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [manual, auto]
                    min:
                      type: integer
                    max:
                      type: integer
                    metrics:
                      type: object
                      properties:
                        cpu:
                          type: object
                          properties:
                            threshold:
                              type: integer
                            scaleUp:
                              type: boolean
                        memory:
                          type: object
                          properties:
                            threshold:
                              type: integer
                            scaleUp:
                              type: boolean
            networking:
              type: object
              properties:
                vpc:
                  type: object
                  properties:
                    id:
                      type: string
                    cidr:
                      type: string
                loadBalancer:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    type:
                      type: string
                      enum: [application, network]
                    ssl:
                      type: object
                      properties:
                        certificateArn:
                          type: string
                        protocol:
                          type: string
                          enum: [TLSv1.2, TLSv1.3]
        security:
          type: object
          properties:
            authentication:
              type: object
              properties:
                jwt:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    algorithm:
                      type: string
                      enum: [HS256, RS256]
                    expiration:
                      type: object
                      properties:
                        access:
                          type: integer
                        refresh:
                          type: integer
                        unit:
                          type: string
                          enum: [seconds, minutes, hours]
            cors:
              type: object
              properties:
                enabled:
                  type: boolean
                configuration:
                  type: object
                  properties:
                    allowCredentials:
                      type: boolean
                    maxAge:
                      type: integer
            firewall:
              type: object
              properties:
                enabled:
                  type: boolean
                rules:
                  type: object
                  properties:
                    rateLimit:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        requestsPerMinute:
                          type: integer
                    ipWhitelist:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        mode:
                          type: string
                          enum: [allow, deny]
