        registry

        state, persists any edge whose status changed, and returns the per-primitive

        dependency listing the resolver UI consumes (#3470). The top-level counts
        mirror the

        coverage KPIs of ``GET …/unresolved`` (#3457/#3454); ``reresolved_primitive_count``

        is how many primitives had at least one edge status flip during this pass.'
    ResolvedPrimitiveRefs:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        schema_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Schema Id
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
        base_uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Base Uri
        ref_count:
          type: integer
          title: Ref Count
          default: 0
        resolved_count:
          type: integer
          title: Resolved Count
          default: 0
        unresolved_count:
          type: integer
          title: Unresolved Count
          default: 0
        refs:
          items:
            $ref: '#/components/schemas/ResolvedRefEdge'
          type: array
          title: Refs
          default: []
      type: object
      required:
