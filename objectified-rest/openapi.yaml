        \ token or API key.\nWhen using JWT, the creator_id field will be set to the\
        \ authenticated user.\n\n**Optimistic locking (#2566):** ``baseRevisionId``\
        \ is required. It must match the server head\n(branch tip, or latest revision\
        \ when there are no branches) before this push. If another client\nadvanced\
        \ the head, the API returns **409** with ``code: STALE_HEAD`` and ``currentHead``\
        \ metadata.\n\nIf version_id is not provided, it will be auto-generated by\
        \ bumping the latest version.\nUse bump_strategy='minor' for minor version\
        \ bump, or 'patch' (default) for patch bump.\n\nIf source_version_id is provided,\
        \ classes will be copied from that version.\n\nArgs:\n    tenant_slug: The\
        \ tenant slug\n    project_id: The project ID\n    request: Version creation\
        \ data\n    auth_data: Authentication data (injected by dependency)\n\nReturns:\n\
