          type: integer
          title: Spec Schema Version
          description: Current envelope version the returned options conform to.
          default: 1
        source_kind:
          type: string
          title: Source Kind
          description: Importer discriminator (for example openapi-3, arazzo).
        format_override:
          anyOf:
          - type: string
          - type: 'null'
          title: Format Override
          description: Explicit format override (the importer --format flag), when
            the user forced one.
        content_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Content Type
          description: MIME type used to read the file (for example application/yaml),
            when known.
        options:
          $ref: '#/components/schemas/SpecImportOptions'
          description: Full SpecImportOptions payload, upgraded to the current shape.
        last_imported_commit_sha:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Imported Commit Sha
          description: Branch tip commit SHA observed for this file at import time
            (RAR-2.1).
        last_imported_committed_at:
          anyOf:
          - type: string
            format: date-time
          - type: string
          - type: 'null'
          title: Last Imported Committed At
          description: Committed-at timestamp of the file at import time. A later
            auto-refresh compares the remote committed_at against this anchor to gate
            newer-than re-imports (RAR-2.1/RAR-2.2).
        last_imported_blob_sha:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Imported Blob Sha
          description: Blob SHA of the file content at import time (RAR-2.1).
        refresh_status:
          $ref: '#/components/schemas/RefreshStatus'
          description: 'Materialized per-file refresh state (RAR-2.3): one of up-to-date
            / stale / refreshing / failed / diverged. Derived from the current scan
            recency vs the last_imported_* anchors, overlaid with any in-flight refresh,
            last-attempt failure, or divergence hold.'
          default: up-to-date
      additionalProperties: false
      type: object
      required:
      - source_kind
      title: RepositoryImportSpecRead
      description: 'Current-shape import spec returned by the read endpoint (RAR-1.5).


        The response surface for ``GET …/repository-imports/{id}/spec`` (and its

        ``?path=`` lookup variant). It exposes the captured source descriptor and
        the

        full ``SpecImportOptions`` payload, upgraded on read to the current envelope

        shape, so the refresh worker, the UI status surface, and the CLI can replay

        the user''s original import request. ``spec_schema_version`` always reports
        the

        current envelope version because ``options`` has already been migrated forward.'
    RepositoryRefreshNowRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
        branch:
          anyOf:
          - type: string
          - type: 'null'
          title: Branch
      type: object
      title: RepositoryRefreshNowRequest
      description: 'Dashboard: trigger a one-shot manual "Refresh Now" (RAR-5.2, #3533).


        Both fields are optional and accept snake_case or camelCase so the UI can

        send either:


        - omit both → refresh the whole repository (every branch with a stored spec);

        - ``branch`` only → refresh that branch;

        - ``path`` (with or without ``branch``) → refresh that single file.'
    RepositoryRefreshNowResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        enqueued:
          type: integer
          title: Enqueued
        skipped:
          type: integer
          title: Skipped
        branches:
          items:
            type: string
          type: array
          title: Branches
      type: object
      required:
      - enqueued
      - skipped
      - branches
      title: RepositoryRefreshNowResponse
      description: Result of a one-shot manual refresh (RAR-5.2).
    RepositoryRefreshProvenance:
      properties:
        parent_version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Version Id
          description: Prior version (versions.id) this refresh supersedes; the new
            version's linear parent.
        source_commit_sha:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Commit Sha
          description: Repository source commit SHA that triggered the refresh.
        source_committed_at:
          anyOf:
          - type: string
            format: date-time
          - type: string
          - type: 'null'
          title: Source Committed At
          description: Commit timestamp of source_commit_sha.
      additionalProperties: false
      type: object
      title: RepositoryRefreshProvenance
      description: 'Provenance for a version created by a repository auto-refresh
        (RAR-4.2, #3528).


        A refresh re-imports a changed file and creates a NEW catalog version. That

        version must be traceable back to the prior version it supersedes

        (``parent_version_id``) and to the exact source commit that triggered the

        refresh (``source_commit_sha`` + ``source_committed_at``). The RAR-3.2 sweep

        captures the commit signals on the ``odb.tenant_repository_refresh_jobs``
        row;

        this model carries them from the executor through to version creation so they

        land on the new ``odb.versions`` row.'
