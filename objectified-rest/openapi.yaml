          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Data Record V1 Data  Tenant Slug  Records Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records/{record_id}/restore:
    post:
      tags:
      - data
      summary: Restore Data Record
      description: Restore a deleted data record (recreate data_snapshot from deleted
        event, append restored event).
      operationId: restore_data_record_v1_data__tenant_slug__records__record_id__restore_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Restore Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Restore Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/primitives/{tenant_slug}:
    get:
      tags:
      - primitives
      summary: List Primitives
      description: "List all primitives for a tenant.\n\nSupports authentication via:\n\
        - JWT token in Authorization header (Bearer token)\n- API key in X-API-Key\
        \ header\n\nArgs:\n    tenant_slug: The tenant slug\n    category: Optional\
        \ category filter\n    auth_data: Authentication data (injected by dependency)\n\
        \nReturns:\n    List of primitives for the tenant"
      operationId: list_primitives_v1_primitives__tenant_slug__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by category
          title: Category
        description: Filter by category
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
