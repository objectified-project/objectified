components:
  schemas:
    ClassCreateRequest:
      properties:
        version_id:
          type: string
          title: Version Id
        name:
          type: string
          title: Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        schema:
          additionalProperties: true
          type: object
          title: Schema
        enabled:
          type: boolean
          title: Enabled
          default: true
      type: object
      required:
      - version_id
      - name
      title: ClassCreateRequest
      description: Request model for creating a class.
    ClassSchema:
      properties:
        id:
          type: string
          title: Id
        version_id:
          type: string
          title: Version Id
        name:
          type: string
          title: Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        schema:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Schema
        enabled:
          type: boolean
          title: Enabled
          default: true
        tags:
          anyOf:
          - items:
              $ref: '#/components/schemas/TagSchema'
            type: array
          - type: 'null'
          title: Tags
        created_at:
          anyOf:
          - type: string
            format: date-time
          - type: string
          - type: 'null'
          title: Created At
        updated_at:
          anyOf:
          - type: string
            format: date-time
          - type: string
          - type: 'null'
          title: Updated At
      type: object
      required:
      - id
      - version_id
      - name
      title: ClassSchema
      description: Pydantic model for a class schema.
    ClassUpdateRequest:
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        schema:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Schema
        enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Enabled
        canvas_metadata:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Canvas Metadata
      type: object
      title: ClassUpdateRequest
      description: Request model for updating a class.
    CompatibilityCheckRequest:
      properties:
        baseRevisionId:
          type: string
          title: Baserevisionid
          description: Older / merge-base side revision (versions.id UUID).
        headRevisionId:
          type: string
          title: Headrevisionid
          description: Newer / branch tip side revision (versions.id UUID).
        rules:
          anyOf:
          - $ref: '#/components/schemas/CompatibilityRulesPayload'
          - type: 'null'
        policy:
          anyOf:
          - $ref: '#/components/schemas/CompatibilityPolicyPayload'
          - type: 'null'
      type: object
      required:
      - baseRevisionId
      - headRevisionId
      title: CompatibilityCheckRequest
      description: Compare two schema revisions (versions.id) for backward compatibility.
    CompatibilityCheckResponse:
      properties:
        overall:
          type: string
          title: Overall
        baseRevisionId:
          type: string
          title: Baserevisionid
        headRevisionId:
          type: string
          title: Headrevisionid
        findings:
          items:
            $ref: '#/components/schemas/CompatibilityFindingOut'
          type: array
          title: Findings
        breakingChangeDocumentationIssueUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Breakingchangedocumentationissueurl
        reportFingerprint:
          type: string
          title: Reportfingerprint
        tenantCompatGateActive:
          type: boolean
          title: Tenantcompatgateactive
          description: True when project metadata requests merge-time compat gating.
          default: false
        mergeBlockedByCompatGate:
          type: boolean
          title: Mergeblockedbycompatgate
          description: True when tenant gate is on and the revision pair is not fully
            safe.
          default: false
      type: object
      required:
      - overall
      - baseRevisionId
      - headRevisionId
      - findings
      - reportFingerprint
      title: CompatibilityCheckResponse
    CompatibilityFindingOut:
      properties:
        id:
          type: string
          title: Id
        path:
          type: string
          title: Path
        category:
          type: string
          title: Category
        rule:
          type: string
          title: Rule
        message:
          type: string
          title: Message
      type: object
      required:
      - id
      - path
      - category
      - rule
      - message
      title: CompatibilityFindingOut
    CompatibilityPolicyPayload:
      properties:
        http409WhenBreaking:
          type: boolean
          title: Http409Whenbreaking
          description: Return 409 Conflict when overall classification is breaking.
          default: false
      type: object
      title: CompatibilityPolicyPayload
      description: Optional HTTP semantics (e.g. CI gate).
    CompatibilityRulesPayload:
      properties:
        check_paths:
          type: boolean
          title: Check Paths
          default: true
        check_schemas:
          type: boolean
          title: Check Schemas
          default: true
        treatRemovedSchemaAsBreaking:
          type: boolean
          title: Treatremovedschemaasbreaking
          default: true
        treatRemovedPropertyAsBreaking:
          type: boolean
          title: Treatremovedpropertyasbreaking
          default: true
        treatRemovedPathAsBreaking:
          type: boolean
          title: Treatremovedpathasbreaking
          default: true
        treatRemovedOperationAsBreaking:
          type: boolean
          title: Treatremovedoperationasbreaking
          default: true
        detectPossibleRenames:
          type: boolean
          title: Detectpossiblerenames
          default: true
