        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - primitives
      summary: Create Primitive
      description: "Create a new primitive.\n\nSupports authentication via JWT token\
        \ or API key.\nWhen using JWT, the created_by field will be set to the authenticated\
        \ user.\n\nArgs:\n    tenant_slug: The tenant slug\n    request: Primitive\
        \ creation data\n    auth_data: Authentication data (injected by dependency)\n\
