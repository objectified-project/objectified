          - type: string
          - type: 'null'
          description: Restrict to a single imported file (per-file history).
          title: Path
        description: Restrict to a single imported file (per-file history).
      - name: branch
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Restrict to a single branch.
          title: Branch
        description: Restrict to a single branch.
      - name: trigger
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by trigger: scheduled | manual | webhook.'
          title: Trigger
        description: 'Filter by trigger: scheduled | manual | webhook.'
      - name: outcome
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by outcome: new-version | unchanged | diverged | failed.'
