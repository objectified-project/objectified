openapi: 3.1.0
info:
  title: Objectified REST API
  description: REST API for serving OpenAPI specifications from the Objectified database
  version: 1.0.87
paths:
  /v1/data/{tenant_slug}:
    get:
      tags:
      - data
      summary: Data Api Info
      description: Verify data API is mounted and tenant is authenticated. Returns
        200 with tenant_slug.
      operationId: data_api_info_v1_data__tenant_slug__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Data Api Info V1 Data  Tenant Slug  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records/{record_id}:
    get:
      tags:
      - data
      summary: Get Data Record
      description: 'Get the current snapshot data for a record (for edit form).

        Returns 404 if record not found or deleted.'
      operationId: get_data_record_v1_data__tenant_slug__records__record_id__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - data
      summary: Update Data Record
      description: 'Update an existing data record and data_snapshot.

        Embedding is recomputed asynchronously and stored in data_snapshot.'
      operationId: update_data_record_v1_data__tenant_slug__records__record_id__patch
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataRecordUpdateBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Update Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Patch
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - data
      summary: Delete Data Record
      description: Delete a data record (append deleted event, remove data_snapshot
        row).
      operationId: delete_data_record_v1_data__tenant_slug__records__record_id__delete
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Delete Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records:
    post:
      tags:
      - data
      summary: Create Data Record
      description: 'Create a new data record and data_snapshot row.

        Embedding is computed asynchronously and stored in data_snapshot.'
      operationId: create_data_record_v1_data__tenant_slug__records_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
