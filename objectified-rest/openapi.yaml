openapi: 3.1.0
info:
  title: Objectified REST API
  description: REST API for serving OpenAPI specifications from the Objectified database
  version: 1.0.61
paths:
  /v1/browse/tenants:
    get:
      tags:
      - browse
      summary: List Public Browse Tenants
      operationId: list_public_browse_tenants_v1_browse_tenants_get
      parameters:
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring filter on tenant name and slug.
          title: Search
        description: Case-insensitive substring filter on tenant name and slug.
      - name: sort
        in: query
        required: false
        schema:
          enum:
          - latest
          - name
          - projects
          type: string
          description: 'Sort order: name (default), projects (desc), or latest activity
            (desc).'
          default: name
          title: Sort
        description: 'Sort order: name (default), projects (desc), or latest activity
          (desc).'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicTenantsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/browse/tenants/{tenant_slug}/projects:
    get:
      tags:
      - browse
      summary: List Public Browse Projects
      operationId: list_public_browse_projects_v1_browse_tenants__tenant_slug__projects_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring filter on project slug and name.
          title: Search
        description: Case-insensitive substring filter on project slug and name.
      - name: domain
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by project metadata domain or domainCategory (case-insensitive).
          title: Domain
        description: Filter by project metadata domain or domainCategory (case-insensitive).
      - name: has_published
        in: query
        required: false
        schema:
          type: boolean
          description: Only include projects with at least one published version (visibility
            rules apply).
          default: false
          title: Has Published
        description: Only include projects with at least one published version (visibility
          rules apply).
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicProjectsResponse'
        '401':
          description: Credentials provided but could not be validated.
        '403':
          description: Credentials provided but not authorized for this tenant.
        '404':
          description: Tenant not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions:
    get:
      tags:
      - browse
      summary: List Public Browse Versions
      operationId: list_public_browse_versions_v1_browse_tenants__tenant_slug__projects__project_slug__versions_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Include only versions whose published_at is at or after this
            timestamp (ISO 8601).
          title: Since
        description: Include only versions whose published_at is at or after this
          timestamp (ISO 8601).
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicVersionsResponse'
        '401':
          description: Credentials provided but could not be validated.
        '403':
          description: Credentials provided but not authorized for this tenant.
        '404':
          description: Tenant or project not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}:
    get:
      tags:
      - data
      summary: Data Api Info
      description: Verify data API is mounted and tenant is authenticated. Returns
        200 with tenant_slug.
      operationId: data_api_info_v1_data__tenant_slug__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Data Api Info V1 Data  Tenant Slug  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records/{record_id}:
    get:
      tags:
      - data
      summary: Get Data Record
      description: 'Get the current snapshot data for a record (for edit form).

        Returns 404 if record not found or deleted.'
      operationId: get_data_record_v1_data__tenant_slug__records__record_id__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - data
      summary: Update Data Record
      description: 'Update an existing data record and data_snapshot.

        Embedding is recomputed asynchronously and stored in data_snapshot.'
      operationId: update_data_record_v1_data__tenant_slug__records__record_id__patch
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataRecordUpdateBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Update Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Patch
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - data
      summary: Delete Data Record
      description: Delete a data record (append deleted event, remove data_snapshot
        row).
      operationId: delete_data_record_v1_data__tenant_slug__records__record_id__delete
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Delete Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records:
    post:
      tags:
      - data
      summary: Create Data Record
      description: 'Create a new data record and data_snapshot row.

        Embedding is computed asynchronously and stored in data_snapshot.'
      operationId: create_data_record_v1_data__tenant_slug__records_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataRecordCreateBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Data Record V1 Data  Tenant Slug  Records Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records/{record_id}/restore:
    post:
      tags:
      - data
      summary: Restore Data Record
      description: Restore a deleted data record (recreate data_snapshot from deleted
        event, append restored event).
      operationId: restore_data_record_v1_data__tenant_slug__records__record_id__restore_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Restore Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Restore Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/primitives/health:
    get:
      tags:
      - primitives
      summary: Registry Health
      description: "Health/ping for the Primitives type-registry layer (#3450).\n\n\
        Reports whether the registry's storage backend — the shared\n``objectified-db``\
        \ connection backing ``odb.primitives`` — is reachable.\nLike the global ``/health``\
        \ endpoint this is intentionally anonymous so\nmonitors can probe the registry\
        \ layer without credentials; every data\naccess endpoint below remains authenticated\
        \ and tenant-scoped.\n\nRegistered before ``GET /{tenant_slug}`` so the literal\
        \ ``health`` path is\nmatched here rather than being captured as a tenant\
        \ slug.\n\nReturns:\n    Registry health: overall ``status``, the ``objectified-db``\n\
        \    ``connection`` state, and whether the ``odb.primitives`` storage table\n\
        \    is present. On failure ``status`` is ``unhealthy`` and ``error`` carries\n\
        \    the driver message; the endpoint itself still responds 200 so the probe\n\
        \    is always reachable (mirrors the global ``/health`` contract)."
      operationId: registry_health_v1_primitives_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryHealthResponse'
  /v1/primitives/{tenant_slug}:
    get:
      tags:
      - primitives
      summary: List Primitives
      description: "List all primitives for a tenant.\n\nSupports authentication via:\n\
        - JWT token in Authorization header (Bearer token)\n- API key in X-API-Key\
        \ header\n\nArgs:\n    tenant_slug: The tenant slug\n    category: Optional\
        \ category filter\n    auth_data: Authentication data (injected by dependency)\n\
        \nReturns:\n    List of primitives for the tenant"
      operationId: list_primitives_v1_primitives__tenant_slug__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by category
          title: Category
        description: Filter by category
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrimitiveSchema'
                title: Response List Primitives V1 Primitives  Tenant Slug  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - primitives
      summary: Create Primitive
      description: "Create a new primitive.\n\nSupports authentication via JWT token\
        \ or API key.\nWhen using JWT, the created_by field will be set to the authenticated\
        \ user.\n\nArgs:\n    tenant_slug: The tenant slug\n    request: Primitive\
        \ creation data\n    auth_data: Authentication data (injected by dependency)\n\
        \nReturns:\n    The created primitive"
      operationId: create_primitive_v1_primitives__tenant_slug__post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrimitiveCreateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrimitiveSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/primitives/{tenant_slug}/imports:
    get:
      tags:
      - primitives
      summary: List Primitive Imports
      description: "List primitive import provenance records for a tenant, newest\
        \ first (#3448).\n\nRegistered before GET /{tenant_slug}/{primitive_id} so\
        \ the literal `imports`\npath is not captured as a primitive id.\n\nArgs:\n\
        \    tenant_slug: The tenant slug\n    limit: Maximum number of records to\
        \ return\n    auth_data: Authentication data (injected by dependency)\n\n\
        Returns:\n    The tenant's import provenance records."
      operationId: list_primitive_imports_v1_primitives__tenant_slug__imports_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          description: Max number of records to return
          default: 50
          title: Limit
        description: Max number of records to return
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrimitiveImportRecord'
                title: Response List Primitive Imports V1 Primitives  Tenant Slug  Imports
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/primitives/{tenant_slug}/imports/{import_id}:
    get:
      tags:
      - primitives
      summary: Get Primitive Import
      description: "Get a single primitive import provenance record, including its\
        \ report JSON (#3448).\n\nArgs:\n    tenant_slug: The tenant slug\n    import_id:\
        \ The import provenance record id\n    auth_data: Authentication data (injected\
        \ by dependency)\n\nReturns:\n    The provenance record with its full options/report\
        \ payload."
      operationId: get_primitive_import_v1_primitives__tenant_slug__imports__import_id__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: import_id
        in: path
        required: true
        schema:
          type: string
          title: Import Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrimitiveImportRecord'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/primitives/{tenant_slug}/unresolved:
    get:
      tags:
      - primitives
      summary: List Unresolved Refs
      description: "Report the tenant's unresolved relative-``$ref`` edges and counts\
        \ (#3457).\n\nA primitive's relative ``$ref`` values are resolved to registry\
        \ edges on save/import\nand flagged ``resolved`` / ``unresolved`` (#3456).\
        \ This endpoint aggregates the\nunresolved ones: the two top-level counts\
        \ feed the registry coverage/stats KPIs\n(#3454), and ``primitives`` is the\
        \ per-primitive breakdown — each with only its\nunresolved edges — the resolver\
        \ UI lists (#3470).\n\nRegistered before ``GET /{tenant_slug}/{primitive_id}``\
        \ so the literal ``unresolved``\npath is matched here rather than being captured\
        \ as a primitive id.\n\nArgs:\n    tenant_slug: The tenant slug.\n    auth_data:\
        \ Authentication data (injected by dependency).\n\nReturns:\n    ``UnresolvedRefsResponse``\
        \ with the total unresolved-edge count, the number of\n    affected primitives,\
        \ and the per-primitive unresolved-edge breakdown."
      operationId: list_unresolved_refs_v1_primitives__tenant_slug__unresolved_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnresolvedRefsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/primitives/{tenant_slug}/{primitive_id}:
    get:
      tags:
      - primitives
      summary: Get Primitive
      description: "Get a specific primitive by ID.\n\nSupports authentication via\
        \ JWT token or API key.\n\nArgs:\n    tenant_slug: The tenant slug\n    primitive_id:\
        \ The primitive ID\n    auth_data: Authentication data (injected by dependency)\n\
        \nReturns:\n    The primitive details"
      operationId: get_primitive_v1_primitives__tenant_slug___primitive_id__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: primitive_id
        in: path
        required: true
        schema:
          type: string
          title: Primitive Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrimitiveSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - primitives
      summary: Update Primitive
      description: "Update an existing primitive.\n\nSupports authentication via JWT\
        \ token or API key.\n\nArgs:\n    tenant_slug: The tenant slug\n    primitive_id:\
        \ The primitive ID\n    request: Primitive update data\n    auth_data: Authentication\
        \ data (injected by dependency)\n\nReturns:\n    The updated primitive"
      operationId: update_primitive_v1_primitives__tenant_slug___primitive_id__put
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: primitive_id
        in: path
        required: true
        schema:
          type: string
          title: Primitive Id
      - name: authorization
