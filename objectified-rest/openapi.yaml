  /v1/primitives/{tenant_slug}/import:
    post:
      tags:
      - primitives
      summary: Import Primitives
      description: "Import primitives from a JSON Schema document.\n\nExtracts type\
        \ definitions from JSON Schema's $defs or definitions\nand creates primitives\
        \ from them.\n\nSupports authentication via JWT token or API key.\nWhen using\
        \ JWT, the created_by field will be set to the authenticated user.\n\nArgs:\n\
        \    tenant_slug: The tenant slug\n    request: Import request with JSON Schema\
        \ document\n    auth_data: Authentication data (injected by dependency)\n\n\
        Returns:\n    Summary of imported primitives"
      operationId: import_primitives_v1_primitives__tenant_slug__import_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
