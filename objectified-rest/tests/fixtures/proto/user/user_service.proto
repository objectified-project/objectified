// proto3 service that imports a sibling module and a well-known type — the multi-file,
// import-resolving case MFI-9.1's acceptance criteria call out.
syntax = "proto3";

package acme.user;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// A registered user of the platform.
message User {
  string id = 1;
  string display_name = 2;
  acme.common.Address address = 3;
  google.protobuf.Timestamp created_at = 4;
  Role role = 5;
}

// Access role for a user.
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_MEMBER = 1;
  ROLE_ADMIN = 2;
}

message GetUserRequest {
  string id = 1;
}

message ListUsersRequest {
  int32 page_size = 1;
  string page_token = 2;
}

// Unary + server-streaming surface, so the canonical-model mapper (MFI-9.2) has streaming
// flags to preserve.
service UserService {
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (stream User);
}
